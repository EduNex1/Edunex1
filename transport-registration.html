<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Vehicle Registration — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/datepicker.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .form-section label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .form-section .form-control {
            font-size: 12px;
        }

        .form-section select.form-control {
            font-size: 12px;
        }

        .form-section textarea.form-control {
            font-size: 12px;
            resize: vertical;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #0d1b4a;
            border-bottom: 2px solid #0d1b4a;
            padding-bottom: 4px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                
                <div class="breadcrumbs-area">
                    <h3>Transport</h3>
                    <ul>
                        <li><a href="/dashboard">Home</a></li>
                        <li><a href="/transport-vehicles">Vehicles</a></li>
                        <li>Register Vehicle</li>
                    </ul>
                </div>

                
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1 mb-3">
                            <div class="item-title">
                                <h3>Vehicle Registration</h3>
                            </div>
                        </div>
                        <form id="vehicleForm" class="form-section">
                            
                            <div class="section-title">Vehicle Information</div>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label>Reg Number <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regNo" placeholder="e.g. UP32 XX 1234"
                                        required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Vehicle Type <span class="text-danger">*</span></label>
                                    <select class="form-control" id="vehicleType">
                                        <option value="">— Select —</option>
                                        <option>Self Owned</option>
                                        <option>Hired</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Vehicle Name <span class="text-danger">*</span></label>
                                    <select class="form-control" id="vehicleName">
                                        <option value="">— Select —</option>
                                        <option>Bus</option>
                                        <option>Mini Bus</option>
                                        <option>Van</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>No. of Seats <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="seats" min="1" placeholder="e.g. 40">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Engine Number</label>
                                    <input type="text" class="form-control" id="engineNo" placeholder="Engine number">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Chasis Number</label>
                                    <input type="text" class="form-control" id="chasisNo" placeholder="Chasis number">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Vehicle Status <span class="text-danger">*</span></label>
                                    <select class="form-control" id="vehicleStatus">
                                        <option>Active</option>
                                        <option>Inactive</option>
                                    </select>
                                </div>
                            </div>

                            
                            <div class="section-title mt-2">Certificate Details</div>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label>Pollution Certificate</label>
                                    <select class="form-control" id="pollutionCert">
                                        <option>Valid</option>
                                        <option>Expired</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Pollution Cert Renewal Date</label>
                                    <input type="date" class="form-control" id="pollutionRenewal">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Fitness Cert Renewal Date</label>
                                    <input type="date" class="form-control" id="fitnessRenewal">
                                </div>
                            </div>

                            
                            <div class="section-title mt-2">Driver Information</div>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label>Driver Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="driverName"
                                        placeholder="Driver full name">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label>Driver Mobile <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="driverMobile" maxlength="10"
                                        placeholder="10-digit mobile">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Driver Address</label>
                                    <input type="text" class="form-control" id="driverAddress"
                                        placeholder="Driver address">
                                </div>
                            </div>

                            
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label>Other Info</label>
                                    <textarea class="form-control" id="otherInfo" rows="2"
                                        placeholder="Any additional info..."></textarea>
                                </div>
                            </div>

                            
                            <div class="mt-2">
                                <button type="submit" class="btn btn-sm"
                                    style="background:#042954;color:#fff;font-size:13px;min-width:100px;"><i
                                        class="fas fa-save mr-1"></i>Save</button>
                                <button type="reset" class="btn btn-sm btn-light ml-2"
                                    style="font-size:13px;min-width:100px;border:1px solid #ccc;">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(function () {
            initPage('transport-registration');
            if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;

            $('#vehicleForm').on('submit', async function (e) {
                e.preventDefault();
                const vehicle_no = $('#regNo').val().trim();
                const type = $('#vehicleType').val();
                const name = $('#vehicleName').val();
                const capacity = parseInt($('#seats').val()) || 0;

                if (!vehicle_no || !type || !name || !capacity) {
                    showToast('Please fill all required fields', 'error');
                    return;
                }

                const driver_name = $('#driverName').val().trim();
                const driver_phone = $('#driverMobile').val().trim();
                if (!driver_name || !driver_phone) {
                    showToast('Driver name and mobile are required', 'error');
                    return;
                }

                try {
                    await createMasterData('vehicles', {
                        vehicle_no,
                        type,
                        name,
                        capacity,
                        engine_no: $('#engineNo').val().trim(),
                        chasis_no: $('#chasisNo').val().trim(),
                        pollution_cert: $('#pollutionCert').val(),
                        pollution_renewal: $('#pollutionRenewal').val(),
                        fitness_renewal: $('#fitnessRenewal').val(),
                        status: $('#vehicleStatus').val(),
                        driver_name,
                        driver_phone,
                        driver_address: $('#driverAddress').val().trim(),
                        other_info: $('#otherInfo').val().trim()
                    });
                    showToast('Vehicle registered successfully!', 'success');
                    this.reset();
                } catch (err) {
                    showToast(err.message || 'Failed to register vehicle', 'error');
                }
            });
        });
    </script>
</body>

</html>
