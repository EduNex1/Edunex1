<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Login — EduNex1</title>
    <meta name="description" content="Login to EduNex1 School Management System">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1128 0%, #0d1b4a 40%, #1a3a7a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .bg-shapes .shape { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.02); animation: floatShape 20s infinite ease-in-out; }
        .bg-shapes .shape:nth-child(1) { width: 300px; height: 300px; top: -80px; right: -60px; }
        .bg-shapes .shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; left: -40px; animation-delay: -5s; }
        .bg-shapes .shape:nth-child(3) { width: 150px; height: 150px; top: 40%; left: 20%; animation-delay: -10s; }
        .bg-shapes .shape:nth-child(4) { width: 80px; height: 80px; bottom: 20%; right: 15%; animation-delay: -15s; background: rgba(255,255,255,0.03); }
        @keyframes floatShape { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        
        .login-wrapper { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 0 20px; }

        
        .school-brand { text-align: center; margin-bottom: 32px; }
        .school-logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #ffd54f, #ffb300);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 26px; color: #0d1b4a;
            margin-bottom: 14px;
            box-shadow: 0 4px 24px rgba(255,213,79,0.3);
        }
        .school-brand h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px; margin-bottom: 4px; }
        .school-brand p { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; }

        
        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 36px 30px 30px;
        }
        .login-card h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .login-card .login-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 26px; }

        
        .form-group { margin-bottom: 16px; position: relative; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-group .input-wrap { position: relative; }
        .form-group .input-wrap > i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: rgba(255,255,255,0.3); }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 13px 14px 13px 40px;
            font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 500; color: #fff;
            outline: none; transition: all 0.2s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus { border-color: #ffd54f; background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px rgba(255,213,79,0.1); }
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 14px; }
        .password-toggle:hover { color: rgba(255,255,255,0.6); }

        
        .error-msg {
            background: rgba(244,67,54,0.15);
            border: 1px solid rgba(244,67,54,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px; color: #ef9a9a;
            margin-bottom: 16px;
            display: none; align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }

        
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #ffd54f, #ffb300);
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
            color: #0d1b4a; cursor: pointer;
            transition: all 0.25s; letter-spacing: 0.3px; text-transform: uppercase;
            margin-top: 6px;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,213,79,0.35); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        
        .login-footer { text-align: center; margin-top: 24px; font-size: 10px; color: rgba(255,255,255,0.2); }

        
        @media (max-width: 480px) {
            .login-wrapper { max-width: 100%; padding: 0 16px; }
            .login-card { padding: 28px 22px 24px; }
            .school-brand h1 { font-size: 19px; }
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-wrapper">
        <div class="school-brand">
            <div class="school-logo"><i class="fas fa-graduation-cap"></i></div>
            <h1>EduNex1</h1>
            <p>School Management System</p>
        </div>

        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="login-sub">Sign in to continue to your dashboard</p>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>User ID</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="userId" placeholder="Enter your user ID" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt" style="margin-right:6px;"></i> Sign In
                </button>
            </form>
        </div>

        <div class="login-footer">
            &copy; <span id="footerYear">2026</span> EduNex1. All rights reserved.
            <script>document.getElementById('footerYear').textContent=new Date().getFullYear();</script>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (isLoggedIn()) {
            var _u = getUser();
            var _r = _u ? _u.role : '';
            if (_r === 'teacher' || _r === 'staff') window.location.href = '/teacher-dashboard';
            else if (_r === 'parent') window.location.href = '/parent-dashboard';
            else if (_r === 'student') window.location.href = '/student-dashboard';
            else window.location.href = '/dashboard';
        }

        function togglePassword() {
            var pw = document.getElementById('password');
            var icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { pw.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        async function handleLogin(e) {
            e.preventDefault();
            var uid = document.getElementById('userId').value.trim();
            var pw = document.getElementById('password').value.trim();
            var errEl = document.getElementById('errorMsg');
            var errText = document.getElementById('errorText');
            var btn = document.getElementById('loginBtn');

            if (!uid || !pw) {
                errText.textContent = 'Please enter both User ID and Password.';
                errEl.classList.add('show');
                return;
            }

            errEl.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i> Signing in...';

            var result = await loginUser(uid, pw);

            if (result && result.token) {
                if (result.user && result.user.role !== 'super_admin') {
                    try {
                        const perms = await getUserPermissions(result.user.id);
                        if (typeof setUserPerms === 'function') setUserPerms(Array.isArray(perms) ? perms : []);
                    } catch(e) {  }
                }
                var _role = (result.user && result.user.role) || '';
                if (_role === 'teacher' || _role === 'staff') window.location.href = '/teacher-dashboard';
                else if (_role === 'parent') window.location.href = '/parent-dashboard';
                else if (_role === 'student') window.location.href = '/student-dashboard';
                else window.location.href = '/dashboard';
            } else {
                var msg = (result && result.error) ? result.error : 'Invalid User ID or Password.';
                errText.textContent = msg;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:6px;"></i> Sign In';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>

</html>
