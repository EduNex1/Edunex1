<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Profile — Parent Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/parent-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>My Profile</h3>
                    <ul><li><a href="/parent-dashboard">Home</a></li><li>My Profile</li></ul>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-user-circle"></i> Parent Information</div>
                    <div class="chart-card-body" id="parentProfileArea">
                        <span style="color:#888;">Loading...</span>
                    </div>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-user-graduate"></i> My Children</div>
                    <div class="chart-card-body" id="childrenOverview">
                        <span style="color:#888;">Loading...</span>
                    </div>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-child"></i> Child Detail</div>
                    <div class="chart-card-body" style="padding:12px 16px 0 16px;">
                        <select id="childSelect" onchange="loadProfile()" class="form-control" style="max-width:350px;margin-bottom:12px;">
                            <option value="">— Select Child —</option>
                        </select>
                    </div>
                </div>
                <div id="profileArea"></div>

                
                <div class="chart-card">
                    <div class="chart-card-header"><i class="fas fa-key"></i> Change Password</div>
                    <div class="chart-card-body">
                        <form id="pwForm">
                            <div class="row gutters-8">
                                <div class="col-lg-4 col-md-6 col-12 form-group">
                                    <label>Current Password <span style="color:red;">*</span></label>
                                    <input type="password" id="pwCurrent" class="form-control" required>
                                </div>
                                <div class="col-lg-4 col-md-6 col-12 form-group">
                                    <label>New Password <span style="color:red;">*</span></label>
                                    <input type="password" id="pwNew" class="form-control" required minlength="4">
                                </div>
                                <div class="col-lg-4 col-md-6 col-12 form-group">
                                    <label>Confirm New Password <span style="color:red;">*</span></label>
                                    <input type="password" id="pwConfirm" class="form-control" required minlength="4">
                                </div>
                                <div class="col-12 form-group" style="margin-top:8px;">
                                    <button type="submit" class="btn btn-fill-lg bg-blue-dark btn-hover-yellow" style="font-size:12px;padding:9px 20px;">
                                        <i class="fas fa-lock mr-1"></i> Update Password
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    let children = [];
    $(async function () {
        initPage('p-my-profile');
        if (typeof requireRoles === 'function' && !requireRoles(['parent'])) return;
        const user = typeof getUser==='function'?getUser():null;
        try {
            children = await getMyChildren() || [];
            if(children.length){
                const c = children[0];
                const parentName = (user&&user.name) || c.father_name || c.mother_name || 'Parent';
                const phone = (user&&user.login_id) || c.phone || '-';
                const email = c.email || '-';
                const initials = parentName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
                let pHtml = `<div style="text-align:center;padding-bottom:12px;">
                    <div style="width:64px;height:64px;border-radius:50%;background:#304ffe;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin-bottom:10px;">${initials}</div>
                    <h4 style="color:#0d1b4a;margin:0;">${parentName}</h4>
                    <p style="color:#888;font-size:12px;margin-top:2px;">Parent / Guardian</p>
                </div>`;
                const pFields = [['Phone', phone],['Email', email],['Father Name', c.father_name||'-'],['Mother Name', c.mother_name||'-'],['Address', c.address||'-'],['Children Linked', children.length]];
                pFields.forEach(f=>{
                    pHtml+=`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;"><span style="color:#888;font-size:13px;">${f[0]}</span><span style="font-weight:600;font-size:13px;color:#0d1b4a;">${f[1]}</span></div>`;
                });
                $('#parentProfileArea').html(pHtml);
            } else {
                $('#parentProfileArea').html('<span style="color:#888;">No children linked to this account.</span>');
            }
            if(children.length){
                let coHtml='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;">';
                children.forEach(c=>{
                    const ini = (c.name||'').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
                    coHtml+=`<div style="background:#f8f9ff;border-radius:8px;padding:14px;text-align:center;">
                        <div style="width:44px;height:44px;border-radius:50%;background:#304ffe;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin-bottom:6px;">${ini}</div>
                        <div style="font-weight:600;color:#0d1b4a;font-size:13px;">${c.name}</div>
                        <div style="color:#888;font-size:11px;">Class ${c.class_name||''}${c.section?'-'+c.section:''} | Roll: ${c.roll_no||'-'}</div>
                        <div style="color:#888;font-size:11px;">Adm No: ${c.admission_no||'-'}</div>
                    </div>`;
                });
                coHtml+='</div>';
                $('#childrenOverview').html(coHtml);
            } else {
                $('#childrenOverview').html('<span style="color:#888;">No children found.</span>');
            }
            const cs = $('#childSelect');
            children.forEach(c => cs.append(`<option value="${c.id}">${c.name} \u2014 Class ${c.class_name || ''}${c.section ? '-' + c.section : ''}</option>`));
            if (children.length === 1) { cs.val(children[0].id); loadProfile(); }
        } catch (e) {
            console.error(e);
            $('#parentProfileArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load profile. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    function loadProfile() {
        const id = $('#childSelect').val();
        const s = children.find(c => c.id == id);
        if (!s) { $('#profileArea').html(''); return; }
        const initials = (s.name || '').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const fields = [['Admission No', s.admission_no || '-'],['Class', (s.class_name || '') + (s.section ? ' - ' + s.section : '')],['Roll No', s.roll_no || '-'],['DOB', s.dob || '-'],['Gender', s.gender || '-'],['Father', s.father_name || '-'],['Mother', s.mother_name || '-'],['Phone', s.phone || '-'],['Email', s.email || '-'],['Address', s.address || '-'],['Category', s.category || '-'],['Status', s.status || '-']];
        let rows = fields.map(f => `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;"><span style="color:#888;font-size:13px;">${f[0]}</span><span style="font-weight:600;font-size:13px;color:#0d1b4a;">${f[1]}</span></div>`).join('');
        $('#profileArea').html(`<div class="chart-card" style="margin-bottom:16px;"><div class="chart-card-header"><i class="fas fa-user"></i> Student Profile</div><div class="chart-card-body" style="text-align:center;padding-bottom:0;"><div style="width:64px;height:64px;border-radius:50%;background:#304ffe;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin-bottom:10px;">${initials}</div><h4 style="color:#0d1b4a;margin:0;">${s.name}</h4><p style="color:#888;font-size:12px;">Student</p></div><div class="chart-card-body">${rows}</div></div>`);
    }
    $('#pwForm').on('submit', async function(e) {
        e.preventDefault();
        var cur=$('#pwCurrent').val(), nw=$('#pwNew').val(), cf=$('#pwConfirm').val();
        if (nw !== cf) { showToast('New passwords do not match', 'error'); return; }
        if (nw.length < 4) { showToast('Password must be at least 4 characters', 'error'); return; }
        try { await changePassword(cur, nw); showToast('Password changed successfully', 'success'); $('#pwCurrent').val(''); $('#pwNew').val(''); $('#pwConfirm').val(''); }
        catch (err) { showToast(err.message || 'Failed to change password', 'error'); }
    });
    </script>
</body>
</html>
