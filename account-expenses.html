<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Expenses — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .list-table tbody tr.total-row td{font-weight:700;background:#f8f9ff;border-top:2px solid #0d1b4a;font-size:13px}
        .action-icon{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
        .action-icon.edit{background:#e3f2fd;color:#1565c0}.action-icon.edit:hover{background:#1565c0;color:#fff}
        .action-icon.delete{background:#fce4ec;color:#c62828}.action-icon.delete:hover{background:#c62828;color:#fff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .add-form-card{background:#f8f9ff;border:2px dashed #c5cae9;border-radius:10px;padding:18px 20px;margin-bottom:16px;display:none}
        .empty-state{text-align:center;padding:40px;color:#bbb}.empty-state i{font-size:36px;margin-bottom:10px;display:block}
        .quick-link{font-size:12px;font-weight:600;color:#0d1b4a;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
        .quick-link:hover{color:#304ffe;text-decoration:underline}
        .add-inline-btn{font-size:10px;background:none;border:1px dashed #1565c0;color:#1565c0;border-radius:4px;padding:1px 6px;cursor:pointer;margin-left:4px;vertical-align:middle}
        .add-inline-btn:hover{background:#1565c0;color:#fff}
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Accounts</h3>
                    <ul><li><a href="/dashboard">Home</a></li><li>Expenses</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1" style="display:flex;align-items:center;justify-content:space-between;"><div class="item-title"><h3><i class="fas fa-receipt"></i> Expenses</h3></div><button class="btn btn-sm" onclick="exportData()" style="background:#fff;border:1px solid #d0d0d0;color:#0d1b4a;font-size:12px;padding:5px 14px;border-radius:6px;" title="Export CSV"><i class="fas fa-file-csv"></i> Export</button></div>

                        
                        <div style="margin-bottom:12px;">
                            <a class="quick-link" onclick="toggleAddForm()"><i class="fas fa-plus-circle"></i> Add Expense</a>
                        </div>

                        
                        <div class="add-form-card" id="addFormCard">
                            <div style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;"><i class="fas fa-plus-circle"></i> Add New Expense</div>
                            <div class="row" style="gap:0;">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Expense Date *</label>
                                    <input type="date" class="form-control" id="aDate">
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Expense Head * <button class="add-inline-btn" onclick="window.location.href='/expense-head'" title="Manage Expense Heads"><i class="fas fa-plus"></i> Add</button></label>
                                    <select class="form-control" id="aHead"></select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Expense Name</label>
                                    <input type="text" class="form-control" id="aName" placeholder="e.g. Monthly Bill">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Amount (₹) *</label>
                                    <input type="number" class="form-control" id="aAmount" min="0" placeholder="0">
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Vendor <button class="add-inline-btn" onclick="window.location.href='/account-vendor'" title="Manage Vendors"><i class="fas fa-plus"></i> Add</button></label>
                                    <select class="form-control" id="aVendor"><option value="0">— None —</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Payment Mode *</label>
                                    <select class="form-control" id="aMode">
                                        <option value="">Select</option>
                                        <option value="Cash">Cash</option>
                                        <option value="Bank">Bank Transfer</option>
                                        <option value="UPI">UPI</option>
                                        <option value="Cheque">Cheque</option>
                                    </select>
                                </div>
                                <div class="col-lg-4 col-md-6 col-12 form-group">
                                    <label class="form-label-sm">Expense Detail</label>
                                    <input type="text" class="form-control" id="aDetail" placeholder="Additional details...">
                                </div>
                                <div class="col-12 form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" onclick="saveExpense()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;"><i class="fas fa-save"></i> Submit</button>
                                    <button class="fw-btn-fill" onclick="cancelAdd()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;"><i class="fas fa-times"></i> Cancel</button>
                                </div>
                            </div>
                        </div>

                        
                        <div class="filter-card">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">From Date</label>
                                    <input type="date" class="form-control" id="fFrom">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">To Date</label>
                                    <input type="date" class="form-control" id="fTo">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Expense Head</label>
                                    <select class="form-control" id="fHead"><option value="">All Heads</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Vendor</label>
                                    <select class="form-control" id="fVendor"><option value="">All Vendors</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Mode</label>
                                    <select class="form-control" id="fMode"><option value="">All Modes</option><option>Cash</option><option>Bank</option><option>UPI</option><option>Cheque</option></select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Enter Keyword</label>
                                    <input type="text" class="form-control" id="fKeyword" placeholder="Search...">
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" onclick="renderList()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;"><i class="fas fa-search"></i> Search</button>
                                    <button class="fw-btn-fill" onclick="clearFilters()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;"><i class="fas fa-redo"></i> Clear</button>
                                </div>
                            </div>
                        </div>

                        
                        <div class="table-card">
                            <div class="table-header">
                                <h5><i class="fas fa-list-alt" style="margin-right:6px;"></i>Expense List</h5>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table">
                                    <thead><tr><th>Action</th><th>Sr.</th><th>Expense Date</th><th>Expense Head</th><th>Vendor</th><th>Amount (₹)</th><th>Detail</th></tr></thead>
                                    <tbody id="listBody"></tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        let _displayedData = [];
        let editingId = null;
        let expensesCache = [];
        let expenseHeadsCache = [];
        let vendorsCache = [];

        $(document).ready(async function(){

            if(typeof initPage==='function') initPage('account-expenses');
            if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;
            await populateDropdowns();
            await renderList();
        });

        async function populateDropdowns(){
            try {
                [expenseHeadsCache, vendorsCache] = await Promise.all([
                    getExpenseHeads(), getVendors()
                ]);
            } catch(err) { showToast('Failed to load dropdown data','error'); return; }
            expenseHeadsCache.forEach(h=>{ $('#fHead').append(`<option value="${h.id}">${h.name}</option>`); });
            vendorsCache.forEach(v=>{ $('#fVendor').append(`<option value="${v.id}">${v.name}</option>`); });
            refreshAddDropdowns();
        }

        function refreshAddDropdowns(){
            $('#aHead').html('<option value="">Select Head</option>');
            expenseHeadsCache.forEach(h=>$('#aHead').append(`<option value="${h.id}">${h.name}</option>`));
            $('#aVendor').html('<option value="0">— None —</option>');
            vendorsCache.forEach(v=>$('#aVendor').append(`<option value="${v.id}">${v.name}</option>`));
        }

        function toggleAddForm(){
            editingId=null; resetForm();
            $('#aDate').val(new Date().toISOString().split('T')[0]);
            refreshAddDropdowns();
            $('#addFormCard').slideDown(200);
        }
        function cancelAdd(){ editingId=null; resetForm(); $('#addFormCard').slideUp(200); }
        function resetForm(){ $('#aDate,#aName,#aAmount,#aDetail').val(''); $('#aHead,#aMode').val(''); $('#aVendor').val('0'); }

        async function saveExpense(){
            const date=$('#aDate').val(), head_id=parseInt($('#aHead').val()), name=$('#aName').val().trim(),
                  amount=parseFloat($('#aAmount').val()), vendor_id=parseInt($('#aVendor').val())||null,
                payment_mode=$('#aMode').val(), detail=$('#aDetail').val().trim();

            if(!date){ showToast('Please select date','error'); return; }
            if(!head_id){ showToast('Please select expense head','error'); return; }
            if(!amount||amount<=0){ showToast('Please enter valid amount','error'); return; }
            if(!payment_mode){ showToast('Please select payment mode','error'); return; }

            const payload = { date, head_id, amount, description: name ? `${name} — ${detail}` : detail, vendor_id: vendor_id || null, payment_mode, reference_no: '' };

            try {
                if(editingId){
                    await updateExpense(editingId, payload);
                    showToast('Expense updated!','success'); editingId=null;
                } else {
                    await createExpense(payload);
                    showToast('Expense added!','success');
                }
                cancelAdd(); await renderList();
            } catch(err){ showToast(err.message||'Failed to save expense','error'); }
        }

        function editExpense(id){
            const e=expensesCache.find(x=>x.id===id); if(!e) return;
            editingId=id;
            refreshAddDropdowns();
            $('#aDate').val(e.date); $('#aHead').val(e.head_id); $('#aName').val('');
            $('#aAmount').val(e.amount); $('#aVendor').val(e.vendor_id||0); $('#aMode').val(e.payment_mode);
            $('#aDetail').val(e.description||'');
            $('#addFormCard').slideDown(200);
            $('html,body').animate({scrollTop:$('#addFormCard').offset().top-80},300);
        }

        async function removeExpense(id){
            const e=expensesCache.find(x=>x.id===id); if(!e) return;
            showConfirmModal('Delete Expense',`Delete expense "${e.head_name||''}" — ₹${e.amount.toLocaleString('en-IN')}?`, async function(){
                try {
                    await deleteExpense(id);
                    showToast('Expense deleted!','success');
                    await renderList();
                } catch(err){ showToast(err.message||'Failed to delete','error'); }
            });
        }

        function clearFilters(){ $('#fFrom,#fTo,#fKeyword').val(''); $('#fHead,#fVendor,#fMode').val(''); renderList(); }

        async function renderList(){
            const fFrom=$('#fFrom').val(), fTo=$('#fTo').val(), fHead=$('#fHead').val(),
                  fVendor=$('#fVendor').val(), fMode=$('#fMode').val(),
                  fKey=$('#fKeyword').val().toLowerCase().trim();

            try {
                expensesCache = await getExpenses();
            } catch(err){ showToast('Failed to load expenses','error'); return; }

            let list=[...expensesCache];
            if(fFrom) list=list.filter(e=>e.date>=fFrom);
            if(fTo) list=list.filter(e=>e.date<=fTo);
            if(fHead) list=list.filter(e=>e.head_id===parseInt(fHead));
            if(fVendor) list=list.filter(e=>e.vendor_id===parseInt(fVendor));
            if(fMode) list=list.filter(e=>e.payment_mode===fMode);
            if(fKey) list=list.filter(e=>{
                return (e.description||'').toLowerCase().includes(fKey)||(e.head_name||'').toLowerCase().includes(fKey)||(e.vendor_name||'').toLowerCase().includes(fKey);
            });

            const tb=$('#listBody');
            _displayedData = list;
            if(!list.length){ tb.html('<tr><td colspan="7"><div class="empty-state"><i class="fas fa-receipt"></i>No expenses found</div></td></tr>'); return; }

            let html='', total=0;
            list.forEach((e,i)=>{
                total+=e.amount;
                html+=`<tr>
                    <td style="white-space:nowrap;"><button class="action-icon edit" title="Edit" onclick="editExpense(${e.id})"><i class="fas fa-pen"></i></button> <button class="action-icon delete" title="Delete" onclick="removeExpense(${e.id})"><i class="fas fa-trash-alt"></i></button></td>
                    <td style="font-weight:600;color:#555;">${i+1}</td>
                    <td>${formatDate(e.date)}</td>
                    <td style="font-weight:600;">${e.head_name||'—'}</td>
                    <td>${e.vendor_name||'—'}</td>
                    <td style="font-weight:700;color:#c62828;">₹${e.amount.toLocaleString('en-IN')}</td>
                    <td style="color:#888;max-width:150px;overflow:hidden;text-overflow:ellipsis;">${e.description||'—'}</td>
                </tr>`;
            });
            html+=`<tr class="total-row"><td colspan="5" style="text-align:right;">Total</td><td>₹${total.toLocaleString('en-IN')}</td><td></td></tr>`;
            tb.html(html);
        }

        function formatDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }

        function exportData() {
            if (!_displayedData.length) { showToast('No data to export', 'error'); return; }
            exportCSV(_displayedData, [
                { label: 'Date', fn: function(r) { return r.date || r.expense_date || ''; } },
                { label: 'Head', fn: function(r) { return r.head_name || r.expense_head || ''; } },
                { label: 'Description', key: 'description' },
                { label: 'Amount', key: 'amount' },
                { label: 'Vendor', fn: function(r) { return r.vendor_name || ''; } },
                { label: 'Mode', key: 'payment_mode' }
            ], 'expenses.csv');
        }
    </script>
</body>
</html>
