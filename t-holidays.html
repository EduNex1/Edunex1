<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Holidays — Teacher Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/teacher-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Holidays</h3>
                    <ul><li><a href="/teacher-dashboard">Home</a></li><li>Academics > Holidays</li></ul>
                </div>
            
            
<div class="chart-card">
    <div class="chart-card-header"><i class="fas fa-umbrella-beach"></i> Holidays</div>
    <div class="chart-card-body" style="padding:8px 16px;">
        <table class="recent-table">
            <thead><tr><th>#</th><th>Holiday</th><th>Date</th><th>Type</th></tr></thead>
            <tbody id="holidayBody"><tr><td colspan="4" style="text-align:center;color:#888;padding:16px;">Loading...</td></tr></tbody>
        </table>
    </div>
</div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function(){
        initPage('t-holidays');
        if (typeof requireRoles === 'function' && !requireRoles(['teacher'])) return;
        try {
            const holidays = await getHolidays() || [];
            if (!holidays.length) { $('#holidayBody').html('<tr><td colspan="4" style="text-align:center;color:#888;">No holidays found.</td></tr>'); return; }
            const typeColors = { National: '#2e7d32', Festival: '#ef6c00', Vacation: '#1565c0', Holiday: '#7b1fa2' };
            const typeBg = { National: '#e8f5e9', Festival: '#fff3e0', Vacation: '#e3f2fd', Holiday: '#f3e5f5' };
            let html = '';
            holidays.forEach((holiday, index) => {
                const type = holiday.type || 'Holiday';
                const color = typeColors[type] || '#555';
                const bg = typeBg[type] || '#f5f5f5';
                html += `<tr><td>${index + 1}</td><td><strong>${holiday.name || holiday.title || '-'}</strong></td><td>${holiday.date || '-'}</td><td><span style="background:${bg};color:${color};padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;">${type}</span></td></tr>`;
            });
            $('#holidayBody').html(html);
        } catch (e) {
            console.error(e);
            $('#holidayBody').html('<tr><td colspan="4" style="text-align:center;color:#c62828;">Failed to load holidays.</td></tr>');
        }
    });
    </script>
</body>
</html>
