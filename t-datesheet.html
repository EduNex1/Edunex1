<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Date Sheet — Teacher Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/teacher-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Date Sheet</h3>
                    <ul><li><a href="/teacher-dashboard">Home</a></li><li>Academics > Date Sheet</li></ul>
                </div>
            
            
<div class="chart-card">
    <div class="chart-card-header"><i class="fas fa-calendar-alt"></i> Exam Date Sheet</div>
    <div class="chart-card-body" style="padding:8px 16px;">
        <table class="recent-table">
            <thead><tr><th>Date</th><th>Exam</th><th>Class</th><th>Subject</th><th>Time</th></tr></thead>
            <tbody id="datesheetBody"><tr><td colspan="5" style="text-align:center;color:#888;padding:16px;">Loading...</td></tr></tbody>
        </table>
    </div>
</div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function(){
        initPage('t-datesheet');
        if (typeof requireRoles === 'function' && !requireRoles(['teacher'])) return;
        try {
            const data = await getDatesheets() || [];
            if (!data.length) { $('#datesheetBody').html('<tr><td colspan="5" style="text-align:center;color:#888;">No datesheet available.</td></tr>'); return; }
            let html = '';
            data.forEach(d => {
                const startTime = d.start_time || d.time_from || '';
                const endTime = d.end_time || d.time_to || '';
                html += `<tr><td><strong>${d.date || d.exam_date || '-'}</strong></td><td>${d.exam_name || '-'}</td><td>${d.class_name || '-'}</td><td><strong>${d.subject_name || '-'}</strong></td><td>${startTime + (endTime ? ' – ' + endTime : '')}</td></tr>`;
            });
            $('#datesheetBody').html(html);
        } catch (e) {
            console.error(e);
            $('#datesheetBody').html('<tr><td colspan="5" style="text-align:center;color:#c62828;">Failed to load datesheet.</td></tr>');
        }
    });
    </script>
</body>
</html>
