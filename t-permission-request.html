<!doctype html>
<html class="no-js" lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Permission Request — Teacher Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/teacher-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .request-card { background:#fff; border-radius:10px; border:1px solid #e8eaf6; padding:16px; margin-bottom:12px; transition:box-shadow 0.2s; }
        .request-card:hover { box-shadow:0 4px 12px rgba(13,27,74,0.08); }
        .request-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .request-type { font-size:10px; font-weight:700; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
        .request-type.leave { background:#e3f2fd; color:#1565c0; }
        .request-type.resource { background:#f3e5f5; color:#7b1fa2; }
        .request-type.equipment { background:#fff3e0; color:#ef6c00; }
        .request-type.other { background:#f5f5f5; color:#616161; }
        .request-subject { font-size:14px; font-weight:700; color:#0d1b4a; margin-bottom:6px; }
        .request-desc { font-size:12px; color:#666; line-height:1.5; margin-bottom:10px; }
        .request-meta { display:flex; gap:16px; flex-wrap:wrap; font-size:11px; color:#888; }
        .request-meta i { margin-right:4px; }
        .status-badge { font-size:10px; font-weight:700; padding:4px 10px; border-radius:4px; text-transform:uppercase; }
        .status-badge.pending { background:#fff8e1; color:#f9a825; }
        .status-badge.approved { background:#e8f5e9; color:#2e7d32; }
        .status-badge.rejected { background:#ffebee; color:#c62828; }
        .priority-badge { font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px; margin-left:6px; }
        .priority-badge.urgent { background:#ffebee; color:#c62828; }
        .priority-badge.normal { background:#e8eaf6; color:#3949ab; }
        .admin-remarks { background:#f5f7ff; border-left:3px solid #3949ab; padding:10px 14px; margin-top:10px; border-radius:0 6px 6px 0; font-size:12px; }
        .admin-remarks strong { color:#0d1b4a; display:block; font-size:10px; text-transform:uppercase; margin-bottom:4px; }
        .empty-state { text-align:center; padding:60px 20px; }
        .empty-state i { font-size:48px; color:#c5cae9; margin-bottom:16px; }
        .empty-state h5 { color:#0d1b4a; font-weight:700; margin-bottom:8px; }
        .empty-state p { color:#888; font-size:13px; max-width:400px; margin:0 auto; }
        .form-label-sm { font-size:11px; font-weight:700; color:#555; text-transform:uppercase; margin-bottom:4px; display:block; letter-spacing:0.3px; }
        .action-btns { display:flex; gap:6px; margin-top:10px; }
        .action-btns .btn { font-size:10px; padding:5px 10px; }
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">

                <div class="breadcrumbs-area">
                    <h3>Permission Request</h3>
                    <ul>
                        <li><a href="/teacher-dashboard">Home</a></li>
                        <li>Permission Request</li>
                    </ul>
                </div>

                <!-- Add Request Form -->
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <span><i class="fas fa-paper-plane"></i> <span id="formTitle">Submit New Request</span></span>
                        <button id="cancelEditBtn" class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:700;border:1px solid rgba(255,255,255,0.3);display:none;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel Edit</button>
                    </div>
                    <div class="chart-card-body">
                        <form id="requestForm" onsubmit="return submitRequest(event)">
                            <input type="hidden" id="editingId" value="">
                            <div class="row gutters-8">
                                <div class="col-lg-3 col-md-4 col-sm-6 col-12 form-group">
                                    <label class="form-label-sm">Request Type *</label>
                                    <select id="reqType" class="form-control" required>
                                        <option value="">— Select Type —</option>
                                        <option value="Leave">Leave (छुट्टी)</option>
                                        <option value="Resource">Resource (Study Material)</option>
                                        <option value="Equipment">Equipment (Lab Items, Projector)</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-sm-6 col-12 form-group">
                                    <label class="form-label-sm">Priority</label>
                                    <select id="reqPriority" class="form-control">
                                        <option value="Normal">Normal</option>
                                        <option value="Urgent">Urgent</option>
                                    </select>
                                </div>
                                <div class="col-lg-6 col-md-4 col-12 form-group">
                                    <label class="form-label-sm">Subject / Title *</label>
                                    <input type="text" id="reqSubject" class="form-control" maxlength="200" placeholder="Brief title of your request" required>
                                </div>
                                <div class="col-12 form-group">
                                    <label class="form-label-sm">Description / Details</label>
                                    <textarea id="reqDescription" class="form-control" rows="3" maxlength="2000" placeholder="Provide detailed information about your request..."></textarea>
                                </div>
                                <div class="col-12 form-group" style="margin-top:8px;">
                                    <button type="submit" id="submitBtn" class="btn btn-fill-lg bg-blue-dark btn-hover-yellow" style="font-size:12px;padding:10px 30px;">
                                        <i class="fas fa-paper-plane mr-1"></i> Submit Request
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Filter -->
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-filter"></i> My Requests</div>
                    <div class="chart-card-body">
                        <div class="row gutters-8 align-items-end">
                            <div class="col-lg-2 col-md-3 col-sm-4 col-6 form-group">
                                <label class="form-label-sm">Status</label>
                                <select id="filterStatus" class="form-control" onchange="loadRequests()">
                                    <option value="All">All Status</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Approved">Approved</option>
                                    <option value="Rejected">Rejected</option>
                                </select>
                            </div>
                            <div class="col-lg-2 col-md-3 col-sm-4 col-6 form-group">
                                <label class="form-label-sm">Type</label>
                                <select id="filterType" class="form-control" onchange="loadRequests()">
                                    <option value="All">All Types</option>
                                    <option value="Leave">Leave</option>
                                    <option value="Resource">Resource</option>
                                    <option value="Equipment">Equipment</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-lg-2 col-md-3 col-sm-4 col-6 form-group">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:11px;padding:8px 16px;width:100%;" onclick="loadRequests()">
                                    <i class="fas fa-sync-alt"></i> Refresh
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Requests List -->
                <div id="requestsList">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p style="margin-top:12px;">Loading requests...</p>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function() {
        initPage('t-permission-request');
        if (typeof requireRoles === 'function' && !requireRoles(['teacher'])) return;
        
        var user = typeof getUser === 'function' ? getUser() : null;
        if (!user || !user.linked_id) {
            $('#requestsList').html('<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#f9a825;"></i><h5>Account Not Linked</h5><p>Your teacher account is not properly linked. Please contact the administrator.</p></div>');
            return;
        }
        
        loadRequests();
    });

    async function loadRequests() {
        var filters = {};
        var status = $('#filterStatus').val();
        var type = $('#filterType').val();
        if (status && status !== 'All') filters.status = status;
        if (type && type !== 'All') filters.request_type = type;
        
        try {
            var requests = await getTeacherPermissionRequests(filters);
            renderRequests(requests || []);
        } catch (e) {
            console.error(e);
            showToast('Failed to load requests', 'error');
            $('#requestsList').html('<div class="empty-state"><i class="fas fa-exclamation-circle" style="color:#c62828;"></i><h5>Error Loading</h5><p>Could not load your requests. Please try again.</p></div>');
        }
    }

    function renderRequests(requests) {
        if (!requests.length) {
            $('#requestsList').html('<div class="empty-state"><i class="fas fa-inbox"></i><h5>No Requests Found</h5><p>You haven\'t submitted any permission requests yet. Use the form above to submit your first request.</p></div>');
            return;
        }
        
        var html = requests.map(function(r) {
            var typeClass = (r.request_type || 'other').toLowerCase();
            var statusClass = (r.status || 'pending').toLowerCase();
            var priorityClass = (r.priority || 'normal').toLowerCase();
            var createdDate = r.created_at ? new Date(r.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '-';
            var reviewedDate = r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '';
            
            var actionsHtml = '';
            if (r.status === 'Pending') {
                actionsHtml = '<div class="action-btns">' +
                    '<button class="btn" style="background:#e8eaf6;color:#3949ab;" onclick="editRequest(' + r.id + ')"><i class="fas fa-edit"></i> Edit</button>' +
                    '<button class="btn" style="background:#ffebee;color:#c62828;" onclick="deleteRequest(' + r.id + ')"><i class="fas fa-trash"></i> Delete</button>' +
                '</div>';
            }
            
            var remarksHtml = '';
            if (r.admin_remarks && r.status !== 'Pending') {
                remarksHtml = '<div class="admin-remarks"><strong>Admin Remarks</strong>' + escHtml(r.admin_remarks) + '</div>';
            }
            
            return '<div class="request-card" data-id="' + r.id + '">' +
                '<div class="request-header">' +
                    '<div>' +
                        '<span class="request-type ' + typeClass + '">' + escHtml(r.request_type) + '</span>' +
                        '<span class="priority-badge ' + priorityClass + '">' + escHtml(r.priority) + '</span>' +
                    '</div>' +
                    '<span class="status-badge ' + statusClass + '">' + escHtml(r.status) + '</span>' +
                '</div>' +
                '<div class="request-subject">' + escHtml(r.subject) + '</div>' +
                (r.description ? '<div class="request-desc">' + escHtml(r.description) + '</div>' : '') +
                '<div class="request-meta">' +
                    '<span><i class="fas fa-calendar"></i> Submitted: ' + createdDate + '</span>' +
                    (reviewedDate ? '<span><i class="fas fa-check-circle"></i> Reviewed: ' + reviewedDate + (r.reviewed_by_name ? ' by ' + escHtml(r.reviewed_by_name) : '') + '</span>' : '') +
                '</div>' +
                remarksHtml +
                actionsHtml +
            '</div>';
        }).join('');
        
        $('#requestsList').html(html);
    }

    async function submitRequest(e) {
        e.preventDefault();
        
        var editingId = $('#editingId').val();
        var data = {
            request_type: $('#reqType').val(),
            priority: $('#reqPriority').val(),
            subject: $('#reqSubject').val().trim(),
            description: $('#reqDescription').val().trim()
        };
        
        if (!data.request_type || !data.subject) {
            showToast('Please fill all required fields', 'error');
            return false;
        }
        
        $('#submitBtn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Submitting...');
        
        try {
            if (editingId) {
                await updateTeacherPermissionRequest(editingId, data);
                showToast('Request updated successfully', 'success');
            } else {
                await createTeacherPermissionRequest(data);
                showToast('Request submitted successfully', 'success');
            }
            
            resetForm();
            loadRequests();
        } catch (e) {
            console.error(e);
            showToast(e.message || 'Failed to submit request', 'error');
        } finally {
            $('#submitBtn').prop('disabled', false).html('<i class="fas fa-paper-plane mr-1"></i> Submit Request');
        }
        
        return false;
    }

    async function editRequest(id) {
        try {
            var request = await getTeacherPermissionRequest(id);
            if (!request) { showToast('Request not found', 'error'); return; }
            if (request.status !== 'Pending') { showToast('Can only edit pending requests', 'error'); return; }
            
            $('#editingId').val(request.id);
            $('#reqType').val(request.request_type);
            $('#reqPriority').val(request.priority);
            $('#reqSubject').val(request.subject);
            $('#reqDescription').val(request.description || '');
            
            $('#formTitle').text('Edit Request');
            $('#submitBtn').html('<i class="fas fa-save mr-1"></i> Update Request');
            $('#cancelEditBtn').show();
            
            $('html, body').animate({ scrollTop: 0 }, 300);
        } catch (e) {
            console.error(e);
            showToast('Failed to load request', 'error');
        }
    }

    async function deleteRequest(id) {
        if (!confirm('Are you sure you want to delete this request?')) return;
        
        try {
            await deleteTeacherPermissionRequest(id);
            showToast('Request deleted', 'success');
            loadRequests();
        } catch (e) {
            console.error(e);
            showToast(e.message || 'Failed to delete request', 'error');
        }
    }

    function cancelEdit() {
        resetForm();
    }

    function resetForm() {
        $('#editingId').val('');
        $('#requestForm')[0].reset();
        $('#formTitle').text('Submit New Request');
        $('#submitBtn').html('<i class="fas fa-paper-plane mr-1"></i> Submit Request');
        $('#cancelEditBtn').hide();
    }
    </script>
</body>
</html>
