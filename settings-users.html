<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8"><meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Users — Settings — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/all.min.css"><link rel="stylesheet" href="fonts/flaticon.css"><link rel="stylesheet" href="css/animate.min.css"><link rel="stylesheet" href="css/select2.min.css"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}.form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}.form-control{font-size:12px;height:36px}.list-table{width:100%;border-collapse:collapse}.list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}.list-table tbody td{font-size:12px;padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}.list-table tbody tr:hover td{background:#f5f7ff}.table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}.action-btn{width:26px;height:26px;border:none;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin:0 1px}.action-btn-edit{background:#fff3e0;color:#ef6c00}.action-btn-edit:hover{background:#ef6c00;color:#fff}.action-btn-delete{background:#ffebee;color:#c62828}.action-btn-delete:hover{background:#c62828;color:#fff}
        .branch-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:#e3f2fd;color:#0d47a1}
        .status-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}
        .status-active{background:#e8f5e9;color:#1b5e20}
        .status-inactive{background:#ffebee;color:#c62828}
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area"><h3>Settings</h3><ul><li><a href="/dashboard">Home</a></li><li>Users</li></ul></div>
                <div class="card height-auto"><div class="card-body">
                    <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-users-cog"></i> Users</h3></div></div>
                    <div class="filter-card">
                        <div class="row align-items-end" style="gap:0;">
                            <div class="col-lg-3 col-md-4 col-6 form-group mb-0">
                                <label class="form-label-sm">Search</label>
                                <input type="text" class="form-control" id="fSearch" placeholder="Login ID, role, branch...">
                            </div>
                            <div class="col-lg-4 col-md-5 col-6 form-group mb-0 d-flex align-items-end" style="gap:8px;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:7px 20px;" onclick="doSearch()"><i class="fas fa-search"></i> Search</button>
                                <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:12px;padding:7px 16px;" onclick="doReset()"><i class="fas fa-redo"></i> Reset</button>
                                <a href="/settings-user-add" class="btn btn-sm" style="background:#042954;color:#fff;font-size:12px;padding:7px 18px;"><i class="fas fa-plus"></i> Add User</a>
                            </div>
                        </div>
                    </div>
                    <div class="table-card"><div class="table-responsive" style="padding:0 2px 10px;">
                        <table class="list-table"><thead><tr><th style="width:70px">Action</th><th>Login ID</th><th>Role</th><th>Status</th><th>Last Login</th><th>Branches</th><th>Created</th></tr></thead><tbody id="listBody"></tbody></table>
                    </div></div>
                </div></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script><script src="js/plugins.js"></script><script src="js/popper.min.js"></script><script src="js/bootstrap.min.js"></script><script src="js/select2.min.js"></script><script src="js/jquery.scrollUp.min.js"></script><script src="js/api.js"></script><script src="js/app.js"></script><script src="js/main.js"></script>
    <script>
    $(function(){
        initPage('settings-users');
        let allUsers = [], allBranches = [];
        async function load(filter){
            if(!allUsers.length){
                const [uRes, bRes] = await Promise.all([getUsers(), getBranches()]);
                allUsers = Array.isArray(uRes) ? uRes : (uRes.results || []);
                allBranches = Array.isArray(bRes) ? bRes : [];
            }
            let list = allUsers;
            if(filter){
                const q = filter.toLowerCase();
                list = list.filter(u =>
                    (u.login_id||'').toLowerCase().includes(q) ||
                    (u.role||'').toLowerCase().includes(q) ||
                    (u.branch_name||'').toLowerCase().includes(q)
                );
            }
            const rows = list.map(u=>{
                const br = allBranches.find(b=>b.id===u.branch_id);
                const branchIds = Array.isArray(u.branch_ids) ? u.branch_ids : [];
                const branchBadges = branchIds.length
                    ? branchIds.map(id => {
                        const rb = allBranches.find(b => Number(b.id) === Number(id));
                        return rb ? '<span class="branch-badge" style="margin-right:4px;">' + rb.name + '</span>' : '';
                    }).join('')
                    : (br ? '<span class="branch-badge">' + br.name + '</span>' : (u.branch_name || '—'));
                const createdAt = u.created_at ? String(u.created_at).replace('T',' ').slice(0,19) : '—';
                const lastLogin = u.last_login ? String(u.last_login).replace('T',' ').slice(0,19) : '—';
                return `<tr>
                    <td style="white-space:nowrap;"><a href="/settings-user-add?id=${u.id}" class="action-btn action-btn-edit"><i class="fas fa-pen"></i></a> <button class="action-btn action-btn-delete" onclick="del(${u.id})"><i class="fas fa-trash-alt"></i></button></td>
                    <td><strong>${u.login_id||''}</strong></td>
                    <td>${u.role||'—'}</td>
                    <td><span class="status-badge ${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>${lastLogin}</td>
                        <td>${branchBadges}</td>
                    <td>${createdAt}</td></tr>`;
            }).join('');
            $('#listBody').html(rows||'<tr><td colspan="7" class="text-center text-muted" style="padding:30px;">No users found</td></tr>');
        }
        window.doSearch=function(){ load($('#fSearch').val().trim()); };
        window.doReset=function(){ $('#fSearch').val(''); allUsers=[]; load(); };
        window.del=async function(id){ if(!confirm('Delete this user?'))return; try { await deleteUser(id); allUsers=[]; load(); showToast('User deleted','success'); } catch(e){ showToast(e.message||'Failed to delete','error'); } };
        $('#fSearch').on('keyup',function(e){ if(e.key==='Enter') doSearch(); });
        load();
    });
    </script>
</body>
</html>
