<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Fee Amount Slab — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .action-btn{width:26px;height:26px;border:none;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin:0 1px}
        .action-btn-edit{background:#fff3e0;color:#ef6c00}.action-btn-edit:hover{background:#ef6c00;color:#fff}
        .action-btn-delete{background:#ffebee;color:#c62828}.action-btn-delete:hover{background:#c62828;color:#fff}
        .action-btn-print{background:#e3f2fd;color:#0d47a1}.action-btn-print:hover{background:#0d47a1;color:#fff}
        .slab-form{background:#f5f7ff;border-radius:12px;border:1px solid #d6ddf5;padding:18px 20px;margin-bottom:16px}
        .amount-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #eee}
        .amount-row:last-child{border-bottom:none}
        .amount-label{font-size:12px;font-weight:600;color:#333;flex:1;min-width:180px}
        .amount-label small{font-size:10px;color:#888;font-weight:400}
        .amount-input{width:120px}
        @media print{
            #sidebar-container,#header-container,.breadcrumbs-area,.filter-card,#addSection,.no-print{display:none!important}
            .dashboard-content-one{margin:0!important;padding:10px!important}
            .card{box-shadow:none!important;border:none!important}
            .table-card{border:1px solid #ccc!important}
            .list-table thead th{background:#0d1b4a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Fee Master</h3>
                    <ul><li><a href="/dashboard">Home</a></li><li>Fee Amount Slab</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-layer-group"></i> Fee Amount Slab</h3></div></div>

                        
                        <div class="filter-card no-print">
                            <div class="row align-items-end" style="gap:0;">
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Fee Category</label>
                                    <select class="form-control" id="fCategory"></select>
                                </div>
                                <div class="col-lg-6 col-md-6 col-12 form-group d-flex align-items-end" style="gap:8px;">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:7px 20px;" onclick="searchSlabs()"><i class="fas fa-search"></i> Search</button>
                                    <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:12px;padding:7px 20px;" onclick="clearFilter()"><i class="fas fa-redo"></i> Clear</button>
                                    <button class="btn btn-sm" style="background:#042954;color:#fff;font-size:12px;padding:7px 16px;" onclick="showAddForm()"><i class="fas fa-plus"></i> Add Slab</button>
                                </div>
                            </div>
                        </div>

                        
                        <div class="slab-form no-print" id="addSection" style="display:none;">
                            <h6 style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;" id="slabFormTitle"><i class="fas fa-plus-circle"></i> Add Fee Slab</h6>
                            <input type="hidden" id="editClassId">
                            <input type="hidden" id="editCategory">
                            <div class="row" style="gap:0;">
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Fee Category</label>
                                    <select class="form-control" id="sCategory"></select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Class</label>
                                    <select class="form-control" id="sClass"><option value="">— Select —</option></select>
                                </div>
                            </div>
                            <div id="amountFields" style="margin-top:8px;"></div>
                            <div class="mt-3" style="display:flex;gap:8px;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;padding:7px 26px;" onclick="submitSlab()"><i class="fas fa-save"></i> Submit</button>
                                <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:13px;padding:7px 20px;" onclick="cancelAdd()"><i class="fas fa-times"></i> Cancel</button>
                            </div>
                        </div>

                        
                        <div class="table-card" id="slabTableCard">
                            <div class="table-responsive" style="padding:0 2px 10px;">
                                <table class="list-table" id="slabTable">
                                    <thead id="slabHead"></thead>
                                    <tbody id="slabBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="printModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:#0d1b4a;color:#fff;padding:10px 16px;">
                    <h6 class="modal-title" style="font-size:13px;font-weight:700;"><i class="fas fa-print"></i> Fee Slab Preview</h6>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body" id="printBody" style="padding:20px;"></div>
                <div class="modal-footer" style="padding:8px 16px;">
                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;" onclick="doPrint()"><i class="fas fa-print"></i> Print</button>
                    <button class="btn btn-sm btn-light" data-dismiss="modal" style="font-size:13px;">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function() {
        initPage('fee-amount-slab');

        let classCache = [], particularCache = [], slabRows = [];
        try { [classCache, particularCache, slabRows] = await Promise.all([getClasses(), getFeeParticulars(), getFeeSlabs()]); } catch(e) {}

        let categories = ['Default', ...new Set(slabRows.map(r => r.category).filter(c => c && c !== 'Default'))];
        categories.forEach(c => {
            $('#fCategory').append(`<option value="${c}">${c}</option>`);
            $('#sCategory').append(`<option value="${c}">${c}</option>`);
        });
        classCache.forEach(c => $('#sClass').append(`<option value="${c.id}">Class ${c.name}</option>`));

        function groupSlabs(rows) {
            const map = {};
            rows.forEach(r => {
                const key = r.class_id + '|' + (r.category || 'Default');
                if (!map[key]) map[key] = { class_id: r.class_id, category: r.category || 'Default', amounts: {} };
                map[key].amounts[r.particular_id] = r.amount;
            });
            return Object.values(map);
        }

        function getNonTransportParticulars() {
            return particularCache.filter(p => !p.is_transport);
        }

        function buildAmountFields(amounts) {
            let html = '<div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:8px;">Fee Amounts</div>';
            getNonTransportParticulars().forEach(p => {
                const modeLabel = p.mode ? '(' + p.mode.toLowerCase() + ')' : '';
                const val = (amounts && amounts[p.id]) ? amounts[p.id] : '';
                html += `<div class="amount-row">
                    <div class="amount-label">${p.name} <small>${modeLabel}</small></div>
                    <input type="number" class="form-control amount-input" data-pid="${p.id}" placeholder="₹ 0" min="0" value="${val}">
                </div>`;
            });
            $('#amountFields').html(html);
        }

        function buildTableHeader() {
            let th = '<tr><th style="width:50px">Sr No.</th><th>Fee Category</th><th>Class</th>';
            getNonTransportParticulars().forEach(p => {
                const short = p.name + (p.mode ? ' (' + p.mode.charAt(0) + ')' : '');
                th += `<th class="text-center">${short}</th>`;
            });
            th += '<th class="text-center">Total</th><th style="width:110px">Action</th></tr>';
            $('#slabHead').html(th);
        }

        function loadList(category) {
            const cat = category || $('#fCategory').val() || 'Default';
            const grouped = groupSlabs(slabRows).filter(s => s.category === cat);

            buildTableHeader();

            if (grouped.length === 0) {
                const colCount = getNonTransportParticulars().length + 4;
                $('#slabBody').html(`<tr><td colspan="${colCount}" class="text-center text-muted" style="padding:30px;">No fee slabs found for this category</td></tr>`);
                return;
            }

            const rows = grouped.map((s, i) => {
                const cl = classCache.find(c => c.id === s.class_id);
                let total = 0;
                let tds = '';
                getNonTransportParticulars().forEach(p => {
                    const amt = (s.amounts && s.amounts[p.id]) || 0;
                    total += amt;
                    tds += `<td class="text-center">${amt ? '₹' + amt.toLocaleString() : '—'}</td>`;
                });
                return `<tr>
                    <td class="text-center">${i + 1}</td>
                    <td>${s.category}</td>
                    <td><strong>Class ${cl ? cl.name : '—'}</strong></td>
                    ${tds}
                    <td class="text-center"><strong style="color:#0d1b4a;">₹${total.toLocaleString()}</strong></td>
                    <td>
                        <button class="action-btn action-btn-print" title="Preview & Print" onclick="previewSlab(${s.class_id},'${s.category}')"><i class="fas fa-print"></i></button>
                        <button class="action-btn action-btn-edit" title="Edit" onclick="editSlab(${s.class_id},'${s.category}')"><i class="fas fa-pen"></i></button>
                        <button class="action-btn action-btn-delete" title="Delete" onclick="removeSlab(${s.class_id},'${s.category}')"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            }).join('');
            $('#slabBody').html(rows);
        }

        window.searchSlabs = function() { loadList(); };
        window.clearFilter = function() { $('#fCategory').val('Default'); loadList(); };

        window.showAddForm = function() {
            $('#editClassId').val('');
            $('#editCategory').val('');
            $('#sCategory').val($('#fCategory').val() || 'Default');
            $('#sClass').val('');
            buildAmountFields();
            $('#slabFormTitle').html('<i class="fas fa-plus-circle"></i> Add Fee Slab');
            $('#addSection').slideDown(200);
            $('html, body').animate({ scrollTop: $('#addSection').offset().top - 80 }, 300);
        };

        window.cancelAdd = function() {
            $('#addSection').slideUp(200);
            $('#editClassId').val('');
            $('#editCategory').val('');
        };

        window.submitSlab = async function() {
            const category = $('#sCategory').val();
            const classId = parseInt($('#sClass').val()) || 0;

            if (!category) { showToast('Select a fee category', 'error'); return; }
            if (!classId) { showToast('Select a class', 'error'); return; }

            const slabs = [];
            let hasAny = false;
            $('.amount-input').each(function() {
                const pid = parseInt($(this).data('pid'));
                const val = parseFloat($(this).val()) || 0;
                if (val > 0) { slabs.push({ class_id: classId, particular_id: pid, amount: val }); hasAny = true; }
            });
            if (!hasAny) { showToast('Enter at least one fee amount', 'error'); return; }

            slabs.forEach(s => s.category = category);

            try {
                await saveFeeSlabs({ slabs });
                showToast($('#editClassId').val() ? 'Fee slab updated' : 'Fee slab added', 'success');
                slabRows = await getFeeSlabs();
                cancelAdd();
                loadList();
            } catch(e) { showToast('Error saving slab', 'error'); }
        };

        window.editSlab = function(classId, category) {
            const grouped = groupSlabs(slabRows);
            const s = grouped.find(x => x.class_id === classId && x.category === category);
            if (!s) return;
            $('#editClassId').val(classId);
            $('#editCategory').val(category);
            $('#sCategory').val(s.category);
            $('#sClass').val(s.class_id);
            buildAmountFields(s.amounts);
            $('#slabFormTitle').html('<i class="fas fa-edit"></i> Edit Fee Slab');
            $('#addSection').slideDown(200);
            $('html, body').animate({ scrollTop: $('#addSection').offset().top - 80 }, 300);
        };

        window.removeSlab = async function(classId, category) {
            if (!confirm('Delete this fee slab?')) return;
            try {
                await deleteFeeSlabsByClass(classId, category);
                slabRows = await getFeeSlabs();
                loadList();
                showToast('Fee slab deleted', 'success');
            } catch(e) { showToast('Error deleting slab', 'error'); }
        };

        window.previewSlab = function(classId, category) {
            const grouped = groupSlabs(slabRows);
            const s = grouped.find(x => x.class_id === classId && x.category === category);
            if (!s) return;
            const cl = classCache.find(c => c.id === s.class_id);
            let total = 0;
            let rows = '';
            getNonTransportParticulars().forEach((p, i) => {
                const amt = (s.amounts && s.amounts[p.id]) || 0;
                total += amt;
                const modeLabel = p.mode ? ' (' + p.mode + ')' : '';
                rows += `<tr>
                    <td style="padding:6px 10px;border:1px solid #ddd;text-align:center;font-size:12px;">${i + 1}</td>
                    <td style="padding:6px 10px;border:1px solid #ddd;font-size:12px;">${p.name}${modeLabel}</td>
                    <td style="padding:6px 10px;border:1px solid #ddd;text-align:right;font-size:12px;font-weight:600;">${amt ? '₹ ' + amt.toLocaleString() : '—'}</td>
                </tr>`;
            });
            rows += `<tr style="background:#f5f7ff;">
                <td colspan="2" style="padding:8px 10px;border:1px solid #ddd;font-size:12px;font-weight:700;text-align:right;">Grand Total</td>
                <td style="padding:8px 10px;border:1px solid #ddd;font-size:13px;font-weight:800;text-align:right;color:#0d1b4a;">₹ ${total.toLocaleString()}</td>
            </tr>`;

            $('#printBody').html(`
                <div style="text-align:center;margin-bottom:16px;">
                    <h5 style="font-size:16px;font-weight:800;color:#0d1b4a;margin:0;">Fee Amount Slab</h5>
                    <p style="font-size:11px;color:#888;margin:4px 0;">${s.category} Category</p>
                    <p style="font-size:13px;font-weight:700;color:#333;margin:4px 0;">Class: ${cl ? cl.name : '—'}</p>
                </div>
                <table style="width:100%;border-collapse:collapse;">
                    <thead><tr>
                        <th style="padding:8px 10px;background:#0d1b4a;color:#fff;font-size:10px;text-transform:uppercase;border:1px solid #0d1b4a;text-align:center;">Sr</th>
                        <th style="padding:8px 10px;background:#0d1b4a;color:#fff;font-size:10px;text-transform:uppercase;border:1px solid #0d1b4a;">Fee Particular</th>
                        <th style="padding:8px 10px;background:#0d1b4a;color:#fff;font-size:10px;text-transform:uppercase;border:1px solid #0d1b4a;text-align:right;">Amount (₹)</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `);
            $('#printModal').modal('show');
        };

        window.doPrint = function() {
            const content = document.getElementById('printBody').innerHTML;
            const win = window.open('', '_blank', 'width=800,height=600');
            win.document.write(`<html><head><title>Fee Slab Print</title><style>body{font-family:Arial,sans-serif;padding:20px;} table{width:100%;border-collapse:collapse;} th,td{padding:6px 10px;border:1px solid #ddd;} th{background:#0d1b4a;color:#fff;font-size:10px;text-transform:uppercase;-webkit-print-color-adjust:exact;print-color-adjust:exact;}</style></head><body>${content}</body></html>`);
            win.document.close();
            win.focus();
            win.print();
        };

        loadList();
    });
    </script>
</body>
</html>
