<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8"><meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Subject — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/all.min.css"><link rel="stylesheet" href="fonts/flaticon.css"><link rel="stylesheet" href="css/animate.min.css"><link rel="stylesheet" href="css/select2.min.css"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}.form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}.form-control{font-size:12px;height:36px}.list-table{width:100%;border-collapse:collapse}.list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}.list-table tbody td{font-size:12px;padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}.list-table tbody tr:hover td{background:#f5f7ff}.table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}.action-btn{width:26px;height:26px;border:none;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin:0 1px}.action-btn-edit{background:#fff3e0;color:#ef6c00}.action-btn-edit:hover{background:#ef6c00;color:#fff}.action-btn-delete{background:#ffebee;color:#c62828}.action-btn-delete:hover{background:#c62828;color:#fff}
        .activity-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#ede7f6;color:#311b92;margin-left:4px}
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area"><h3>Masters</h3><ul><li><a href="/dashboard">Home</a></li><li>Subject</li></ul></div>
                <div class="card height-auto"><div class="card-body">
                    <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-book-open"></i> Subject</h3></div></div>
                    <div class="filter-card" id="formSection">
                        <h6 style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;" id="formTitle"><i class="fas fa-plus-circle"></i> Add Subject</h6>
                        <input type="hidden" id="editId">
                        <div class="row align-items-end" style="gap:0;">
                            <div class="col-lg-2 col-md-2 col-4 form-group mb-0">
                                <label class="form-label-sm">Serial No.</label>
                                <input type="number" class="form-control" id="sSerial" placeholder="1" min="1">
                            </div>
                            <div class="col-lg-3 col-md-4 col-6 form-group mb-0">
                                <label class="form-label-sm">Subject Name</label>
                                <input type="text" class="form-control" id="sName" placeholder="e.g. Mathematics, Yoga...">
                            </div>
                            <div class="col-lg-2 col-md-3 col-6 form-group mb-0">
                                <label class="form-label-sm">&nbsp;</label>
                                <label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;padding-top:8px;">
                                    <input type="checkbox" id="sActivity" style="width:16px;height:16px;cursor:pointer;"> Is Activity
                                </label>
                            </div>
                            <div class="col-lg-3 col-md-3 col-6 form-group mb-0 d-flex align-items-end" style="gap:8px;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;padding:7px 22px;" onclick="saveItem()"><i class="fas fa-save"></i> Save</button>
                                <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:13px;padding:7px 16px;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-card"><div class="table-responsive" style="padding:0 2px 10px;">
                        <table class="list-table"><thead><tr><th style="width:50px">Sr No.</th><th>Subject</th><th style="width:90px">Action</th></tr></thead><tbody id="listBody"></tbody></table>
                    </div></div>
                </div></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script><script src="js/plugins.js"></script><script src="js/popper.min.js"></script><script src="js/bootstrap.min.js"></script><script src="js/select2.min.js"></script><script src="js/jquery.scrollUp.min.js"></script><script src="js/api.js"></script><script src="js/app.js"></script><script src="js/main.js"></script>
    <script>
    $(async function(){
        initPage('master-subject');
        let cache = [];
        async function load(){
            try { cache = await getSubjects(); } catch(e){ showToast('Failed to load','error'); }
            const rows = cache.map((s,i)=>{
                const actBadge = s.is_activity?'<span class="activity-badge">Activity</span>':'';
                return `<tr><td class="text-center">${i+1}</td><td><strong>${s.name}</strong>${actBadge}</td><td style="white-space:nowrap;"><button class="action-btn action-btn-edit" onclick="editItem(${s.id})"><i class="fas fa-pen"></i></button> <button class="action-btn action-btn-delete" onclick="del(${s.id})"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            }).join('');
            $('#listBody').html(rows||'<tr><td colspan="3" class="text-center text-muted" style="padding:30px;">No subjects</td></tr>');
        }
        window.saveItem=async function(){
            const name=$('#sName').val().trim(), is_activity=$('#sActivity').is(':checked')?1:0, editId=parseInt($('#editId').val())||0, serial=parseInt($('#sSerial').val())||0;
            if(!name){showToast('Enter subject name','error');return;}
            try {
                const data={name, code:name.substring(0,3).toUpperCase(), has_practical:0, is_activity, display_order:serial};
                if(editId) await updateMasterData('subjects', editId, data);
                else await createMasterData('subjects', data);
                cancelEdit(); await load(); showToast(editId?'Updated':'Added','success');
            } catch(e){ showToast('Failed to save','error'); }
        };
        window.editItem=function(id){
            const s=cache.find(x=>x.id===id); if(!s)return;
            $('#editId').val(s.id);$('#sName').val(s.name);$('#sActivity').prop('checked',!!s.is_activity);$('#sSerial').val(s.display_order||'');
            $('#formTitle').html('<i class="fas fa-edit"></i> Edit Subject');
        };
        window.cancelEdit=function(){$('#editId').val('');$('#sName').val('');$('#sSerial').val('');$('#sActivity').prop('checked',false);$('#formTitle').html('<i class="fas fa-plus-circle"></i> Add Subject');};
        window.del=async function(id){if(!confirm('Delete?'))return; try{ await deleteMasterData('subjects',id); await load(); showToast('Deleted','success'); }catch(e){showToast('Failed','error');}};
        await load();
    });
    </script>
</body>
</html>
