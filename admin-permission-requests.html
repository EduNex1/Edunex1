<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Permission Requests — Settings — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card { background:#fff; border-radius:12px; border:1px solid #f0f0f0; padding:18px 20px; margin-bottom:16px; }
        .form-label-sm { font-size:11px; font-weight:700; color:#555; text-transform:uppercase; margin-bottom:4px; display:block; letter-spacing:.3px; }
        .form-control { font-size:12px; height:36px; }
        .r-table { width:100%; border-collapse:collapse; }
        .r-table thead th { font-size:10px; font-weight:700; text-transform:uppercase; background:#0d1b4a; color:#fff; padding:8px 10px; text-align:left; white-space:nowrap; }
        .r-table tbody td { font-size:12px; padding:9px 10px; border-bottom:1px solid #eef1f6; vertical-align:middle; }
        .r-table tbody tr:hover td { background:#f8faff; }
        .status-badge { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:700; padding:4px 9px; border-radius:999px; text-transform:uppercase; }
        .status-pending { background:#fff3e0; color:#ef6c00; }
        .status-approved { background:#e8f5e9; color:#2e7d32; }
        .status-rejected { background:#ffebee; color:#c62828; }
        .type-badge { font-size:9px; font-weight:700; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
        .type-leave { background:#e3f2fd; color:#1565c0; }
        .type-resource { background:#f3e5f5; color:#7b1fa2; }
        .type-equipment { background:#fff3e0; color:#ef6c00; }
        .type-other { background:#f5f5f5; color:#616161; }
        .priority-urgent { color:#c62828; font-weight:700; }
        .priority-normal { color:#666; }
        .action-btn { border:none; background:none; cursor:pointer; font-size:13px; padding:4px 8px; border-radius:4px; }
        .action-btn:hover { background:#eef2ff; }
        .action-btn.view { color:#1565c0; }
        .action-btn.approve { color:#2e7d32; }
        .action-btn.reject { color:#c62828; }
        .action-btn.delete { color:#c62828; }
        .stats-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .stat-box { background:#fff; border-radius:10px; border:1px solid #e8eaf6; padding:14px 18px; min-width:140px; flex:1; }
        .stat-box .stat-label { font-size:10px; font-weight:700; color:#888; text-transform:uppercase; margin-bottom:4px; }
        .stat-box .stat-value { font-size:22px; font-weight:700; color:#0d1b4a; }
        .stat-box.pending .stat-value { color:#ef6c00; }
        .stat-box.approved .stat-value { color:#2e7d32; }
        .stat-box.rejected .stat-value { color:#c62828; }
        .empty-state { text-align:center; padding:50px; color:#bbb; }
        .empty-state i { font-size:42px; margin-bottom:12px; display:block; }
        .table-card { background:#fff; border:2px solid #e0e0e0; border-radius:14px; overflow:hidden; }
        .detail-modal .modal-header { background:#0d1b4a; color:#fff; }
        .detail-row { display:flex; border-bottom:1px solid #f0f0f0; padding:10px 0; }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { width:140px; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; flex-shrink:0; }
        .detail-value { font-size:13px; color:#333; flex:1; }
        .remarks-input { width:100%; min-height:80px; border:1px solid #ddd; border-radius:6px; padding:10px; font-size:12px; margin-top:8px; }
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Settings</h3>
                    <ul>
                        <li><a href="/dashboard">Home</a></li>
                        <li>Teacher Permission Requests</li>
                    </ul>
                </div>

                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title"><h3><i class="fas fa-hand-paper"></i> Teacher Permission Requests</h3></div>
                        </div>

                        <!-- Stats Row -->
                        <div class="stats-row">
                            <div class="stat-box pending">
                                <div class="stat-label">Pending</div>
                                <div class="stat-value" id="statPending">0</div>
                            </div>
                            <div class="stat-box approved">
                                <div class="stat-label">Approved</div>
                                <div class="stat-value" id="statApproved">0</div>
                            </div>
                            <div class="stat-box rejected">
                                <div class="stat-label">Rejected</div>
                                <div class="stat-value" id="statRejected">0</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Total</div>
                                <div class="stat-value" id="statTotal">0</div>
                            </div>
                        </div>

                        <!-- Filter Card -->
                        <div class="filter-card">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Status</label>
                                    <select class="form-control" id="fStatus">
                                        <option value="">All Status</option>
                                        <option value="Pending" selected>Pending</option>
                                        <option value="Approved">Approved</option>
                                        <option value="Rejected">Rejected</option>
                                    </select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Request Type</label>
                                    <select class="form-control" id="fType">
                                        <option value="">All Types</option>
                                        <option value="Leave">Leave</option>
                                        <option value="Resource">Resource</option>
                                        <option value="Equipment">Equipment</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Priority</label>
                                    <select class="form-control" id="fPriority">
                                        <option value="">All Priority</option>
                                        <option value="Urgent">Urgent</option>
                                        <option value="Normal">Normal</option>
                                    </select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Date From</label>
                                    <input type="date" class="form-control" id="fDateFrom">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Date To</label>
                                    <input type="date" class="form-control" id="fDateTo">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <button class="btn btn-fill-md w-100" style="background:#0d1b4a;color:#fff;font-size:11px;" onclick="loadRequests()">
                                        <i class="fas fa-search"></i> Search
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="table-card">
                            <div class="table-responsive" style="padding:0 2px 10px;">
                                <table class="r-table">
                                    <thead>
                                        <tr>
                                            <th style="width:40px">Sr</th>
                                            <th>Teacher</th>
                                            <th>Type</th>
                                            <th>Subject</th>
                                            <th>Priority</th>
                                            <th>Date</th>
                                            <th>Status</th>
                                            <th style="width:120px;text-align:center;">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="requestsBody">
                                        <tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Loading requests...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- View/Action Modal -->
    <div class="modal fade detail-modal" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-file-alt"></i> Request Details</h5>
                    <button type="button" class="close" data-dismiss="modal" style="color:#fff;opacity:1;"><span>&times;</span></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content filled by JS -->
                </div>
                <div class="modal-footer" id="modalFooter">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    var allRequests = [];
    var canModify = false;
    var canDelete = false;

    $(async function() {
        initPage('admin-permission-requests');
        if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;
        
        // Check module permissions
        var user = typeof getUser === 'function' ? getUser() : null;
        if (user && user.role === 'super_admin') {
            canModify = true;
            canDelete = true;
        } else {
            var perms = typeof getUserPerms === 'function' ? getUserPerms() : null;
            if (perms && Array.isArray(perms)) {
                var modPerm = perms.find(function(p) { return p.module === 'permission_requests'; });
                if (modPerm) {
                    canModify = !!modPerm.modify;
                    canDelete = !!modPerm.can_delete;
                }
            }
        }
        
        loadRequests();
    });

    async function loadRequests() {
        var filters = {};
        var status = $('#fStatus').val();
        var type = $('#fType').val();
        var priority = $('#fPriority').val();
        var fromDate = $('#fDateFrom').val();
        var toDate = $('#fDateTo').val();
        
        if (status) filters.status = status;
        if (type) filters.request_type = type;
        if (priority) filters.priority = priority;
        if (fromDate) filters.from_date = fromDate;
        if (toDate) filters.to_date = toDate;
        
        try {
            allRequests = await getTeacherPermissionRequests(filters) || [];
            updateStats();
            renderTable();
        } catch (e) {
            console.error(e);
            showToast('Failed to load requests', 'error');
            $('#requestsBody').html('<tr><td colspan="8" class="empty-state"><i class="fas fa-exclamation-circle" style="color:#c62828;"></i><br>Error loading data</td></tr>');
        }
    }

    function updateStats() {
        // Load all requests for stats (without filters)
        getTeacherPermissionRequests({}).then(function(all) {
            var pending = 0, approved = 0, rejected = 0;
            (all || []).forEach(function(r) {
                if (r.status === 'Pending') pending++;
                else if (r.status === 'Approved') approved++;
                else if (r.status === 'Rejected') rejected++;
            });
            $('#statPending').text(pending);
            $('#statApproved').text(approved);
            $('#statRejected').text(rejected);
            $('#statTotal').text((all || []).length);
        }).catch(function() {});
    }

    function renderTable() {
        if (!allRequests.length) {
            $('#requestsBody').html('<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i><br>No requests found</td></tr>');
            return;
        }
        
        var html = allRequests.map(function(r, i) {
            var typeClass = 'type-' + (r.request_type || 'other').toLowerCase();
            var statusClass = 'status-' + (r.status || 'pending').toLowerCase();
            var priorityClass = 'priority-' + (r.priority || 'normal').toLowerCase();
            var createdDate = r.created_at ? new Date(r.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '-';
            
            var actionsHtml = '<button class="action-btn view" onclick="viewRequest(' + r.id + ')" title="View Details"><i class="fas fa-eye"></i></button>';
            
            if (r.status === 'Pending' && canModify) {
                actionsHtml += '<button class="action-btn approve" onclick="showActionModal(' + r.id + ', \'Approved\')" title="Approve"><i class="fas fa-check"></i></button>';
                actionsHtml += '<button class="action-btn reject" onclick="showActionModal(' + r.id + ', \'Rejected\')" title="Reject"><i class="fas fa-times"></i></button>';
            }
            
            if (canDelete) {
                actionsHtml += '<button class="action-btn delete" onclick="deleteRequest(' + r.id + ')" title="Delete"><i class="fas fa-trash"></i></button>';
            }
            
            return '<tr>' +
                '<td>' + (i + 1) + '</td>' +
                '<td><strong>' + escHtml(r.staff_name || '-') + '</strong><br><small style="color:#888;">' + escHtml(r.employee_id || '') + ' | ' + escHtml(r.designation || '') + '</small></td>' +
                '<td><span class="type-badge ' + typeClass + '">' + escHtml(r.request_type) + '</span></td>' +
                '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escHtml(r.subject) + '">' + escHtml(r.subject) + '</td>' +
                '<td class="' + priorityClass + '">' + escHtml(r.priority) + '</td>' +
                '<td>' + createdDate + '</td>' +
                '<td><span class="status-badge ' + statusClass + '">' + escHtml(r.status) + '</span></td>' +
                '<td style="text-align:center;">' + actionsHtml + '</td>' +
            '</tr>';
        }).join('');
        
        $('#requestsBody').html(html);
    }

    async function viewRequest(id) {
        var r = allRequests.find(function(x) { return x.id === id; });
        if (!r) {
            try { r = await getTeacherPermissionRequest(id); } catch(e) { showToast('Request not found', 'error'); return; }
        }
        
        var createdDate = r.created_at ? new Date(r.created_at).toLocaleString('en-IN') : '-';
        var reviewedDate = r.reviewed_at ? new Date(r.reviewed_at).toLocaleString('en-IN') : '-';
        
        var html = '<div class="detail-row"><div class="detail-label">Teacher</div><div class="detail-value"><strong>' + escHtml(r.staff_name) + '</strong><br><small>' + escHtml(r.employee_id || '') + ' | ' + escHtml(r.designation || '') + (r.staff_phone ? ' | ' + escHtml(r.staff_phone) : '') + '</small></div></div>' +
            '<div class="detail-row"><div class="detail-label">Request Type</div><div class="detail-value"><span class="type-badge type-' + (r.request_type || 'other').toLowerCase() + '">' + escHtml(r.request_type) + '</span></div></div>' +
            '<div class="detail-row"><div class="detail-label">Priority</div><div class="detail-value priority-' + (r.priority || 'normal').toLowerCase() + '">' + escHtml(r.priority) + '</div></div>' +
            '<div class="detail-row"><div class="detail-label">Subject</div><div class="detail-value"><strong>' + escHtml(r.subject) + '</strong></div></div>' +
            '<div class="detail-row"><div class="detail-label">Description</div><div class="detail-value">' + (r.description ? escHtml(r.description) : '<em style="color:#999;">No description provided</em>') + '</div></div>' +
            '<div class="detail-row"><div class="detail-label">Submitted</div><div class="detail-value">' + createdDate + '</div></div>' +
            '<div class="detail-row"><div class="detail-label">Status</div><div class="detail-value"><span class="status-badge status-' + (r.status || 'pending').toLowerCase() + '">' + escHtml(r.status) + '</span></div></div>';
        
        if (r.status !== 'Pending') {
            html += '<div class="detail-row"><div class="detail-label">Reviewed At</div><div class="detail-value">' + reviewedDate + (r.reviewed_by_name ? ' by ' + escHtml(r.reviewed_by_name) : '') + '</div></div>';
            if (r.admin_remarks) {
                html += '<div class="detail-row"><div class="detail-label">Admin Remarks</div><div class="detail-value">' + escHtml(r.admin_remarks) + '</div></div>';
            }
        }
        
        $('#modalBody').html(html);
        
        var footerHtml = '<button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>';
        if (r.status === 'Pending' && canModify) {
            footerHtml = '<button type="button" class="btn" style="background:#2e7d32;color:#fff;" onclick="showActionModal(' + r.id + ', \'Approved\')"><i class="fas fa-check"></i> Approve</button>' +
                '<button type="button" class="btn" style="background:#c62828;color:#fff;" onclick="showActionModal(' + r.id + ', \'Rejected\')"><i class="fas fa-times"></i> Reject</button>' +
                footerHtml;
        }
        $('#modalFooter').html(footerHtml);
        
        $('#detailModal').modal('show');
    }

    function showActionModal(id, action) {
        var r = allRequests.find(function(x) { return x.id === id; });
        var actionLabel = action === 'Approved' ? 'Approve' : 'Reject';
        var actionColor = action === 'Approved' ? '#2e7d32' : '#c62828';
        
        var html = '<div style="text-align:center;margin-bottom:16px;">' +
            '<i class="fas fa-' + (action === 'Approved' ? 'check-circle' : 'times-circle') + '" style="font-size:48px;color:' + actionColor + ';"></i>' +
            '<h5 style="margin:12px 0 4px;">' + actionLabel + ' Request?</h5>' +
            '<p style="color:#666;font-size:13px;">Request from <strong>' + escHtml(r ? r.staff_name : '') + '</strong></p>' +
            '</div>' +
            '<div class="form-group">' +
            '<label class="form-label-sm">Remarks (Optional)</label>' +
            '<textarea id="actionRemarks" class="remarks-input" placeholder="Add any remarks for the teacher..."></textarea>' +
            '</div>';
        
        $('#modalBody').html(html);
        $('#modalFooter').html(
            '<button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>' +
            '<button type="button" class="btn" style="background:' + actionColor + ';color:#fff;" onclick="processAction(' + id + ', \'' + action + '\')"><i class="fas fa-' + (action === 'Approved' ? 'check' : 'times') + '"></i> ' + actionLabel + '</button>'
        );
        
        $('#detailModal').modal('show');
    }

    async function processAction(id, action) {
        var remarks = $('#actionRemarks').val().trim();
        
        try {
            await updateTeacherPermissionRequest(id, {
                status: action,
                admin_remarks: remarks
            });
            showToast('Request ' + action.toLowerCase(), 'success');
            $('#detailModal').modal('hide');
            loadRequests();
        } catch (e) {
            console.error(e);
            showToast(e.message || 'Failed to update request', 'error');
        }
    }

    async function deleteRequest(id) {
        if (!confirm('Are you sure you want to delete this request? This action cannot be undone.')) return;
        
        try {
            await deleteTeacherPermissionRequest(id);
            showToast('Request deleted', 'success');
            loadRequests();
        } catch (e) {
            console.error(e);
            showToast(e.message || 'Failed to delete request', 'error');
        }
    }
    </script>
</body>
</html>
