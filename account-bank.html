<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Bank Accounts — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .action-icon{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
        .action-icon.edit{background:#e3f2fd;color:#1565c0}.action-icon.edit:hover{background:#1565c0;color:#fff}
        .action-icon.delete{background:#fce4ec;color:#c62828}.action-icon.delete:hover{background:#c62828;color:#fff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .add-form-card{background:#f8f9ff;border:2px dashed #c5cae9;border-radius:10px;padding:18px 20px;margin-bottom:16px;display:none}
        .empty-state{text-align:center;padding:40px;color:#bbb}.empty-state i{font-size:36px;margin-bottom:10px;display:block}
        .quick-link{font-size:12px;font-weight:600;color:#0d1b4a;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
        .quick-link:hover{color:#304ffe;text-decoration:underline}
        .sub-text{font-size:10px;color:#888;display:block;margin-top:1px}
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Accounts</h3>
                    <ul><li><a href="/dashboard">Home</a></li><li>Bank Accounts</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-university"></i> Bank Accounts</h3></div></div>

                        <!-- Quick Link -->
                        <div style="margin-bottom:12px;">
                            <a class="quick-link" onclick="toggleAddForm()"><i class="fas fa-plus-circle"></i> Add Bank Account</a>
                        </div>

                        <!-- Add Form -->
                        <div class="add-form-card" id="addFormCard">
                            <div style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;"><i class="fas fa-plus-circle"></i> Add / Edit Bank Account</div>
                            <div class="row" style="gap:0;">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Bank Account No. *</label>
                                    <input type="text" class="form-control" id="aAccNo" placeholder="A/C Number">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Bank Name *</label>
                                    <input type="text" class="form-control" id="aBankName" placeholder="Bank name">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">IFSC Code</label>
                                    <input type="text" class="form-control" id="aIfsc" placeholder="IFSC code">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Branch Name</label>
                                    <input type="text" class="form-control" id="aBranch" placeholder="Branch name">
                                </div>
                                <div class="col-12 form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" onclick="saveBank()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;"><i class="fas fa-save"></i> Submit</button>
                                    <button class="fw-btn-fill" onclick="cancelAdd()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;"><i class="fas fa-times"></i> Cancel</button>
                                </div>
                            </div>
                        </div>

                        <!-- Filter -->
                        <div class="filter-card">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-4 col-md-5 col-8 form-group">
                                    <label class="form-label-sm">Enter Keyword</label>
                                    <input type="text" class="form-control" id="fKeyword" placeholder="Search account name, bank, IFSC...">
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" onclick="renderList()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;"><i class="fas fa-search"></i> Search</button>
                                    <button class="fw-btn-fill" onclick="clearFilters()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;"><i class="fas fa-redo"></i> Clear</button>
                                </div>
                            </div>
                        </div>

                        <!-- List -->
                        <div class="table-card">
                            <div class="table-header">
                                <h5><i class="fas fa-list-alt" style="margin-right:6px;"></i>Bank Account List</h5>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table">
                                    <thead><tr><th>Action</th><th>Sr.</th><th>Account No.</th><th>Bank Name</th><th>Branch</th><th>IFSC</th></tr></thead>
                                    <tbody id="listBody"></tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        let editingId = null;
        let bankAccountsCache = [];

        $(document).ready(async function(){
            if(typeof initPage==='function') initPage('account-bank');
            await renderList();
        });

        function toggleAddForm(){ editingId=null; resetForm(); $('#addFormCard').slideDown(200); $('#aAccNo').focus(); }
        function cancelAdd(){ editingId=null; resetForm(); $('#addFormCard').slideUp(200); }
        function resetForm(){ $('#aAccNo,#aBankName,#aIfsc,#aBranch').val(''); }

        async function saveBank(){
            const bank_name=$('#aBankName').val().trim(), account_no=$('#aAccNo').val().trim(),
                  ifsc_code=$('#aIfsc').val().trim(), branch_name=$('#aBranch').val().trim();

            if(!bank_name){ showToast('Please enter bank name','error'); $('#aBankName').focus(); return; }
            if(!account_no){ showToast('Please enter account number','error'); $('#aAccNo').focus(); return; }

            const payload = { bank_name, account_no, ifsc_code, branch_name, balance: 0 };

            try {
                if(editingId){
                    await updateBankAccount(editingId, payload);
                    showToast('Bank account updated!','success'); editingId=null;
                } else {
                    await createBankAccount(payload);
                    showToast('Bank account added!','success');
                }
                cancelAdd(); await renderList();
            } catch(err){ showToast(err.message||'Failed to save','error'); }
        }

        function editBankRow(id){
            const b=bankAccountsCache.find(x=>x.id===id); if(!b) return;
            editingId=id;
            $('#aAccNo').val(b.account_no); $('#aBankName').val(b.bank_name);
            $('#aIfsc').val(b.ifsc_code||''); $('#aBranch').val(b.branch_name||'');
            $('#addFormCard').slideDown(200); $('#aAccNo').focus();
            $('html,body').animate({scrollTop:$('#addFormCard').offset().top-80},300);
        }

        async function removeBank(id){
            const b=bankAccountsCache.find(x=>x.id===id); if(!b) return;
            showConfirmModal('Delete Bank Account',`Delete bank account "<strong>${b.bank_name}</strong>" (${b.account_no})?`, async function(){
                try {
                    await deleteBankAccount(id);
                    showToast('Bank account deleted!','success');
                    await renderList();
                } catch(err){ showToast(err.message||'Failed to delete','error'); }
            });
        }

        function clearFilters(){ $('#fKeyword').val(''); renderList(); }

        async function renderList(){
            const fKey=$('#fKeyword').val().toLowerCase().trim();

            try {
                bankAccountsCache = await getBankAccounts();
            } catch(err){ showToast('Failed to load bank accounts','error'); return; }

            let list=[...bankAccountsCache];
            if(fKey) list=list.filter(b=> (b.bank_name||'').toLowerCase().includes(fKey)||(b.account_no||'').toLowerCase().includes(fKey)||(b.ifsc_code||'').toLowerCase().includes(fKey)||(b.branch_name||'').toLowerCase().includes(fKey));

            const tb=$('#listBody');
            if(!list.length){ tb.html('<tr><td colspan="6"><div class="empty-state"><i class="fas fa-university"></i>No bank accounts found</div></td></tr>'); return; }

            let html='';
            list.forEach((b,i)=>{
                html+=`<tr>
                    <td style="white-space:nowrap;"><button class="action-icon edit" title="Edit" onclick="editBankRow(${b.id})"><i class="fas fa-pen"></i></button> <button class="action-icon delete" title="Delete" onclick="removeBank(${b.id})"><i class="fas fa-trash-alt"></i></button></td>
                    <td style="font-weight:600;color:#555;">${i+1}</td>
                    <td><span style="font-weight:600;">${b.account_no}</span></td>
                    <td><span style="font-weight:600;">${b.bank_name}</span></td>
                    <td>${b.branch_name||'—'}</td>
                    <td>${b.ifsc_code||'—'}</td>
                </tr>`;
            });
            tb.html(html);
        }
    </script>
</body>
</html>
