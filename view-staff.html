<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>View Staff — EduNex1</title>
    <meta name="description" content="View all staff members with advanced filters">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* Status dot */
        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-dot .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .status-dot.active .dot {
            background: #2e7d32;
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.4);
        }

        .status-dot.active {
            color: #2e7d32;
        }

        .status-dot.resigned .dot {
            background: #c62828;
        }

        .status-dot.resigned {
            color: #c62828;
        }

        .status-dot.on-leave .dot {
            background: #ef6c00;
        }

        .status-dot.on-leave {
            color: #ef6c00;
        }

        .status-dot.terminated .dot {
            background: #555;
        }

        .status-dot.terminated {
            color: #555;
        }

        /* Credential block */
        .cred-block {
            font-size: 9px;
            margin-top: 2px;
            padding: 2px 5px;
            background: #f8f9ff;
            border-radius: 3px;
            border: 1px solid #e8ecf5;
            display: inline-block;
            line-height: 1.4;
        }

        .cred-block code {
            font-size: 9px;
            color: #304ffe;
            background: none;
            padding: 0;
        }

        /* Designation badge */
        .designation-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        .desg-principal {
            background: #e8eaf6;
            color: #1a237e;
        }

        .desg-vice-principal {
            background: #e0f2f1;
            color: #004d40;
        }

        .desg-teacher {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .desg-clerk,
        .desg-accountant {
            background: #fce4ec;
            color: #880e4f;
        }

        .desg-librarian {
            background: #e8f5e9;
            color: #1b5e20;
        }

        .desg-peon,
        .desg-driver,
        .desg-guard {
            background: #f5f5f5;
            color: #616161;
        }

        .desg-sports-coach {
            background: #fff8e1;
            color: #f57f17;
        }

        .desg-counselor {
            background: #ede7f6;
            color: #311b92;
        }

        .desg-lab-assistant {
            background: #e1f5fe;
            color: #01579b;
        }

        /* Staff photo */
        .staff-photo-cell img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        /* Action buttons */
        .action-btn {
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.15s;
            margin: 0 1px;
        }

        .action-btn-view {
            background: #e3f2fd;
            color: #1565c0;
        }

        .action-btn-view:hover {
            background: #1565c0;
            color: #fff;
        }

        .action-btn-edit {
            background: #fff3e0;
            color: #ef6c00;
        }

        .action-btn-edit:hover {
            background: #ef6c00;
            color: #fff;
        }

        .action-btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        .action-btn-delete:hover {
            background: #c62828;
            color: #fff;
        }

        /* Table compact */
        #staffTable {
            width: 100% !important;
        }

        #staffTable td {
            vertical-align: middle;
            font-size: 12px;
            padding: 6px 8px;
        }

        #staffTable th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #555;
            padding: 8px;
            white-space: nowrap;
        }

        #staffTable tbody tr:hover {
            background: #f8f9ff;
        }

        /* Search input icon */
        .search-input-wrap {
            position: relative;
        }

        .search-input-wrap i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 12px;
            pointer-events: none;
        }

        .search-input-wrap input {
            padding-left: 30px;
        }

        /* Filter form responsive */
        .filter-form .form-control {
            font-size: 12px;
            height: 36px;
        }

        .filter-form .fw-btn-fill {
            font-size: 11px;
            padding: 0 12px;
            height: 36px;
        }

        /* Modal */
        .modal-info-table td:first-child {
            font-weight: 600;
            color: #888;
            width: 110px;
            font-size: 12px;
            padding: 4px 8px;
        }

        .modal-info-table td:last-child {
            font-size: 12px;
            color: #333;
            padding: 4px 8px;
        }

        .modal-staff-photo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #304ffe;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 991px) {
            .filter-form .row>div {
                margin-bottom: 6px;
            }
        }

        /* ===== RESPONSIVE COLUMN HIDE ===== */
        @media (max-width: 1199px) {
            .col-hide-xl {
                display: none !important;
            }

            /* DOB */
        }

        @media (max-width: 991px) {
            .col-hide-lg {
                display: none !important;
            }

            /* Joining */
        }

        @media (max-width: 767px) {
            .col-hide-md {
                display: none !important;
            }

            /* Emp ID/Login */

            #staffTable td,
            #staffTable th {
                font-size: 11px;
                padding: 5px 6px;
            }

            .staff-photo-cell img {
                width: 28px;
                height: 28px;
            }

            .action-btn {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            .cred-block {
                font-size: 8px;
            }

            .cred-block code {
                font-size: 8px;
            }

            .designation-badge {
                font-size: 9px;
                padding: 2px 5px;
            }
        }

        @media (max-width: 575px) {
            .col-hide-sm {
                display: none !important;
            }

            /* Photo */

            .filter-form .fw-btn-fill {
                font-size: 10px;
                padding: 0 8px;
            }

            #staffTable td,
            #staffTable th {
                font-size: 10px;
                padding: 4px 4px;
            }

            .staff-photo-cell img {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>

    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>

        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>

            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Staff</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>View Staff</li>
                    </ul>
                </div>

                <!-- Staff List -->
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3>
                                    <i class="fas fa-users"></i> Staff Directory
                                </h3>
                            </div>
                        </div>

                        <!-- Filter Form -->
                        <form class="filter-form mg-b-15" id="filterForm">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Status</label>
                                    <select class="form-control" id="filterStatus">
                                        <option value="All">All Status</option>
                                        <option value="Active">Active</option>
                                        <option value="On Leave">On Leave</option>
                                        <option value="Resigned">Resigned</option>
                                        <option value="Terminated">Terminated</option>
                                    </select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Designation</label>
                                    <select class="form-control" id="filterDesignation">
                                        <option value="All">All Designations</option>
                                    </select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-12 form-group">
                                    <label class="form-label-sm">Search</label>
                                    <div class="search-input-wrap">
                                        <i class="fas fa-search"></i>
                                        <input type="text" class="form-control" id="filterSearch"
                                            placeholder="Search by name or mobile...">
                                    </div>
                                </div>
                                <div class="col-lg-3 col-md-4 col-12 form-group">
                                    <div class="d-flex" style="gap:6px;">
                                        <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSearch"
                                            style="flex:1;border-radius:6px;">
                                            <i class="fas fa-search"></i> SEARCH
                                        </button>
                                        <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow"
                                            id="btnReset" style="flex:1;border-radius:6px;">
                                            <i class="fas fa-redo"></i> RESET
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>

                        <div class="table-responsive">
                            <table class="table display data-table" id="staffTable">
                                <thead>
                                    <tr>
                                        <th>Status</th>
                                        <th class="col-hide-sm">Photo</th>
                                        <th class="col-hide-md">Emp ID / Login</th>
                                        <th>Name</th>
                                        <th>Designation</th>
                                        <th class="col-hide-xl">DOB</th>
                                        <th>Mobile</th>
                                        <th class="col-hide-lg">Joining</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="staffTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>



    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>

    <script>
        $(document).ready(async function () {
            initPage('view-staff');

            // Populate designation dropdown from API
            try {
                const desigs = await getDesignations();
                let dHtml = '<option value="All">All Designations</option>';
                (Array.isArray(desigs)?desigs:[]).forEach(d => { dHtml += `<option value="${d.name}">${d.name}</option>`; });
                document.getElementById('filterDesignation').innerHTML = dHtml;
            } catch(e) { console.error(e); }

            renderStaffTable();

            $('#btnSearch').on('click', function () { renderStaffTable(); });
            $('#btnReset').on('click', function () {
                $('#filterStatus').val('All');
                $('#filterDesignation').val('All');
                $('#filterSearch').val('');
                renderStaffTable();
            });
            $('#filterStatus, #filterDesignation').on('change', function () { renderStaffTable(); });
            $('#filterSearch').on('keyup', debounce(function () { renderStaffTable(); }, 300));
        });

        function getFilters() {
            return {
                status: $('#filterStatus').val(),
                designation: $('#filterDesignation').val(),
                search: $('#filterSearch').val().trim()
            };
        }

        function getDesignationClass(d) {
            return 'desg-' + (d||'').toLowerCase().replace(/\s+/g, '-');
        }

        function getStatusClass(s) {
            return (s||'').toLowerCase().replace(/\s+/g, '-');
        }

        function fmtDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        async function renderStaffTable() {
            const tableWrapper = document.querySelector('.table-responsive');
            tableWrapper.classList.add('table-loading-overlay');
            const filters = getFilters();

            try {
                const staffRes = await getStaff(filters);
                let staff = Array.isArray(staffRes) ? staffRes : (staffRes.results || []);

                // Client-side search filter
                if(filters.search) {
                    const q = filters.search.toLowerCase();
                    staff = staff.filter(s => (s.name||'').toLowerCase().includes(q) || (s.employee_id||'').toLowerCase().includes(q) || (s.phone||'').includes(q));
                }

                if ($.fn.DataTable.isDataTable('#staffTable')) { $('#staffTable').DataTable().destroy(); }

                let html = '';
                staff.forEach(s => {
                    const photoInitial = s.name ? s.name.charAt(0).toUpperCase() : '?';
                    html += `<tr>
                    <td>
                        <span class="status-dot ${getStatusClass(s.status)}">
                            <span class="dot"></span>${s.status||''}
                        </span>
                    </td>
                    <td class="staff-photo-cell col-hide-sm"><div style="width:36px;height:36px;border-radius:50%;background:#e8eaf6;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0d1b4a;font-size:14px;">${photoInitial}</div></td>
                    <td class="col-hide-md">
                        <div style="font-weight:700;font-size:11px;color:#222;">${s.employee_id||''}</div>
                        <div class="cred-block">
                            <i class="fas fa-user" style="font-size:7px;color:#888;"></i> <code>${s.login_id||''}</code>
                            <i class="fas fa-key" style="font-size:7px;color:#888;margin-left:3px;"></i> <code>••••••</code>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight:600;color:#222;font-size:12px;">${s.name||''}</div>
                        <div style="font-size:10px;color:#999;">${s.gender||''}</div>
                    </td>
                    <td><span class="designation-badge ${getDesignationClass(s.designation)}">${s.designation||''}</span></td>
                    <td class="col-hide-xl" style="font-size:11px;">${fmtDate(s.dob)}</td>
                    <td style="font-size:11px;">${s.phone||''}</td>
                    <td class="col-hide-lg" style="font-size:11px;">${fmtDate(s.joining_date)}</td>
                    <td style="white-space:nowrap;">
                        <button class="action-btn action-btn-view" title="View" onclick="viewStaff(${s.id})"><i class="fas fa-eye"></i></button>
                        <button class="action-btn action-btn-edit" title="Edit" onclick="editStaff(${s.id})"><i class="fas fa-pen"></i></button>
                        <button class="action-btn action-btn-delete" title="Delete" onclick="confirmDeleteStaff(${s.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
                });
                document.getElementById('staffTableBody').innerHTML = html;
                $('#staffTable').DataTable({
                    "pageLength": 15,
                    "language": { "search": "<i class='fas fa-search'></i>", "searchPlaceholder": "Quick search..." },
                    "columnDefs": [{ "orderable": false, "targets": [1, 8] }],
                    "autoWidth": false
                });
            } catch(e) {
                console.error('Load staff error:', e);
                document.getElementById('staffTableBody').innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Failed to load staff</td></tr>';
            }
            setTimeout(() => { tableWrapper.classList.remove('table-loading-overlay'); }, 150);
        }

        function viewStaff(staffId) {
            window.location.href = 'staff-details.html?id=' + staffId;
        }

        function editStaff(id) { window.location.href = 'add-staff.html?edit=' + id; }

        async function confirmDeleteStaff(id) {
            showConfirmModal('Delete Staff', 'Are you sure you want to delete this staff member?', async function () {
                try { await deleteStaffMember(id); renderStaffTable(); showToast('Staff deleted', 'success'); }
                catch(e){ showToast(e.message||'Failed to delete','error'); }
            });
        }
    </script>
</body>

</html>
