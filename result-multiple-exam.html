<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Result — Multiple Exam — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .empty-state{text-align:center;padding:40px;color:#bbb}.empty-state i{font-size:36px;margin-bottom:10px;display:block}
        .stu-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e0e0e0}
        .count-badge{font-size:10px;background:#0d1b4a;color:#fff;border-radius:10px;padding:2px 8px;margin-left:6px}

        /* Multi-select dropdown */
        .ms-dropdown{position:relative;width:100%}
        .ms-trigger{font-size:12px;height:36px;border:1px solid #ced4da;border-radius:4px;padding:6px 30px 6px 10px;background:#fff;cursor:pointer;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#495057;user-select:none}
        .ms-trigger::after{content:'\f078';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#999}
        .ms-trigger.open{border-color:#1565c0;box-shadow:0 0 0 2px rgba(21,101,192,.15)}
        .ms-panel{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ced4da;border-top:none;border-radius:0 0 6px 6px;z-index:1050;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
        .ms-panel.show{display:block}
        .ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .1s}
        .ms-item:hover{background:#f5f7ff}
        .ms-item.select-all{font-weight:700;color:#1565c0;background:#f8f9ff;border-bottom:2px solid #e0e0e0}
        .ms-item input[type="checkbox"]{margin:0;cursor:pointer;accent-color:#0d1b4a}
        .ms-item label{margin:0;cursor:pointer;flex:1}

        /* Marksheet */
        .marksheet-wrapper{margin-top:20px}
        .marksheet{background:#fff;border:3px solid #0d1b4a;padding:28px 32px;margin-bottom:24px;page-break-after:always;max-width:100%;margin-left:auto;margin-right:auto;position:relative}
        .ms-header{text-align:center;border-bottom:3px double #0d1b4a;padding-bottom:14px;margin-bottom:16px}
        .ms-header img{height:55px;margin-bottom:4px}
        .ms-header h2{font-size:17px;font-weight:800;color:#0d1b4a;margin:0;text-transform:uppercase;letter-spacing:1.5px}
        .ms-header .ms-tagline{font-size:10px;color:#666;font-style:italic;margin:2px 0}
        .ms-header .ms-address{font-size:10px;color:#555;margin:2px 0}
        .ms-header .ms-contact{font-size:10px;color:#555}
        .ms-header .ms-exam-title{font-size:13px;font-weight:700;color:#333;margin-top:10px;text-transform:uppercase;background:#f0f4ff;padding:5px 16px;border-radius:4px;display:inline-block}
        .ms-info{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;font-size:11px}
        .ms-info-left,.ms-info-right{flex:1;min-width:250px}
        .ms-info-row{margin-bottom:4px;display:flex;gap:6px}
        .ms-info-row .lbl{font-weight:700;color:#0d1b4a;min-width:110px}
        .ms-info-row .val{color:#333;border-bottom:1px dotted #bbb;flex:1;padding-bottom:1px}
        .ms-photo{width:80px;height:95px;border:2px solid #0d1b4a;object-fit:cover;border-radius:4px}
        .multi-marks-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:9px;table-layout:auto}
        .multi-marks-table th,.multi-marks-table td{border:1px solid #999;padding:3px 4px;text-align:center;white-space:nowrap}
        .multi-marks-table thead th{background:#0d1b4a;color:#fff;font-size:8px;font-weight:700;text-transform:uppercase}
        .multi-marks-table thead th.exam-group-th{background:#1a3a7a;font-size:9px}
        .multi-marks-table tbody td{font-size:9px}
        .multi-marks-table .sub-name{text-align:left;font-weight:600;white-space:nowrap;font-size:9px}
        .multi-marks-table tfoot td{font-weight:700;background:#f0f4ff;font-size:9px}
        .ms-summary{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:14px 0;font-size:11px;padding:10px 14px;background:#f8f9ff;border:1px solid #e0e0e0;border-radius:6px}
        .ms-summary .item{display:flex;gap:4px}.ms-summary .item b{color:#0d1b4a}
        .ms-detail-row{display:flex;flex-wrap:wrap;gap:16px;margin:10px 0;font-size:11px;padding:10px 14px;background:#fafafa;border:1px solid #eee;border-radius:6px}
        .ms-detail-row .item{display:flex;gap:4px}.ms-detail-row .item b{color:#0d1b4a}
        .ms-footer{display:flex;justify-content:space-between;margin-top:30px;padding-top:10px;font-size:11px;color:#555}
        .ms-footer .sign-block{text-align:center;min-width:120px}
        .ms-footer .sign-block .sign-line{border-top:1px solid #999;margin-top:40px;padding-top:4px;font-weight:700;color:#0d1b4a}
        .ms-result-badge{font-size:13px;font-weight:800;display:inline;margin-top:0}
        .ms-result-pass{color:#1b5e20}
        .ms-result-fail{color:#c62828}
        .ms-qr-block{text-align:center;margin:10px 0}

        /* Senior (9-12) CBSE marksheet styles */
        .ms-section-title{font-size:11px;font-weight:700;color:#0d1b4a;text-transform:uppercase;text-align:left;padding:8px 10px;background:#e8ecf8;border:1px solid #999;border-bottom:none;margin-top:14px}
        .ms-marks-table{width:100%;border-collapse:collapse;margin:0;font-size:10px}
        .ms-marks-table th,.ms-marks-table td{border:1px solid #999;padding:5px 6px;text-align:center}
        .ms-marks-table thead th{background:#0d1b4a;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase}
        .ms-marks-table tbody td{font-size:10px}
        .ms-marks-table .sub-name{text-align:left;font-weight:600}
        .ms-marks-table tfoot td{font-weight:700;background:#f0f4ff}
        .ms-marks-table .theory-col{background:#f8f9ff}
        .ms-co-table{width:100%;border-collapse:collapse;margin:0;font-size:10px}
        .ms-co-table th,.ms-co-table td{border:1px solid #999;padding:5px 6px;text-align:center}
        .ms-co-table thead th{background:#1a3a7a;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase}
        .ms-co-table .area-name{text-align:left;font-weight:600}
        .disc-row{font-size:11px;margin:8px 0;padding:8px 14px;background:#fafafa;border:1px solid #eee;border-radius:4px}
        .disc-row b{color:#0d1b4a}

        .proceed-bar{padding:16px 20px;display:flex;align-items:center;justify-content:flex-end;gap:16px;flex-wrap:wrap}
        .qr-check{font-size:11px;color:#555;display:flex;align-items:center;gap:4px}

        @media print {
            @page{size:landscape;margin:8mm}
            body *{visibility:hidden}
            .marksheet-wrapper,.marksheet-wrapper *{visibility:visible}
            .marksheet-wrapper{position:absolute;left:0;top:0;width:100%}
            .proceed-bar,.filter-card,.table-card,.breadcrumbs-area,.heading-layout1{display:none!important}
            .marksheet{border:2px solid #000;margin:0 auto;padding:14px 16px;max-width:100%!important}
            .multi-marks-table,.ms-marks-table,.ms-co-table{width:100%!important;table-layout:auto}
            .multi-marks-table th,.multi-marks-table td,.ms-marks-table th,.ms-marks-table td{padding:2px 3px!important;font-size:8px!important}
            .multi-marks-table thead th,.ms-marks-table thead th{background:#0d1b4a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:7px!important}
            .ms-header h2{font-size:14px!important}
            .ms-info{font-size:10px!important}
            .ms-summary,.ms-detail-row{font-size:9px!important;padding:6px 10px!important}
            .ms-footer{font-size:9px!important}
            .ms-photo{width:65px!important;height:78px!important}
        }
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Result</h3>
                    <ul><li><a href="/dashboard">Home</a></li><li>Result — Multiple Exam</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-layer-group"></i> Result — Multiple Exam</h3></div></div>

                        
                        <div class="filter-card">
                            <div class="row" style="gap:0;">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Class *</label>
                                    <select class="form-control" id="fClass" onchange="onClassChange()"><option value="">— Class —</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Section *</label>
                                    <select class="form-control" id="fSection"><option value="">— Section —</option></select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Select Exam Group *</label>
                                    <div class="ms-dropdown" id="examDropdown">
                                        <div class="ms-trigger" onclick="togglePanel('examDropdown')">Select Exams</div>
                                        <div class="ms-panel" id="examPanel"></div>
                                    </div>
                                </div>
                                <div class="col-lg-5 col-md-12 col-12 form-group d-flex align-items-end" style="gap:8px;">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:7px 20px;" onclick="searchStudents()"><i class="fas fa-search"></i> Search</button>
                                    <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:12px;padding:7px 20px;" onclick="resetAll()"><i class="fas fa-redo"></i> Reset</button>
                                </div>
                            </div>
                        </div>

                        
                        <div class="table-card" id="listCard" style="display:none;">
                            <div class="table-header">
                                <h5><i class="fas fa-list"></i> Student List <span class="count-badge" id="countBadge">0</span></h5>
                                <label style="font-size:11px;font-weight:700;color:#1565c0;cursor:pointer;user-select:none">
                                    <input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)" style="margin-right:4px;"> Select All
                                </label>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table">
                                    <thead>
                                        <tr>
                                            <th style="width:40px;"><input type="checkbox" id="thCheckAll" onchange="toggleAll(this.checked)"></th>
                                            <th>Photo</th>
                                            <th>Adm No.</th>
                                            <th>Roll No.</th>
                                            <th>Student Name</th>
                                            <th>Father Name</th>
                                            <th>Gender</th>
                                            <th>Class/Section</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listBody"></tbody>
                                </table>
                            </div>
                            <div class="proceed-bar">
                                <label class="qr-check"><input type="checkbox" id="printQR"> Print with QR Code</label>
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:8px 28px;" onclick="generateMarksheets()"><i class="fas fa-arrow-right"></i> Proceed</button>
                            </div>
                        </div>

                        
                        <div class="marksheet-wrapper" id="marksheetArea" style="display:none;">
                            <div style="text-align:right;margin-bottom:14px;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:8px 24px;" onclick="window.print()"><i class="fas fa-print"></i> Print Marksheets</button>
                            </div>
                            <div id="marksheetContainer"></div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async function () {
            initPage('result-multiple-exam');

            function getGrade(pct) {
                if (pct >= 91) return 'A1'; if (pct >= 81) return 'A2'; if (pct >= 71) return 'B1';
                if (pct >= 61) return 'B2'; if (pct >= 51) return 'C1'; if (pct >= 41) return 'C2';
                if (pct >= 33) return 'D'; return 'E';
            }
            const SENIOR_CLASS_IDS = [12, 13, 14, 15];
            function isSeniorClass(classId) { return SENIOR_CLASS_IDS.includes(classId); }

            let classCache = [], examCache = [], subjectCache = [], coAreas = [], branches = [], studentCache = [];
            try { [classCache, examCache, subjectCache, coAreas, branches] = await Promise.all([getClasses(), getExams(), getSubjects(), getCoScholasticAreas(), getBranches()]); } catch(e) {}
            const school = branches[0] || {};

            classCache.forEach(c => document.getElementById('fClass').innerHTML += `<option value="${c.id}">${c.name}</option>`);

            function togglePanel(dropdownId) {
                const dd = document.getElementById(dropdownId);
                const panel = dd.querySelector('.ms-panel');
                const trigger = dd.querySelector('.ms-trigger');
                const isOpen = panel.classList.contains('show');
                document.querySelectorAll('.ms-panel.show').forEach(p => { p.classList.remove('show'); p.parentElement.querySelector('.ms-trigger').classList.remove('open'); });
                if (!isOpen) { panel.classList.add('show'); trigger.classList.add('open'); }
            }
            window.togglePanel = togglePanel;
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.ms-dropdown')) {
                    document.querySelectorAll('.ms-panel.show').forEach(p => { p.classList.remove('show'); p.parentElement.querySelector('.ms-trigger').classList.remove('open'); });
                }
            });
            function buildMultiSelect(panelId, items) {
                const panel = document.getElementById(panelId);
                panel.innerHTML = '';
                const saDiv = document.createElement('div');
                saDiv.className = 'ms-item select-all';
                saDiv.innerHTML = '<input type="checkbox" class="ms-select-all"> <label>Select All</label>';
                panel.appendChild(saDiv);
                const saCheck = saDiv.querySelector('input');
                saCheck.addEventListener('change', function() { panel.querySelectorAll('.ms-cb').forEach(cb => { cb.checked = this.checked; }); updateTriggerText(panelId); });
                saDiv.addEventListener('click', function(e) { if (e.target !== saCheck) { saCheck.checked = !saCheck.checked; saCheck.dispatchEvent(new Event('change')); } });
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'ms-item';
                    div.innerHTML = `<input type="checkbox" class="ms-cb" value="${item.value}"> <label>${item.label}</label>`;
                    panel.appendChild(div);
                    const cb = div.querySelector('input');
                    cb.addEventListener('change', function() {
                        const allC = panel.querySelectorAll('.ms-cb');
                        const chk = panel.querySelectorAll('.ms-cb:checked');
                        saCheck.checked = allC.length === chk.length;
                        updateTriggerText(panelId);
                    });
                    div.addEventListener('click', function(e) { if (e.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } });
                });
            }
            function updateTriggerText(panelId) {
                const panel = document.getElementById(panelId);
                const trigger = panel.closest('.ms-dropdown').querySelector('.ms-trigger');
                const checked = Array.from(panel.querySelectorAll('.ms-cb:checked'));
                const all = panel.querySelectorAll('.ms-cb');
                if (checked.length === 0) trigger.textContent = 'Select Exams';
                else if (checked.length === all.length) trigger.textContent = 'All Exams';
                else if (checked.length <= 2) trigger.textContent = checked.map(cb => cb.nextElementSibling.textContent).join(', ');
                else trigger.textContent = checked.length + ' exams selected';
            }
            function getCheckedValues(panelId) {
                return Array.from(document.getElementById(panelId).querySelectorAll('.ms-cb:checked')).map(cb => parseInt(cb.value));
            }
            function clearMultiSelect(panelId) {
                document.getElementById(panelId).querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                updateTriggerText(panelId);
            }

            buildMultiSelect('examPanel', examCache.map(e => ({ value: e.id, label: e.name })));

            let filteredStudents = [], selectedExams = [], selectedClass = null;

            window.onClassChange = async function () {
                const classId = parseInt(document.getElementById('fClass').value);
                const secSel = document.getElementById('fSection');
                secSel.innerHTML = '<option value="">— Section —</option>';
                if (!classId) return;
                try { studentCache = await getStudents({ class_id: classId }); } catch(e) { studentCache = []; }
                const sections = [...new Set(studentCache.filter(s => s.status === 'Active').map(s => s.section).filter(Boolean))].sort();
                sections.forEach(s => secSel.innerHTML += `<option value="${s}">${s}</option>`);
            };

            window.searchStudents = function () {
                const classId = parseInt(document.getElementById('fClass').value);
                const section = document.getElementById('fSection').value;
                const examIds = getCheckedValues('examPanel');
                if (!classId || !section || examIds.length === 0) { alert('Please select Class, Section, and at least one Exam'); return; }

                selectedExams = examIds.map(id => examCache.find(e => e.id === id)).filter(Boolean);
                selectedClass = classCache.find(c => c.id === classId);
                filteredStudents = studentCache.filter(s => s.section === section && s.status === 'Active').sort((a, b) => (a.roll_no || 0) - (b.roll_no || 0));

                if (filteredStudents.length === 0) { alert('No students found'); return; }

                const tbody = document.getElementById('listBody');
                tbody.innerHTML = filteredStudents.map(s => `<tr>
                    <td><input type="checkbox" class="stu-cb" value="${s.id}" checked></td>
                    <td><img src="${s.photo_url || 'img/figure/student2.png'}" class="stu-photo" alt=""></td>
                    <td>${s.admission_no || ''}</td>
                    <td style="font-weight:600;">${s.roll_no || ''}</td>
                    <td style="font-weight:600;">${s.name}</td>
                    <td>${s.father_name || ''}</td>
                    <td>${s.gender || ''}</td>
                    <td>${selectedClass ? selectedClass.name : ''} / ${s.section || ''}</td>
                </tr>`).join('');
                document.getElementById('countBadge').textContent = filteredStudents.length;
                document.getElementById('listCard').style.display = 'block';
                document.getElementById('marksheetArea').style.display = 'none';
            };

            window.toggleAll = function (checked) {
                document.querySelectorAll('.stu-cb').forEach(cb => cb.checked = checked);
                document.getElementById('selectAll').checked = checked;
                document.getElementById('thCheckAll').checked = checked;
            };

            window.generateMarksheets = async function () {
                const selectedIds = Array.from(document.querySelectorAll('.stu-cb:checked')).map(cb => parseInt(cb.value));
                if (selectedIds.length === 0) { alert('Please select at least one student'); return; }

                let allResultsByExam = {}, allDetailsByExam = {}, allCoScol = [];
                try {
                    const promises = selectedExams.map(exam => Promise.all([
                        getExamResults({ exam_id: exam.id }),
                        getResultDetails({ exam_id: exam.id })
                    ]));
                    const results = await Promise.all(promises);
                    results.forEach(([ res, det ], i) => {
                        allResultsByExam[selectedExams[i].id] = res;
                        allDetailsByExam[selectedExams[i].id] = det;
                    });
                    const lastExam = selectedExams[selectedExams.length - 1];
                    allCoScol = await getCoScholasticResults({ exam_id: lastExam.id });
                } catch(e) {}

                const container = document.getElementById('marksheetContainer');
                container.innerHTML = '';
                const showQR = document.getElementById('printQR').checked;

                selectedIds.forEach(stuId => {
                    const stu = filteredStudents.find(s => s.id === stuId);
                    if (!stu) return;
                    const cls = selectedClass;
                    const senior = isSeniorClass(stu.class_id);
                    const stuSubjects = stu.subjects ? (typeof stu.subjects === 'string' ? JSON.parse(stu.subjects) : stu.subjects) : [];
                    const subjects = stuSubjects.map(sid => subjectCache.find(s => s.id === parseInt(sid))).filter(Boolean);

                    const lastExam = selectedExams[selectedExams.length - 1];
                    const lastDetails = allDetailsByExam[lastExam.id] || [];
                    const detail = lastDetails.find(d => d.student_id === stuId);
                    const sessionStr = selectedExams[0].session || '';

                    const qrHtml = showQR ? `<div class="ms-qr-block">
                        <div style="width:60px;height:60px;border:1px solid #ccc;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#999;background:#fafafa;border-radius:4px;">QR Code</div>
                    </div>` : '';

                    let marksTableHtml = '';

                    if (senior) {
                        let thRow1 = '<th rowspan="2" style="text-align:left;min-width:90px;">Subject</th>';
                        selectedExams.forEach(exam => { thRow1 += `<th colspan="4" class="exam-group-th">${exam.name}</th>`; });
                        thRow1 += '<th colspan="2" class="exam-group-th">Grand Total</th>';
                        let thRow2 = '';
                        selectedExams.forEach(() => { thRow2 += '<th>Theory</th><th>Prac/IA</th><th>Total</th><th>Grade</th>'; });
                        thRow2 += '<th>Max</th><th>Obt</th>';

                        let bodyRows = '', grandTotalMax = 0, grandTotalObt = 0, allPass = true;
                        let examTotals = selectedExams.map(() => ({ max: 0, obt: 0 }));

                        subjects.forEach(sub => {
                            let cells = '', subGrandMax = 0, subGrandObt = 0;
                            selectedExams.forEach((exam, ei) => {
                                const examResults = allResultsByExam[exam.id] || [];
                                const r = examResults.find(x => x.student_id === stuId && x.subject_id === sub.id);
                                if (r) {
                                    const hasPrac = sub.has_practical;
                                    const theoryObt = r.theory_marks || 0;
                                    const pracObt = hasPrac ? (r.practical_marks || 0) : '—';
                                    const total = hasPrac ? (theoryObt + (r.practical_marks || 0)) : theoryObt;
                                    const pct = (total / (r.max_marks || 1)) * 100;
                                    const grade = r.grade || getGrade(pct);
                                    cells += `<td>${theoryObt}</td><td>${pracObt}</td><td style="font-weight:600;">${total}</td><td>${grade}</td>`;
                                    subGrandMax += (r.max_marks || 0);
                                    subGrandObt += total;
                                    examTotals[ei].max += (r.max_marks || 0);
                                    examTotals[ei].obt += total;
                                    if (pct < 33) allPass = false;
                                } else {
                                    cells += '<td>—</td><td>—</td><td>—</td><td>—</td>';
                                }
                            });
                            cells += `<td style="font-weight:700;">${subGrandMax || '—'}</td><td style="font-weight:700;">${subGrandObt || '—'}</td>`;
                            grandTotalMax += subGrandMax; grandTotalObt += subGrandObt;
                            bodyRows += `<tr><td class="sub-name">${sub.name}</td>${cells}</tr>`;
                        });

                        let footerCells = '';
                        examTotals.forEach(et => { footerCells += `<td colspan="2">—</td><td>${et.obt}</td><td>—</td>`; });
                        footerCells += `<td style="font-weight:800;">${grandTotalMax}</td><td style="font-weight:800;">${grandTotalObt}</td>`;

                        const percentage = grandTotalMax > 0 ? ((grandTotalObt / grandTotalMax) * 100).toFixed(1) : '0.0';
                        const resultStatus = grandTotalMax > 0 ? (allPass ? 'Pass' : 'Fail') : 'N/A';
                        const resultClass = resultStatus === 'Pass' ? 'ms-result-pass' : 'ms-result-fail';

                        const stuCoSchol = allCoScol.filter(r => r.student_id === stuId);
                        let coRows = coAreas.map((area, i) => {
                            const found = stuCoSchol.find(a => a.area_id === area.id);
                            return `<tr><td>${i + 1}</td><td class="area-name">${area.name}</td><td>${found ? found.grade : '—'}</td></tr>`;
                        }).join('');
                        const disc = stuCoSchol.find(r => r.discipline);

                        marksTableHtml = `
                        <div class="ms-section-title">Part I : Scholastic Areas</div>
                        <table class="multi-marks-table">
                            <thead><tr>${thRow1}</tr><tr>${thRow2}</tr></thead>
                            <tbody>${bodyRows}</tbody>
                            <tfoot><tr><td style="text-align:right;font-weight:700;">Total</td>${footerCells}</tr></tfoot>
                        </table>
                        <div class="ms-summary">
                            <div class="item"><b>Grand Total:</b> ${grandTotalObt} / ${grandTotalMax}</div>
                            <div class="item"><b>Percentage:</b> ${percentage}%</div>
                            <div class="item"><b>Result:</b> <span class="ms-result-badge ${resultClass}">${resultStatus}</span></div>
                        </div>
                        <div class="ms-section-title" style="margin-top:14px;">Part II : Co-Scholastic Areas</div>
                        <table class="ms-co-table">
                            <thead><tr><th>Sr.</th><th style="text-align:left;">Activity</th><th>Grade (A–E)</th></tr></thead>

                        </table>

                                <p class="ms-address">${school.address || ''}</p>

                            </div>
                            <div class="ms-info">
                                <div class="ms-info-left">
                                    <div class="ms-info-row"><span class="lbl">Student Name</span><span class="val">${stu.name}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Father's Name</span><span class="val">${stu.father_name || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Mother's Name</span><span class="val">${stu.mother_name || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Date of Birth</span><span class="val">${stu.dob || ''}</span></div>
                                </div>
                                <div class="ms-info-right">
                                    <div class="ms-info-row"><span class="lbl">Class / Section</span><span class="val">${cls ? cls.name : ''} / ${stu.section || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Admission No.</span><span class="val">${stu.admission_no || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Roll No.</span><span class="val">${stu.roll_no || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Session</span><span class="val">${sessionStr}</span></div>
                                </div>
                                <div style="margin-left:16px;"><img src="${stu.photo_url || 'img/figure/student2.png'}" class="ms-photo" alt=""></div>
                            </div>
                            ${marksTableHtml}
                            <div class="ms-detail-row">
                                <div class="item"><b>Attendance:</b> ${detail ? detail.attendance : '—'}</div>
                                <div class="item"><b>Height:</b> ${detail ? detail.height + ' cm' : '—'}</div>
                                <div class="item"><b>Weight:</b> ${detail ? detail.weight + ' kg' : '—'}</div>
                                <div class="item"><b>Remark:</b> ${detail ? detail.remark : '—'}</div>
                            </div>
                            ${qrHtml}
                            <div class="ms-footer">
                                <div class="sign-block"><div class="sign-line">Result Date: ${detail ? (detail.result_date || '___________') : '___________'}</div></div>
                                <div class="sign-block"><div class="sign-line">Parent's Sign</div></div>
                                <div class="sign-block"><div class="sign-line">Class Teacher</div></div>
                                <div class="sign-block">${school.signing_authority_signature_url ? '<img src="'+school.signing_authority_signature_url+'" style="max-height:30px;max-width:80px;object-fit:contain;display:block;margin:0 auto;">' : ''}<div class="sign-line">${school.signing_authority_designation || 'Principal'}</div></div>
                            </div>
                        </div>`;

                    } else {
                        let thRow1 = '<th rowspan="2" style="text-align:left;min-width:100px;">Subject</th>';
                        selectedExams.forEach(exam => { thRow1 += `<th colspan="3" class="exam-group-th">${exam.name}</th>`; });
                        thRow1 += '<th colspan="2" class="exam-group-th">Grand Total</th>';
                        let thRow2 = '';
                        selectedExams.forEach(() => { thRow2 += '<th>Max</th><th>Obt</th><th>Grade</th>'; });
                        thRow2 += '<th>Max</th><th>Obt</th>';

                        let bodyRows = '', grandTotalMax = 0, grandTotalObt = 0, allPass = true;
                        let examTotals = selectedExams.map(() => ({ max: 0, obt: 0 }));

                        subjects.forEach(sub => {
                            let cells = '', subGrandMax = 0, subGrandObt = 0;
                            selectedExams.forEach((exam, ei) => {
                                const examResults = allResultsByExam[exam.id] || [];
                                const r = examResults.find(x => x.student_id === stuId && x.subject_id === sub.id);
                                if (r) {
                                    cells += `<td>${r.max_marks || '—'}</td><td>${r.theory_marks || '—'}</td><td>${r.grade || '—'}</td>`;
                                    subGrandMax += (r.max_marks || 0);
                                    subGrandObt += (r.theory_marks || 0);
                                    examTotals[ei].max += (r.max_marks || 0);
                                    examTotals[ei].obt += (r.theory_marks || 0);
                                    if (((r.theory_marks || 0) / (r.max_marks || 1)) * 100 < 33) allPass = false;
                                } else {
                                    cells += '<td>—</td><td>—</td><td>—</td>';
                                }
                            });
                            cells += `<td style="font-weight:700;">${subGrandMax || '—'}</td><td style="font-weight:700;">${subGrandObt || '—'}</td>`;
                            grandTotalMax += subGrandMax; grandTotalObt += subGrandObt;
                            bodyRows += `<tr><td class="sub-name">${sub.name}</td>${cells}</tr>`;
                        });

                        let footerCells = '';
                        examTotals.forEach(et => { footerCells += `<td>${et.max}</td><td>${et.obt}</td><td>—</td>`; });
                        footerCells += `<td style="font-weight:800;">${grandTotalMax}</td><td style="font-weight:800;">${grandTotalObt}</td>`;

                        const percentage = grandTotalMax > 0 ? ((grandTotalObt / grandTotalMax) * 100).toFixed(1) : '0.0';
                        const resultStatus = grandTotalMax > 0 ? (allPass ? 'Pass' : 'Fail') : 'N/A';
                        const resultClass = resultStatus === 'Pass' ? 'ms-result-pass' : 'ms-result-fail';

                        container.innerHTML += `
                        <div class="marksheet">
                            <div class="ms-header">
                                <img src="${school.logo_url || 'img/figure/school-logo.png'}" alt="" onerror="this.style.display='none'">
                                <h2>${school.school_name || ''}</h2>
                                <p class="ms-tagline">${school.board || ''}</p>
                                <p class="ms-address">${school.address || ''}</p>

                                <div class="ms-exam-title">Combined Report — ${sessionStr}</div>
                            </div>
                            <div class="ms-info">
                                <div class="ms-info-left">
                                    <div class="ms-info-row"><span class="lbl">Student Name</span><span class="val">${stu.name}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Father's Name</span><span class="val">${stu.father_name || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Mother's Name</span><span class="val">${stu.mother_name || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Date of Birth</span><span class="val">${stu.dob || ''}</span></div>
                                </div>
                                <div class="ms-info-right">
                                    <div class="ms-info-row"><span class="lbl">Class / Section</span><span class="val">${cls ? cls.name : ''} / ${stu.section || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Admission No.</span><span class="val">${stu.admission_no || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Roll No.</span><span class="val">${stu.roll_no || ''}</span></div>
                                    <div class="ms-info-row"><span class="lbl">Session</span><span class="val">${sessionStr}</span></div>
                                </div>
                                <div style="margin-left:16px;"><img src="${stu.photo_url || 'img/figure/student2.png'}" class="ms-photo" alt=""></div>
                            </div>

                            <table class="multi-marks-table">
                                <thead><tr>${thRow1}</tr><tr>${thRow2}</tr></thead>
                                <tbody>${bodyRows}</tbody>
                                <tfoot><tr><td style="text-align:right;font-weight:700;">Total</td>${footerCells}</tr></tfoot>
                            </table>

                            <div class="ms-summary">
                                <div class="item"><b>Grand Total:</b> ${grandTotalObt} / ${grandTotalMax}</div>
                                <div class="item"><b>Percentage:</b> ${percentage}%</div>
                                <div class="item"><b>Result:</b> <span class="ms-result-badge ${resultClass}">${resultStatus}</span></div>
                            </div>

                            <div class="ms-detail-row">
                                <div class="item"><b>Attendance:</b> ${detail ? detail.attendance : '—'}</div>
                                <div class="item"><b>Height:</b> ${detail ? detail.height + ' cm' : '—'}</div>
                                <div class="item"><b>Weight:</b> ${detail ? detail.weight + ' kg' : '—'}</div>
                                <div class="item"><b>Remark:</b> ${detail ? detail.remark : '—'}</div>
                            </div>

                            ${qrHtml}

                            <div class="ms-footer">
                                <div class="sign-block"><div class="sign-line">Result Date: ${detail ? (detail.result_date || '___________') : '___________'}</div></div>
                                <div class="sign-block"><div class="sign-line">Parent's Sign</div></div>
                                <div class="sign-block"><div class="sign-line">Class Teacher</div></div>
                                <div class="sign-block">${school.signing_authority_signature_url ? '<img src="'+school.signing_authority_signature_url+'" style="max-height:30px;max-width:80px;object-fit:contain;display:block;margin:0 auto;">' : ''}<div class="sign-line">${school.signing_authority_designation || 'Principal'}</div></div>
                            </div>
                        </div>`;
                    }
                });

                document.getElementById('marksheetArea').style.display = 'block';
                document.getElementById('marksheetArea').scrollIntoView({ behavior: 'smooth' });

                const examCnt = selectedExams.length;
                let tSize = 9, hSize = 8;
                if (examCnt >= 4) { tSize = 7; hSize = 6; }
                else if (examCnt >= 3) { tSize = 8; hSize = 7; }
                document.querySelectorAll('.multi-marks-table').forEach(tbl => {
                    tbl.style.fontSize = tSize + 'px';
                    tbl.querySelectorAll('th').forEach(th => th.style.fontSize = hSize + 'px');
                    tbl.querySelectorAll('td').forEach(td => td.style.fontSize = tSize + 'px');
                    tbl.querySelectorAll('.sub-name').forEach(td => td.style.fontSize = tSize + 'px');
                });
            };

            window.resetAll = function () {
                document.getElementById('fClass').value = '';
                document.getElementById('fSection').innerHTML = '<option value="">— Section —</option>';
                clearMultiSelect('examPanel');
                document.getElementById('listCard').style.display = 'none';
                document.getElementById('marksheetArea').style.display = 'none';
            };
        })();
    </script>
</body>
</html>
