<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Homework — Parent Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/parent-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .hw-item {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8eaf6;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: all 0.2s;
        }

        .hw-item:hover {
            box-shadow: 0 4px 12px rgba(13, 27, 74, 0.06);
        }

        .hw-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .hw-body {
            flex: 1;
            min-width: 0;
        }

        .hw-subject {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .hw-title {
            font-size: 14px;
            font-weight: 700;
            color: #0d1b4a;
            margin-bottom: 4px;
        }

        .hw-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .hw-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #888;
        }

        .hw-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hw-due {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Homework</h3>
                    <ul>
                        <li><a href="/parent-dashboard">Home</a></li>
                        <li>Homework</li>
                    </ul>
                </div>

                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-child"></i> Select Child</div>
                    <div class="chart-card-body" style="padding:12px 16px;">
                        <select id="childSelect" onchange="loadHw()" class="form-control" style="max-width:350px;">
                            <option value="">— loading —</option>
                        </select>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-card-header"><i class="fas fa-book-reader"></i> Homework</div>
                    <div class="chart-card-body">
                        <div id="hwArea"><p style="text-align:center;color:#888;padding:20px;">Loading...</p></div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    let children = [];
    const hwColors = ['#ef6c00','#1565c0','#2e7d32','#7b1fa2','#00695c','#c62828','#283593'];
    const hwBgs   = ['#fff3e0','#e3f2fd','#e8f5e9','#f3e5f5','#e0f2f1','#ffebee','#e8eaf6'];
    $(async function(){
        initPage('p-homework');
        try {
            children = await getMyChildren() || [];
            const cs = $('#childSelect').empty();
            children.forEach(c => cs.append(`<option value="${c.id}" data-class="${c.class_id}" data-sec="${c.section||''}">${c.name} \u2014 Class ${c.class_name||''}${c.section?'-'+c.section:''}</option>`));
            var urlChildId = new URLSearchParams(window.location.search).get('child_id');
            if (urlChildId && cs.find('option[value="' + urlChildId + '"]').length) {
                cs.val(urlChildId);
            }
            if(children.length) loadHw();
        } catch(e){
            console.error(e);
            $('#hwArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load data. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    async function loadHw(){
        const opt = $('#childSelect option:selected');
        const classId = opt.data('class'), sec = opt.data('sec');
        if(!classId){ return; }
        try {
            const hw = await getHomework({class_id: classId, section: sec}) || [];
            if(!hw.length){ $('#hwArea').html('<p style="text-align:center;color:#888;">No homework assigned.</p>'); return; }
            let html = '';
            hw.forEach((h,i) => {
                const ci = i % hwColors.length;
                html += `<div class="hw-item"><div class="hw-icon" style="background:${hwBgs[ci]};color:${hwColors[ci]};"><i class="fas fa-book"></i></div><div class="hw-body"><div class="hw-subject" style="color:${hwColors[ci]};">${escHtml(h.subject_name||'')}</div><div class="hw-title">${escHtml(h.title||'')}</div>${h.description?'<div class="hw-desc">'+escHtml(h.description)+'</div>':''}<div class="hw-meta"><span><i class="fas fa-calendar"></i> ${h.date||''}</span>${h.type?'<span><i class="fas fa-bookmark"></i> '+h.type+'</span>':''}</div></div>${h.due_date?'<div class="hw-due" style="background:'+hwBgs[ci]+';color:'+hwColors[ci]+';">Due: '+h.due_date+'</div>':''}</div>`;
            });
            $('#hwArea').html(html);
        } catch(e){
            console.error(e);
            $('#hwArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load homework. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    }
    </script>
</body>

</html>
