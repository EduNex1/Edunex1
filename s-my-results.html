<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>My Results — Student Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <link rel="stylesheet" href="css/student-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .result-header {
            background: linear-gradient(135deg, #0d1b4a 0%, #2952a3 100%);
            border-radius: 12px;
            padding: 24px;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .result-header .rh-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .result-header .rh-info h4 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }

        .result-header .rh-info p {
            font-size: 12px;
            opacity: 0.8;
            margin: 2px 0 0;
        }

        .result-header .rh-stats {
            margin-left: auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .result-header .rh-stat {
            text-align: center;
        }

        .result-header .rh-stat .val {
            font-size: 22px;
            font-weight: 800;
        }

        .result-header .rh-stat .lbl {
            font-size: 9px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grade-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .grade-a {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .grade-b {
            background: #fff3e0;
            color: #ef6c00;
        }

        @media print {
            body * { visibility: hidden; }
            #resultArea, #resultArea * { visibility: visible; }
            #resultArea {
                position: absolute; left: 0; top: 0; width: 100%;
                display: block !important;
            }
            .chart-card-header .btn, .chart-card-header button { display: none !important; }
            .result-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>My Results</h3>
                    <ul>
                        <li><a href="/student-dashboard">Home</a></li>
                        <li>My Results</li>
                    </ul>
                </div>

                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-calendar-alt" style="color:#304ffe;"></i> Select Exam</div>
                    <div class="chart-card-body" style="padding:12px 16px;">
                        <select id="examSelect" onchange="loadResult()"
                            style="font-size:13px;border:1px solid #d5d9e0;border-radius:6px;padding:6px 12px;min-width:200px;">
                            <option value="">— Select Exam —</option>
                        </select>
                    </div>
                </div>

                <div id="resultArea" style="display:none;">
                    <div class="result-header">
                        <div class="rh-avatar" id="rhAvatar"></div>
                        <div class="rh-info">
                            <h4 id="rhName"></h4>
                            <p id="rhInfo"></p>
                        </div>
                        <div class="rh-stats">
                            <div class="rh-stat"><div class="val" id="rhPct">—</div><div class="lbl">Percentage</div></div>
                            <div class="rh-stat"><div class="val" id="rhGrade">—</div><div class="lbl">Grade</div></div>
                            <div class="rh-stat"><div class="val" id="rhResult">—</div><div class="lbl">Result</div></div>
                        </div>
                    </div>

                    <div class="chart-card" style="margin-bottom:16px;">
                        <div class="chart-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                            <span><i class="fas fa-list-ol"></i> Subject-wise Results</span>
                            <button class="btn btn-primary no-print" onclick="window.print()" style="font-size:12px;padding:4px 14px;"><i class="fas fa-print"></i> Print</button>
                        </div>
                        <div class="chart-card-body">
                            <div class="table-responsive">
                                <table class="recent-table">
                                    <thead><tr><th>#</th><th>Subject</th><th>Max</th><th>Obtained</th><th>%</th><th>Grade</th></tr></thead>
                                    <tbody id="resultBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="noResult" class="chart-card" style="text-align:center;padding:40px 20px;">
                    <i class="fas fa-chart-bar" style="font-size:40px;color:#c5cae9;margin-bottom:12px;"></i>
                    <p style="color:#888;font-size:13px;">Select an exam to view your results.</p>
                </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    let myStudent = null;
    $(async function () {
        initPage('s-my-results');
        try {
            const children = await getMyChildren();
            if (!children || !children.length) { $('#noResult').html('<p style="color:#c00;">Student record not found.</p>'); return; }
            myStudent = children[0];
            const initials = (myStudent.name || '').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
            $('#rhAvatar').text(initials);
            $('#rhName').text(myStudent.name);

            const exams = await getExamNames();
            const sel = $('#examSelect');
            (exams || []).forEach(e => sel.append(`<option value="${e.id}">${e.name}</option>`));
        } catch (e) {
            console.error(e);
            showToast('Unable to load results. Please try again.', 'error');
        }
    });

    async function loadResult() {
        const examId = $('#examSelect').val();
        if (!examId || !myStudent) { $('#resultArea').hide(); $('#noResult').show(); return; }
        try {
            const [results, details] = await Promise.all([
                getExamResults({ student_id: myStudent.id, exam_id: examId }),
                getResultDetails({ student_id: myStudent.id, exam_id: examId })
            ]);
            if (!results || !results.length) {
                $('#resultArea').hide();
                $('#noResult').show().html('<i class="fas fa-exclamation-circle" style="font-size:40px;color:#ffb74d;margin-bottom:12px;"></i><p style="color:#888;">No results found for this exam.</p>');
                return;
            }
            const detail = (details && details.length) ? details[0] : {};
            const examName = $('#examSelect option:selected').text();
            const sec = myStudent.section ? ' — ' + myStudent.section : '';
            $('#rhInfo').text(`Class ${myStudent.class_name || ''}${sec} | Roll: ${myStudent.roll_no || '-'} | ${examName}`);

            let totalObt = 0, totalMax = 0;
            let html = '';
            results.forEach((r, i) => {
                const obt = Number(r.total_marks) || 0;
                const mx = Number(r.max_marks) || 0;
                totalObt += obt; totalMax += mx;
                const pct = mx ? ((obt / mx) * 100).toFixed(1) : '-';
                html += `<tr><td>${i + 1}</td><td><strong>${r.subject_name}</strong></td><td>${mx}</td><td><strong>${obt}</strong></td><td>${pct}%</td><td>${r.grade || '-'}</td></tr>`;
            });
            const totalPct = totalMax ? ((totalObt / totalMax) * 100).toFixed(1) : '-';
            html += `<tr style="font-weight:800;background:#f0f4ff;"><td></td><td><strong>TOTAL</strong></td><td><strong>${totalMax}</strong></td><td><strong>${totalObt}</strong></td><td><strong>${totalPct}%</strong></td><td></td></tr>`;
            $('#resultBody').html(html);

            $('#rhPct').text(totalPct + '%');
            $('#rhGrade').text(detail.division || results[0].grade || '-');
            $('#rhResult').text(detail.result || (totalPct !== '-' ? 'Declared' : '-'));

            $('#noResult').hide();
            $('#resultArea').show();
        } catch (e) { console.error(e); showToast('Error loading results', 'error'); }
    }
    </script>
</body>

</html>
