<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Holidays List — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .form-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 20px; margin-bottom: 16px; }
        .record-count { background: #e3f2fd; color: #1565c0; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
        .h-table td, .h-table th { font-size: 12px; vertical-align: middle; padding: 8px 10px; }
        .h-table th { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #555; letter-spacing: 0.3px; }
        .h-table tbody tr:hover { background: #f8f9ff; }
        .action-btn { border: none; background: none; cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; transition: background 0.15s; }
        .action-btn.edit { color: #1565c0; } .action-btn.edit:hover { background: #e3f2fd; }
        .action-btn.delete { color: #c62828; } .action-btn.delete:hover { background: #ffebee; }
        .empty-state { text-align: center; padding: 40px; color: #bbb; }
        .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }
        .print-icon { color: #304ffe; font-size: 16px; cursor: pointer; transition: color 0.15s; }
        .print-icon:hover { color: #1a237e; }
        @media print {
            #header-container, #sidebar-container, .breadcrumbs-area, #holidayForm, .filter-section, .no-print { display: none !important; }
            .dashboard-content-one { padding: 0 !important; margin: 0 !important; }
            .card { box-shadow: none !important; border: none !important; }
        }
        @media (max-width:767px) { .h-table td, .h-table th { font-size: 11px; padding: 6px; } .col-hide-md { display: none !important; } }
        @media (max-width:575px) { .h-table td, .h-table th { font-size: 10px; padding: 4px 5px; } }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Academics</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>Holidays List</li>
                    </ul>
                </div>

                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-umbrella-beach"></i> Holidays List</h3>
                            </div>
                        </div>

                        <!-- Add/Edit Form -->
                        <div class="form-card" id="holidayForm">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Date *</label>
                                    <input type="date" class="form-control" id="hDate" style="font-size:12px;height:36px;">
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Title *</label>
                                    <input type="text" class="form-control" id="hTitle" placeholder="e.g. Republic Day" style="font-size:12px;height:36px;">
                                </div>
                                <div class="col-lg-4 col-md-5 col-12 form-group">
                                    <label class="form-label-sm">Description</label>
                                    <input type="text" class="form-control" id="hDesc" placeholder="Short description (optional)" style="font-size:12px;height:36px;">
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSave" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                        <i class="fas fa-save"></i> Save
                                    </button>
                                    <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow" id="btnClear" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                        <i class="fas fa-eraser"></i> Clear
                                    </button>
                                </div>
                            </div>
                            <input type="hidden" id="editId" value="">
                        </div>

                        <!-- Filter -->
                        <div class="filter-section no-print" style="margin-bottom:14px;">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Filter by Month</label>
                                    <select class="form-control" id="filterMonth" style="font-size:12px;height:36px;">
                                        <option value="">All Months</option>
                                        <option value="01">January</option><option value="02">February</option>
                                        <option value="03">March</option><option value="04">April</option>
                                        <option value="05">May</option><option value="06">June</option>
                                        <option value="07">July</option><option value="08">August</option>
                                        <option value="09">September</option><option value="10">October</option>
                                        <option value="11">November</option><option value="12">December</option>
                                    </select>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSearch" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                        <i class="fas fa-search"></i> Search
                                    </button>
                                    <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow" id="btnReset" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                        <i class="fas fa-undo"></i> Reset
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Holiday List -->
                        <div class="d-flex align-items-center justify-content-between mg-b-12 no-print" style="flex-wrap:wrap;gap:8px;">
                            <h6 style="font-weight:700;font-size:14px;color:#0d1b4a;margin:0;"><i class="fas fa-list" style="color:#304ffe;margin-right:6px;"></i>Holiday List</h6>
                            <div class="d-flex align-items-center" style="gap:12px;">
                                <span class="record-count" id="recordCount">0 Records</span>
                                <i class="fas fa-print print-icon" id="btnPrint" title="Print"></i>
                            </div>
                        </div>
                        <div class="table-responsive" id="listContainer">
                            <table class="table h-table table-bordered" style="margin-bottom:0;">
                                <thead>
                                    <tr style="background:#f5f7ff;">
                                        <th style="width:30px;">#</th>
                                        <th>Date</th>
                                        <th>Title</th>
                                        <th class="col-hide-md">Description</th>
                                        <th style="width:70px;" class="no-print">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="hBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(async function () {
            if (typeof initPage === 'function') initPage('academic-holidays');

            let cache = [];
            try { cache = await getHolidays(); } catch(e) { console.error('Failed to load holidays', e); }

            renderList();

            function fmtDate(d) {
                const dt = new Date(d);
                return dt.getDate().toString().padStart(2, '0') + ' ' + dt.toLocaleDateString('en-IN', { month: 'short' }) + ' ' + dt.getFullYear();
            }

            function renderList() {
                const month = $('#filterMonth').val();
                let data = cache.slice().sort((a, b) => (a.date||'').localeCompare(b.date||''));
                if (month) data = data.filter(h => (h.date||'').split('-')[1] === month);

                const body = $('#hBody');
                body.empty();
                $('#recordCount').text(data.length + ' Record' + (data.length !== 1 ? 's' : ''));

                if (!data.length) {
                    body.html('<tr><td colspan="5" class="empty-state"><i class="fas fa-calendar-times"></i>No holidays found</td></tr>');
                    return;
                }

                data.forEach((h, i) => {
                    body.append(`
                        <tr>
                            <td>${i + 1}</td>
                            <td style="white-space:nowrap;font-weight:600;">${fmtDate(h.date)}</td>
                            <td>${h.title}</td>
                            <td class="col-hide-md" style="color:#666;">${h.description || '—'}</td>
                            <td class="no-print">
                                <button class="action-btn edit" onclick="editHoliday(${h.id})" title="Edit"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" onclick="removeHoliday(${h.id})" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `);
                });
            }

            // Save
            $('#btnSave').on('click', async function () {
                const date = $('#hDate').val();
                const title = $('#hTitle').val().trim();
                const desc = $('#hDesc').val().trim();
                if (!date) { showToast('Please select a date', 'error'); return; }
                if (!title) { showToast('Please enter a title', 'error'); return; }

                try {
                    const editId = parseInt($('#editId').val());
                    if (editId) {
                        await updateMasterData('holidays', editId, { date, title, description: desc });
                        showToast('Holiday updated', 'success');
                    } else {
                        await createMasterData('holidays', { date, title, description: desc });
                        showToast('Holiday added', 'success');
                    }
                    cache = await getHolidays();
                    clearForm();
                    renderList();
                } catch(e) { showToast('Error saving holiday', 'error'); }
            });

            // Clear
            $('#btnClear').on('click', clearForm);
            function clearForm() {
                $('#hDate').val(''); $('#hTitle').val(''); $('#hDesc').val(''); $('#editId').val('');
                $('#btnSave').html('<i class="fas fa-save"></i> Save');
            }

            // Edit
            window.editHoliday = function (id) {
                const h = cache.find(x => x.id === id);
                if (!h) return;
                $('#hDate').val(h.date); $('#hTitle').val(h.title); $('#hDesc').val(h.description || '');
                $('#editId').val(id);
                $('#btnSave').html('<i class="fas fa-save"></i> Update');
                $('html, body').animate({ scrollTop: 0 }, 300);
            };

            // Delete
            window.removeHoliday = async function (id) {
                if (!confirm('Delete this holiday?')) return;
                try {
                    await deleteMasterData('holidays', id);
                    cache = cache.filter(x => x.id !== id);
                    showToast('Holiday deleted', 'success');
                    renderList();
                } catch(e) { showToast('Error deleting holiday', 'error'); }
            };

            // Filter
            $('#btnSearch').on('click', renderList);
            $('#btnReset').on('click', function () { $('#filterMonth').val(''); renderList(); });

            // Print
            $('#btnPrint').on('click', function () { window.print(); });
        });
    </script>
</body>

</html>
