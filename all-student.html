<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Student List — EduNex1</title>
    <meta name="description" content="View all students with advanced filters">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== COMPACT TABLE ===== */
        #studentTable {
            width: 100% !important;
            table-layout: auto;
        }

        #studentTable th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #555;
            padding: 8px 6px;
            white-space: nowrap;
        }

        #studentTable td {
            vertical-align: middle;
            font-size: 12px;
            padding: 6px;
        }

        #studentTable tbody tr:hover {
            background: #f8f9ff;
        }

        /* Photo cell */
        .student-photo-cell img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        /* Name + father stacked */
        .student-name-cell .s-name {
            font-weight: 600;
            color: #222;
            font-size: 12px;
        }

        .student-name-cell .s-father {
            font-size: 10px;
            color: #999;
            margin-top: 1px;
        }

        /* Class-section compact */
        .class-sec-cell {
            white-space: nowrap;
            font-weight: 600;
            font-size: 12px;
        }

        /* Fee compact */
        .fee-paid {
            color: #2e7d32;
            font-weight: 600;
            font-size: 11px;
        }

        .fee-partial {
            color: #ef6c00;
            font-weight: 600;
            font-size: 11px;
        }

        .fee-due {
            color: #c62828;
            font-weight: 600;
            font-size: 11px;
        }

        /* ===== RESPONSIVE COLUMN HIDE ===== */
        @media (max-width: 1199px) {
            .col-hide-xl {
                display: none !important;
            }

            /* Gender, Fee */
        }

        @media (max-width: 991px) {
            .col-hide-lg {
                display: none !important;
            }

            /* Category */
            #studentTable td,
            #studentTable th {
                font-size: 11px;
                padding: 5px 4px;
            }

            .student-photo-cell img {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 767px) {
            .col-hide-md {
                display: none !important;
            }

            /* Adm No, Phone */
            #studentTable td,
            #studentTable th {
                font-size: 10px;
                padding: 4px 3px;
            }

            .student-photo-cell img {
                width: 24px;
                height: 24px;
            }

            .action-btn {
                width: 22px;
                height: 22px;
                font-size: 9px;
            }
        }

        @media (max-width: 575px) {
            .col-hide-sm {
                display: none !important;
            }

            /* Photo */
        }
    </style>
</head>

<body>
    <div id="preloader"></div>

    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>

        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>

            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Students</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>Student List</li>
                    </ul>
                </div>

                <!-- Student List Table -->
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-user-graduate"></i> All Students</h3>
                            </div>
                        </div>

                        <!-- Filter Form -->
                        <form class="filter-form mg-b-15" id="filterForm">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Class</label>
                                    <select class="form-control" id="filterClass"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Section</label>
                                    <select class="form-control" id="filterSection"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Category</label>
                                    <select class="form-control" id="filterCategory"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Session</label>
                                    <select class="form-control" id="filterSession"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Status</label>
                                    <select class="form-control" id="filterStatus">
                                        <option value="All">All Status</option>
                                        <option value="Active">Active</option>
                                        <option value="TC">TC</option>
                                    </select>
                                </div>
                                <div class="col-auto form-group d-flex" style="gap:6px;">
                                    <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSearch"
                                        style="border-radius:6px;height:38px;font-size:12px;padding:0 16px;white-space:nowrap;">
                                        <i class="fas fa-search"></i> SEARCH
                                    </button>
                                    <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow"
                                        id="btnReset"
                                        style="border-radius:6px;height:38px;font-size:12px;padding:0 16px;white-space:nowrap;">
                                        <i class="fas fa-redo"></i> RESET
                                    </button>
                                </div>
                            </div>
                        </form>

                        <div class="table-responsive">
                            <table class="table display data-table" id="studentTable">
                                <thead>
                                    <tr>
                                        <th class="col-hide-sm">Photo</th>
                                        <th class="col-hide-md">Adm No</th>
                                        <th>Name</th>
                                        <th>Class</th>
                                        <th class="col-hide-xl">Gender</th>
                                        <th class="col-hide-lg">Category</th>
                                        <th class="col-hide-md">Phone</th>
                                        <th class="col-hide-xl">Fee</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>



    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>

    <script>
        $(document).ready(function () {
            initPage('student-list');

            populateClassDropdown(document.getElementById('filterClass'), true);
            populateSectionDropdown(document.getElementById('filterSection'), true);
            populateSessionDropdown(document.getElementById('filterSession'), true);

            // Populate category dropdown with common values
            const catSel = document.getElementById('filterCategory');
            if(catSel) { catSel.innerHTML = '<option value="">All Categories</option><option>General</option><option>OBC</option><option>SC</option><option>ST</option><option>EWS</option>'; }

            renderStudentTable();

            $('#btnSearch').on('click', function () { renderStudentTable(); });
            $('#btnReset').on('click', function () {
                $('#filterClass').val($('#filterClass option:first').val());
                $('#filterSection').val($('#filterSection option:first').val());
                if(catSel) catSel.selectedIndex=0;
                $('#filterSession').val($('#filterSession option:first').val());
                $('#filterStatus').val('All');
                renderStudentTable();
            });
            $('.filter-form select').on('change', function () { renderStudentTable(); });
        });

        function getFilters() {
            return { class_id: $('#filterClass').val(), section: $('#filterSection').val(), category: $('#filterCategory').val(), session: $('#filterSession').val(), status: $('#filterStatus').val() };
        }

        let _classCache = null;
        async function loadClasses() {
            if(!_classCache) { _classCache = await getClasses(); if(!Array.isArray(_classCache)) _classCache = []; }
            return _classCache;
        }

        async function renderStudentTable() {
            const tableWrapper = document.querySelector('.table-responsive');
            tableWrapper.classList.add('table-loading-overlay');
            const filters = getFilters();

            try {
                const [studentsRes, classes] = await Promise.all([getStudents(filters), loadClasses()]);
                const students = Array.isArray(studentsRes) ? studentsRes : (studentsRes.results || []);
                const classMap = {};
                classes.forEach(c => { classMap[c.id] = c.name; });

                if ($.fn.DataTable.isDataTable('#studentTable')) { $('#studentTable').DataTable().destroy(); }

                let html = '';
                students.forEach(s => {
                    const className = classMap[s.class_id] || '-';
                    let feeHtml = (s.fee_paid||0) > 0 ? `<span class="fee-partial">₹${(s.fee_paid||0).toLocaleString('en-IN')}</span>` : '<span class="fee-due">No Payment</span>';
                    const photoUrl = s.photo_url || 'img/default-student.png';
                    html += `<tr>
                    <td class="student-photo-cell col-hide-sm"><img src="${photoUrl}" alt="${s.name}"></td>
                    <td class="col-hide-md">${s.admission_no||''}</td>
                    <td class="student-name-cell"><div class="s-name">${s.name||''}</div><div class="s-father">${s.father_name||''}</div></td>
                    <td class="class-sec-cell">${className}-${s.section||''}</td>
                    <td class="col-hide-xl">${s.gender||''}</td>
                    <td class="col-hide-lg"><span class="category-badge cat-${(s.category||'').toLowerCase()}">${s.category||''}</span></td>
                    <td class="col-hide-md">${s.phone||''}</td>
                    <td class="col-hide-xl">${feeHtml}</td>
                    <td><span class="status-badge ${s.status === 'Active' ? 'status-active' : 'status-tc'}">${s.status||''}</span></td>
                    <td style="white-space:nowrap;">
                        <button class="action-btn action-btn-view" title="View" onclick="viewStudent(${s.id})"><i class="fas fa-eye"></i></button>
                        <button class="action-btn action-btn-edit" title="Edit" onclick="editStudent(${s.id})"><i class="fas fa-pen"></i></button>
                        <button class="action-btn action-btn-delete" title="Delete" onclick="confirmDeleteStudent(${s.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
                });
                document.getElementById('studentTableBody').innerHTML = html;
                $('#studentTable').DataTable({ "pageLength": 10, "language": { "search": "<i class='fas fa-search'></i>", "searchPlaceholder": "Search..." }, "columnDefs": [{ "orderable": false, "targets": [0, 9] }] });
            } catch(e) {
                console.error('Load students error:', e);
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">Failed to load students</td></tr>';
            }
            setTimeout(() => { tableWrapper.classList.remove('table-loading-overlay'); }, 150);
        }

        function viewStudent(studentId) {
            window.location.href = 'student-details.html?id=' + studentId;
        }

        function editStudent(id) { window.location.href = 'admit-form.html?edit=' + id; }
        async function confirmDeleteStudent(id) {
            showConfirmModal('Delete Student', 'Are you sure you want to delete this student?', async function () {
                try { await deleteStudent(id); renderStudentTable(); showToast('Student deleted', 'success'); }
                catch(e){ showToast(e.message||'Failed to delete','error'); }
            });
        }
    </script>
</body>

</html>
