<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Student List — EduNex1</title>
    <meta name="description" content="View all students with advanced filters">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== COMPACT TABLE ===== */
        #studentTable {
            width: 100% !important;
            table-layout: auto;
        }

        #studentTable th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #555;
            padding: 8px 6px;
            white-space: nowrap;
        }

        #studentTable td {
            vertical-align: middle;
            font-size: 12px;
            padding: 6px;
        }

        #studentTable tbody tr:hover {
            background: #f8f9ff;
        }

        /* Photo cell */
        .student-photo-cell img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        /* Name + father stacked */
        .student-name-cell .s-name {
            font-weight: 600;
            color: #222;
            font-size: 12px;
        }

        .student-name-cell .s-father {
            font-size: 10px;
            color: #999;
            margin-top: 1px;
        }

        /* Class-section compact */
        .class-sec-cell {
            white-space: nowrap;
            font-weight: 600;
            font-size: 12px;
        }

        /* Fee compact */
        .fee-paid {
            color: #2e7d32;
            font-weight: 600;
            font-size: 11px;
        }

        .fee-partial {
            color: #ef6c00;
            font-weight: 600;
            font-size: 11px;
        }

        .fee-due {
            color: #c62828;
            font-weight: 600;
            font-size: 11px;
        }

        /* ===== RESPONSIVE COLUMN HIDE ===== */
        @media (max-width: 1199px) {
            .col-hide-xl {
                display: none !important;
            }

            /* Gender, Fee */
        }

        @media (max-width: 991px) {
            .col-hide-lg {
                display: none !important;
            }

            /* Category */
            #studentTable td,
            #studentTable th {
                font-size: 11px;
                padding: 5px 4px;
            }

            .student-photo-cell img {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 767px) {
            .col-hide-md {
                display: none !important;
            }

            /* Adm No, Phone */
            #studentTable td,
            #studentTable th {
                font-size: 10px;
                padding: 4px 3px;
            }

            .student-photo-cell img {
                width: 24px;
                height: 24px;
            }

            .action-btn {
                width: 22px;
                height: 22px;
                font-size: 9px;
            }
        }

        @media (max-width: 575px) {
            .col-hide-sm {
                display: none !important;
            }

            /* Photo */
        }
    </style>
</head>

<body>
    <div id="preloader"></div>

    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>

        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>

            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Students</h3>
                    <ul>
                        <li><a href="/dashboard">Home</a></li>
                        <li>Student List</li>
                    </ul>
                </div>

                
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1" style="display:flex;align-items:center;justify-content:space-between;">
                            <div class="item-title">
                                <h3><i class="fas fa-user-graduate"></i> All Students</h3>
                            </div>
                            <button class="btn btn-sm" onclick="exportData()" style="background:#fff;border:1px solid #d0d0d0;color:#0d1b4a;font-size:12px;padding:5px 14px;border-radius:6px;" title="Export CSV"><i class="fas fa-file-csv"></i> Export</button>
                        </div>

                        
                        <form class="filter-form mg-b-15" id="filterForm">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Class</label>
                                    <select class="form-control" id="filterClass"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Section</label>
                                    <select class="form-control" id="filterSection"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Category</label>
                                    <select class="form-control" id="filterCategory"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Session</label>
                                    <select class="form-control" id="filterSession"></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Status</label>
                                    <select class="form-control" id="filterStatus">
                                        <option value="All">All Status</option>
                                        <option value="Active">Active</option>
                                        <option value="TC">TC</option>
                                    </select>
                                </div>
                                <div class="col-auto form-group d-flex" style="gap:6px;">
                                    <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSearch"
                                        style="border-radius:6px;height:38px;font-size:12px;padding:0 16px;white-space:nowrap;">
                                        <i class="fas fa-search"></i> SEARCH
                                    </button>
                                    <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow"
                                        id="btnReset"
                                        style="border-radius:6px;height:38px;font-size:12px;padding:0 16px;white-space:nowrap;">
                                        <i class="fas fa-redo"></i> RESET
                                    </button>
                                </div>
                            </div>
                        </form>

                        <div class="table-responsive">
                            <table class="table display data-table" id="studentTable">
                                <thead>
                                    <tr>
                                        <th class="col-hide-sm">Photo</th>
                                        <th class="col-hide-md">Adm No</th>
                                        <th>Name</th>
                                        <th>Class</th>
                                        <th class="col-hide-xl">Gender</th>
                                        <th class="col-hide-lg">Category</th>
                                        <th class="col-hide-md">Phone</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>

    <script>
        $(document).ready(function () {
            initPage('student-list');
            if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;

            populateClassDropdown(document.getElementById('filterClass'), true);
            populateSectionDropdown(document.getElementById('filterSection'), true);
            populateSessionDropdown(document.getElementById('filterSession'), true);

            const catSel = document.getElementById('filterCategory');
            if(catSel) { catSel.innerHTML = '<option value="">All Categories</option><option>General</option><option>OBC</option><option>SC</option><option>ST</option><option>EWS</option>'; }

            renderStudentTable();

            $('#btnSearch').on('click', function () { renderStudentTable(); });
            $('#btnReset').on('click', function () {
                $('#filterClass').val($('#filterClass option:first').val());
                $('#filterSection').val($('#filterSection option:first').val());
                if(catSel) catSel.selectedIndex=0;
                $('#filterSession').val($('#filterSession option:first').val());
                $('#filterStatus').val('All');
                renderStudentTable();
            });
            $('.filter-form select').on('change', function () { renderStudentTable(); });
        });

        function getFilters() {
            return { class_id: $('#filterClass').val(), section: $('#filterSection').val(), category: $('#filterCategory').val(), session: $('#filterSession').val(), status: $('#filterStatus').val() };
        }

        function safeHtml(value) {
            return typeof escHtml === 'function' ? escHtml(value) : String(value || '');
        }

        function safeCategoryClass(value) {
            return String(value || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
        }

        let _displayedStudents = [];
        let _classCache = null;
        async function loadClasses() {
            if(!_classCache) { _classCache = await getClasses(); if(!Array.isArray(_classCache)) _classCache = []; }
            return _classCache;
        }

        async function renderStudentTable() {
            const tableWrapper = document.querySelector('.table-responsive');
            tableWrapper.classList.add('table-loading-overlay');
            const filters = getFilters();
            const _u = typeof getUser === 'function' ? getUser() : null;
            const _isAdminRole = _u && (_u.role === 'super_admin' || _u.role === 'branch_admin');

            try {
                const [studentsRes, classes] = await Promise.all([getStudents(filters), loadClasses()]);
                const students = Array.isArray(studentsRes) ? studentsRes : (studentsRes.results || []);
                const classMap = {};
                classes.forEach(c => { classMap[c.id] = c.name; });

                _displayedStudents = students.map(s => Object.assign({}, s, { class_name: classMap[s.class_id] || '' }));

                if ($.fn.DataTable.isDataTable('#studentTable')) { $('#studentTable').DataTable().destroy(); }

                let html = '';
                students.forEach(s => {
                    const className = classMap[s.class_id] || '-';
                    const photoUrl = safeHtml(s.photo_url || 'img/default-student.png');
                    const studentName = safeHtml(s.name || '');
                    const admissionNo = safeHtml(s.admission_no || '');
                    const fatherName = safeHtml(s.father_name || '');
                    const section = safeHtml(s.section || '');
                    const gender = safeHtml(s.gender || '');
                    const category = safeHtml(s.category || '');
                    const phone = safeHtml(s.phone || '');
                    const statusText = safeHtml(s.status || '');
                    html += `<tr>
                    <td class="student-photo-cell col-hide-sm"><img src="${photoUrl}" alt="${studentName}"></td>
                    <td class="col-hide-md">${admissionNo}</td>
                    <td class="student-name-cell"><div class="s-name">${studentName}</div><div class="s-father">${fatherName}</div></td>
                    <td class="class-sec-cell">${safeHtml(className)}-${section}</td>
                    <td class="col-hide-xl">${gender}</td>
                    <td class="col-hide-lg"><span class="category-badge cat-${safeCategoryClass(s.category)}">${category}</span></td>
                    <td class="col-hide-md">${phone}</td>
                    <td><span class="status-badge ${s.status === 'Active' ? 'status-active' : 'status-tc'}">${statusText}</span></td>
                    <td style="white-space:nowrap;">
                        <button class="action-btn action-btn-view" title="View" onclick="viewStudent(${s.id})"><i class="fas fa-eye"></i></button>
                        ${_isAdminRole ? `<button class="action-btn action-btn-edit" title="Edit" onclick="editStudent(${s.id})"><i class="fas fa-pen"></i></button>
                        <button class="action-btn action-btn-delete" title="Delete" onclick="confirmDeleteStudent(${s.id})"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </td>
                </tr>`;
                });
                document.getElementById('studentTableBody').innerHTML = html;
                $('#studentTable').DataTable({ "pageLength": 10, "language": { "search": "<i class='fas fa-search'></i>", "searchPlaceholder": "Search..." }, "columnDefs": [{ "orderable": false, "targets": [0, 8] }] });
            } catch(e) {
                console.error('Load students error:', e);
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Failed to load students</td></tr>';
            }
            setTimeout(() => { tableWrapper.classList.remove('table-loading-overlay'); }, 150);
        }

        function viewStudent(studentId) {
            window.location.href = 'student-details.html?id=' + studentId;
        }

        function editStudent(id) { window.location.href = 'admit-form.html?edit=' + id; }
        async function confirmDeleteStudent(id) {
            showConfirmModal('Delete Student', 'Are you sure you want to delete this student?', async function () {
                try { await deleteStudent(id); renderStudentTable(); showToast('Student deleted', 'success'); }
                catch(e){ showToast(e.message||'Failed to delete','error'); }
            });
        }
        function exportData() {
            if (!_displayedStudents || _displayedStudents.length === 0) {
                showToast('No student data to export', 'error');
                return;
            }
            exportCSV(_displayedStudents, [
                { key: 'admission_no', label: 'Admission No' },
                { key: 'name', label: 'Name' },
                { key: 'father_name', label: 'Father Name' },
                { key: 'mother_name', label: 'Mother Name' },
                { key: 'class_name', label: 'Class' },
                { key: 'section', label: 'Section' },
                { key: 'gender', label: 'Gender' },
                { key: 'dob', label: 'DOB' },
                { key: 'phone', label: 'Phone' },
                { key: 'email', label: 'Email' },
                { key: 'category', label: 'Category' },
                { key: 'religion', label: 'Religion' },
                { key: 'address', label: 'Address' },
                { key: 'session', label: 'Session' },
                { key: 'status', label: 'Status' }
            ], 'students.csv');
        }
    </script>
</body>

</html>
