<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Face Attendance — EduNex1</title>
    <meta name="description" content="Mark attendance via face recognition">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .att-wrap { display: flex; gap: 16px; min-height: 480px; }

        /* Camera */
        .cam-box {
            flex: 1; background: #000; border-radius: 12px; overflow: hidden;
            position: relative; min-height: 400px;
        }
        .cam-box video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cam-box canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .cam-box .scan-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #4caf50, transparent);
            animation: scanAnim 2.5s linear infinite; z-index: 3; opacity: .4;
        }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        /* Topbar on camera */
        .cam-top {
            position: absolute; top: 0; left: 0; right: 0; padding: 10px 14px;
            background: linear-gradient(180deg, rgba(0,0,0,.55), transparent);
            display: flex; justify-content: space-between; align-items: center; z-index: 5;
        }
        .cam-top .st { display: flex; align-items: center; gap: 6px; }
        .cam-top .st-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
            animation: pd 1.5s infinite;
        }
        @keyframes pd { 0%,100% { opacity:1; } 50% { opacity:.3; } }
        .cam-top .st span { color: #fff; font-size: 12px; font-weight: 600; }
        .cam-top .cb {
            background: rgba(255,255,255,.15); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 8px; font-size: 14px;
            cursor: pointer; backdrop-filter: blur(4px); display: inline-flex; align-items: center; justify-content: center;
        }
        .cam-top .cb:hover { background: rgba(255,255,255,.3); }

        /* Loader */
        .cam-ld {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,.85);
            color: #fff; z-index: 10;
        }
        .cam-ld .spinner-border { width: 2.5rem; height: 2.5rem; margin-bottom: 12px; }
        .cam-ld p { font-size: 13px; margin: 0; }
        .cam-ld .sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 4px; }

        /* Side panel */
        .side-col { width: 320px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }

        /* Clock */
        .clk-card {
            background: #fff; border-radius: 12px; padding: 14px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.06);
        }
        .clk-card .cd { font-size: 12px; font-weight: 600; color: #555; }
        .clk-card .ct { font-size: 26px; font-weight: 800; color: #0d1b4a; font-variant-numeric: tabular-nums; }

        /* Rec card */
        .rec-card {
            background: #fff; border-radius: 12px; padding: 16px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.06); animation: slideIn .3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .rec-card .ra {
            width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 8px; display: block; border: 3px solid #e8f5e9;
        }
        .rec-card .rph {
            width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 8px;
            background: linear-gradient(135deg, #667eea, #764ba2); display: flex;
            align-items: center; justify-content: center; color: #fff; font-size: 22px; font-weight: 700;
        }
        .rec-card .rn { font-size: 16px; font-weight: 800; color: #1a1a2e; }
        .rec-card .rs { font-size: 11px; color: #888; margin-bottom: 10px; }
        .rec-card .rrows { text-align: left; font-size: 12px; }
        .rec-card .rr {
            display: flex; justify-content: space-between; padding: 5px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .rec-card .rr:last-child { border-bottom: none; }
        .rec-card .rl { color: #888; font-weight: 600; }
        .rec-card .rv { color: #1a1a2e; font-weight: 700; }
        .rec-card .ptag {
            display: inline-block; margin-top: 10px;
            font-size: 13px; font-weight: 800; padding: 6px 20px; border-radius: 20px; letter-spacing: .5px;
        }
        .rec-card .ptag.present { background: #e8f5e9; color: #2e7d32; }
        .rec-card .ptag.late { background: #fff3e0; color: #e65100; }

        /* Absent notification */
        .absent-notif {
            background: #ffebee; border: 1px solid #ef9a9a; border-radius: 10px; padding: 10px 14px;
            font-size: 11px; color: #c62828; font-weight: 600; text-align: center;
            animation: slideIn .3s ease;
        }
        .absent-notif i { margin-right: 4px; }

        /* Timing bar */
        .timing-bar {
            display: flex; align-items: center; gap: 10px; background: #fff;
            border-radius: 12px; padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
            font-size: 11px;
        }
        .timing-bar .tb-item { display: flex; align-items: center; gap: 4px; }
        .timing-bar .tb-icon { color: #042954; font-size: 13px; }
        .timing-bar .tb-label { color: #888; font-weight: 600; }
        .timing-bar .tb-val { color: #042954; font-weight: 800; }
        .timing-bar .tb-sep { color: #ddd; }

        /* Log */
        .log-card {
            background: #fff; border-radius: 12px; flex: 1; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,.06); display: flex; flex-direction: column;
        }
        .log-hdr {
            padding: 10px 14px; font-weight: 700; font-size: 12px; color: #0d1b4a;
            border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;
        }
        .log-bdg { background: #0d1b4a; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
        .log-bd { flex: 1; overflow-y: auto; max-height: 320px; }
        .lr {
            display: flex; align-items: center; gap: 8px; padding: 7px 14px;
            border-bottom: 1px solid #fafafa; font-size: 11px;
        }
        .lr:last-child { border-bottom: none; }
        .lr .la { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 2px solid #e0e0e0; flex-shrink: 0; }
        .lr .lph {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #667eea, #764ba2); display: flex;
            align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700;
        }
        .lr .li { flex: 1; min-width: 0; }
        .lr .ln { font-weight: 700; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lr .ls { color: #999; font-size: 10px; }
        .lr .lt { color: #2e7d32; font-weight: 700; font-size: 10px; white-space: nowrap; }
        .le { text-align: center; padding: 30px 14px; color: #ccc; }
        .le i { font-size: 28px; }
        .le p { font-size: 11px; margin-top: 4px; }

        /* Fullscreen */
        .att-wrap.fs { position: fixed; inset: 0; z-index: 9999; background: #000; border-radius: 0; gap: 0; }
        .att-wrap.fs .cam-box { border-radius: 0; height: 100vh; }
        .att-wrap.fs .side-col {
            position: absolute; top: 10px; right: 10px; bottom: 10px; width: 300px; z-index: 10;
            background: rgba(255,255,255,.95); border-radius: 12px; padding: 10px;
            backdrop-filter: blur(8px);
        }
        .att-wrap.fs .side-col .clk-card,
        .att-wrap.fs .side-col .rec-card,
        .att-wrap.fs .side-col .log-card { box-shadow: none; }

        @media (max-width: 992px) {
            .att-wrap { flex-direction: column; }
            .cam-box { min-height: 300px; height: 50vh; }
            .side-col { width: 100%; }
            .att-wrap.fs .side-col { display: none; }
        }
        @media (max-width: 576px) {
            .cam-box { min-height: 250px; height: 40vh; }
            .side-col { gap: 8px; }
            .clk-card .ct { font-size: 22px; }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Face Attendance</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>Face Attendance</li>
                    </ul>
                </div>

                <div class="att-wrap" id="attWrap">
                    <div class="cam-box">
                        <video id="vid" autoplay muted playsinline></video>
                        <canvas id="cvs"></canvas>
                        <div class="scan-line"></div>
                        <div class="cam-top">
                            <div class="st">
                                <div class="st-dot" id="sDot"></div>
                                <span id="sText">Initializing...</span>
                            </div>
                            <button class="cb" id="btnFS" title="Fullscreen"><i class="fas fa-expand"></i></button>
                        </div>
                        <div class="cam-ld" id="camLd">
                            <div class="spinner-border text-light"></div>
                            <p>Loading face recognition models...</p>
                            <p class="sub">This may take a few seconds</p>
                        </div>
                    </div>

                    <div class="side-col">
                        <div class="clk-card">
                            <div class="cd" id="cDate"></div>
                            <div class="ct" id="cTime"></div>
                        </div>
                        <div class="timing-bar" id="timingBar">
                            <div class="tb-item"><i class="fas fa-door-open tb-icon"></i><span class="tb-label">Open:</span><span class="tb-val" id="tbOpen">--:--</span></div>
                            <span class="tb-sep">|</span>
                            <div class="tb-item"><i class="fas fa-clock tb-icon" style="color:#e65100"></i><span class="tb-label">Late After:</span><span class="tb-val" id="tbLate">--:--</span></div>
                            <span class="tb-sep">|</span>
                            <div class="tb-item"><i class="fas fa-user-times tb-icon" style="color:#c62828"></i><span class="tb-label">Absent:</span><span class="tb-val" id="tbAbsent">--:--</span></div>
                        </div>
                        <div id="recWrap"></div>
                        <div id="absentNotif"></div>
                        <div class="log-card">
                            <div class="log-hdr">
                                <span><i class="fas fa-history me-1"></i>Today's Attendance</span>
                                <span class="log-bdg" id="logCnt">0</span>
                            </div>
                            <div class="log-bd" id="logBd">
                                <div class="le"><i class="fas fa-camera"></i><p>No attendance yet.<br>Show a registered face to camera.</p></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script src="js/face-api.min.js"></script>
    <script>
    const MODEL_URL = '/weights';
    const MATCH_THRESHOLD = 0.6;

    let faceMatcher = null;
    let dMap = {};
    let logList = [];
    let markedToday = {};   // permanent same-day block: key -> true
    let scanning = false;
    let todayStr = '';
    let schoolOpenTime = '08:00';
    let lateDeadline = '08:30';
    let absentCutoff = '09:00';
    let absentMarkedToday = false;

    $(document).ready(async function () {
        initPage('face-attendance');
        todayStr = new Date().toISOString().split('T')[0];
        startClock();

        // Load timing settings
        await loadTimingSettings();

        // Fullscreen toggle
        $('#btnFS').click(function () {
            const w = $('#attWrap');
            w.toggleClass('fs');
            $(this).find('i').toggleClass('fa-expand fa-compress');
        });
        $(document).on('keydown', function (e) {
            if (e.key === 'Escape' && $('#attWrap').hasClass('fs')) {
                $('#attWrap').removeClass('fs');
                $('#btnFS find i').removeClass('fa-compress').addClass('fa-expand');
            }
        });

        try {
            await loadAll();
            await startCam();
            scanning = true;
            detect();
        } catch (e) {
            console.error(e);
            setSt('Error: ' + (e.message || 'Cannot start'), '#f44336');
        }
    });

    function startClock() {
        function tick() {
            const now = new Date();
            $('#cDate').text(now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }));
            $('#cTime').text(now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }));
            const d = now.toISOString().split('T')[0];
            if (d !== todayStr) { todayStr = d; markedToday = {}; logList = []; renderLog(); }
        }
        tick(); setInterval(tick, 1000);
    }

    function setSt(t, c) { $('#sText').text(t); if (c) $('#sDot').css('background', c); }

    async function loadTimingSettings() {
        try {
            const settings = await getOptionSettings();
            if (settings.face_att_school_open) schoolOpenTime = settings.face_att_school_open;
            if (settings.face_att_late_deadline) lateDeadline = settings.face_att_late_deadline;
            if (settings.face_att_absent_cutoff) absentCutoff = settings.face_att_absent_cutoff;
        } catch(e) { console.error('Failed to load timing settings:', e); }
        updateTimingBar();
        startAbsentChecker();
    }

    function updateTimingBar() {
        $('#tbOpen').text(formatTime12(schoolOpenTime));
        $('#tbLate').text(formatTime12(lateDeadline));
        $('#tbAbsent').text(formatTime12(absentCutoff));
    }

    function formatTime12(t) {
        if (!t) return '--:--';
        const [h, m] = t.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        return ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + ampm;
    }

    function getAttendanceStatus() {
        const now = new Date();
        const curr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        if (curr > lateDeadline) return 'L';
        return 'P';
    }

    function startAbsentChecker() {
        function checkAbsent() {
            if (absentMarkedToday) return;
            const now = new Date();
            const curr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
            if (curr >= absentCutoff) {
                triggerAutoAbsent();
            }
        }
        // Check every 30 seconds
        setInterval(checkAbsent, 30000);
        // Also check immediately
        checkAbsent();
    }

    async function triggerAutoAbsent() {
        if (absentMarkedToday) return;
        absentMarkedToday = true;
        setSt('Marking absent for remaining...', '#f44336');
        try {
            const res = await autoMarkAbsent(todayStr);
            if (res.skipped) {
                const reason = res.reason || 'Holiday';
                $('#absentNotif').html(`<div class="absent-notif" style="background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7"><i class="fas fa-calendar-check"></i>Today is <b>${reason}</b> — no auto-absent marking</div>`);
                setSt('Scanning... (' + reason + ')', '#4caf50');
            } else {
                const msg = `Auto-marked absent: ${res.students_marked || 0} students, ${res.staff_marked || 0} staff`;
                $('#absentNotif').html(`<div class="absent-notif"><i class="fas fa-user-times"></i>${msg}</div>`);
                setSt('Scanning... (Absent marked)', '#4caf50');
            }
            setTimeout(() => { $('#absentNotif .absent-notif').fadeOut(300, function(){ $(this).remove(); }); }, 10000);
        } catch(e) {
            console.error('Auto-absent failed:', e);
            setSt('Auto-absent failed: ' + (e.message || 'Error'), '#f44336');
            absentMarkedToday = false; // allow retry
            setTimeout(() => { if (scanning) setSt('Scanning...', '#4caf50'); }, 5000);
        }
    }

    async function loadAll() {
        $('#camLd').show();
        setSt('Loading models...');
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        setSt('Loading face data...');
        const raw = await getFaceDescriptors();
        const list = Array.isArray(raw) ? raw : [];
        if (!list.length) { $('#camLd').hide(); setSt('No registered faces found', '#ff9800'); return; }
        const labeled = [];
        list.forEach(d => {
            const lbl = d.person_type + '_' + d.person_id;
            const ds = (typeof d.descriptors === 'string' ? JSON.parse(d.descriptors) : d.descriptors) || [];
            if (ds.length) {
                labeled.push(new faceapi.LabeledFaceDescriptors(lbl, ds.map(a => new Float32Array(a))));
                dMap[lbl] = {
                    type: d.person_type, id: d.person_id, name: d.person_name || 'Unknown',
                    admission_no: d.admission_no, class_name: d.class_name,
                    section: d.section, roll_no: d.roll_no,
                    photo_url: d.photo_url || d.staff_photo_url,
                    employee_id: d.employee_id, designation: d.designation
                };
            }
        });
        if (labeled.length) faceMatcher = new faceapi.FaceMatcher(labeled, MATCH_THRESHOLD);
        $('#camLd').hide();
        setSt('Scanning — ' + labeled.length + ' faces loaded', '#4caf50');
    }

    async function startCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
        const v = document.getElementById('vid');
        v.srcObject = s; await v.play();
    }

    async function detect() {
        if (!scanning) return;
        const v = document.getElementById('vid'), c = document.getElementById('cvs');
        if (v.readyState < 2) { requestAnimationFrame(detect); return; }
        const r = v.getBoundingClientRect();
        c.width = r.width; c.height = r.height;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        try {
            const dets = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.5 }))
                .withFaceLandmarks().withFaceDescriptors();
            if (dets.length) {
                const sx = r.width / v.videoWidth, sy = r.height / v.videoHeight;
                dets.forEach(det => {
                    const b = det.detection.box;
                    const x = b.x*sx, y = b.y*sy, w = b.width*sx, h = b.height*sy;
                    let lbl = 'Unknown', ok = false;
                    if (faceMatcher) { const m = faceMatcher.findBestMatch(det.descriptor); if (m.label !== 'unknown') { lbl = m.label; ok = true; } }
                    ctx.strokeStyle = ok ? '#4caf50' : '#ff9800'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
                    const p = ok ? dMap[lbl] : null, nm = p ? p.name : 'Unknown';
                    ctx.font = '600 11px sans-serif';
                    const tw = ctx.measureText(nm).width + 12;
                    ctx.fillStyle = ok ? '#4caf50' : '#ff9800';
                    ctx.fillRect(x+(w-tw)/2, y+h+3, tw, 18);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(nm, x+(w-tw)/2+6, y+h+15);
                    if (ok) markPerson(lbl);
                });
            }
        } catch(e) {}
        setTimeout(() => requestAnimationFrame(detect), 200);
    }

    let pendingMark = {};  // cooldown for failed attempts

    async function markPerson(label) {
        // Same-day permanent block — no duplicates
        if (markedToday[label]) return;
        // Cooldown: if a mark is in-progress or recently failed, skip
        if (pendingMark[label]) return;
        pendingMark[label] = true;

        const p = dMap[label];
        if (!p) { delete pendingMark[label]; return; }
        const ts = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        const attStatus = getAttendanceStatus();
        const remark = attStatus === 'L' ? 'Face attendance (Late)' : 'Face attendance';

        try {
            if (p.type === 'student') {
                await markStudentAttendance(todayStr, [{ student_id: p.id, status: attStatus, remark: remark }]);
            } else {
                await markStaffAttendance(todayStr, [{ staff_id: p.id, status: attStatus, remark: remark }]);
            }
            // Only mark as done AFTER successful DB save
            markedToday[label] = true;
            delete pendingMark[label];

            showRec(p, ts, attStatus);
            logList.unshift({ person: p, time: ts, status: attStatus });
            if (logList.length > 50) logList.pop();
            renderLog();
        } catch (e) {
            console.error('Attendance save failed for ' + p.name + ':', e);
            // Allow retry after 5 seconds
            setTimeout(() => { delete pendingMark[label]; }, 5000);
            // Show error to user
            setSt('DB Error: ' + (e.message || 'Save failed') + ' — will retry', '#f44336');
            setTimeout(() => { if (scanning) setSt('Scanning...', '#4caf50'); }, 4000);
        }
    }

    function showRec(p, ts, status) {
        const isLate = status === 'L';
        const ini = (p.name||'').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        const av = p.photo_url
            ? `<img class="ra" src="${p.photo_url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="rph" style="display:none">${esc(ini)}</div>`
            : `<div class="rph">${esc(ini)}</div>`;
        let rows = '';
        if (p.type === 'student') {
            rows = `<div class="rr"><span class="rl">Adm No</span><span class="rv">${esc(p.admission_no||'-')}</span></div>
                <div class="rr"><span class="rl">Class</span><span class="rv">${esc(p.class_name||'')} ${p.section?'- '+esc(p.section):''}</span></div>
                <div class="rr"><span class="rl">Roll No</span><span class="rv">${esc(p.roll_no||'-')}</span></div>
                <div class="rr"><span class="rl">Time</span><span class="rv">${esc(ts)}</span></div>`;
        } else {
            rows = `<div class="rr"><span class="rl">EID</span><span class="rv">${esc(p.employee_id||'-')}</span></div>
                <div class="rr"><span class="rl">Designation</span><span class="rv">${esc(p.designation||'-')}</span></div>
                <div class="rr"><span class="rl">Time</span><span class="rv">${esc(ts)}</span></div>`;
        }
        const tagClass = isLate ? 'late' : 'present';
        const tagIcon = isLate ? 'fa-clock' : 'fa-check-circle';
        const tagText = isLate ? 'LATE' : 'PRESENT';
        $('#recWrap').html(`<div class="rec-card">${av}<div class="rn">${esc(p.name)}</div><div class="rs">${p.type==='student'?'Student':'Staff'}</div><div class="rrows">${rows}</div><div class="ptag ${tagClass}"><i class="fas ${tagIcon} me-1"></i>${tagText}</div></div>`);
        setTimeout(() => { $('#recWrap .rec-card').fadeOut(300, function(){ $(this).remove(); }); }, 4000);
    }

    function renderLog() {
        if (!logList.length) { $('#logBd').html('<div class="le"><i class="fas fa-camera"></i><p>No attendance yet.</p></div>'); $('#logCnt').text('0'); return; }
        const h = logList.map(e => {
            const p = e.person, ini = (p.name||'').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
            const av = p.photo_url
                ? `<img class="la" src="${p.photo_url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="lph" style="display:none">${esc(ini)}</div>`
                : `<div class="lph">${esc(ini)}</div>`;
            const sub = p.type==='student' ? `${p.class_name||''} ${p.section?'- '+p.section:''}` : `${p.designation||'Staff'}`;
            const isLate = e.status === 'L';
            const lIcon = isLate ? 'fa-clock' : 'fa-check-circle';
            const lColor = isLate ? '#e65100' : '#2e7d32';
            const lLabel = isLate ? 'Late' : '';
            return `<div class="lr">${av}<div class="li"><div class="ln">${esc(p.name)}</div><div class="ls">${esc(sub)}</div></div><div class="lt"><i class="fas ${lIcon} me-1" style="color:${lColor}"></i>${lLabel ? '<span style="color:'+lColor+';margin-right:3px">'+lLabel+'</span>' : ''}${esc(e.time)}</div></div>`;
        }).join('');
        $('#logBd').html(h); $('#logCnt').text(logList.length);
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
    </script>
</body>
</html>
