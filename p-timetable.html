<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Time Table — Parent Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/parent-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Time Table</h3>
                    <ul><li><a href="/parent-dashboard">Home</a></li><li>Academics > Time Table</li></ul>
                </div>
            
        <div class="chart-card" style="margin-bottom:16px;">
            <div class="chart-card-header"><i class="fas fa-child"></i> Select Child</div>
            <div class="chart-card-body" style="padding:12px 16px;">
                <select id="childSelect" onchange="loadTT()" class="form-control" style="max-width:350px;"><option value="">— loading —</option></select>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-card-header"><i class="fas fa-clock"></i> Class Timetable</div>
            <div class="chart-card-body">
    <div id="ttArea"><p style="text-align:center;color:#888;padding:20px;">Loading...</p></div>
            </div>
        </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    let children = [];
    const ttBgs = ['#fff3e0','#e3f2fd','#e8f5e9','#f3e5f5','#e0f2f1','#fce4ec','#e8eaf6','#fff8e1','#fbe9e7'];
    $(async function(){
        initPage('p-timetable');
        try {
            children = await getMyChildren() || [];
            const cs = $('#childSelect').empty();
            children.forEach(c => cs.append(`<option value="${c.id}" data-class="${c.class_id}" data-sec="${c.section||''}">${c.name} \u2014 Class ${c.class_name||''}${c.section?'-'+c.section:''}</option>`));
            var urlChildId = new URLSearchParams(window.location.search).get('child_id');
            if (urlChildId && cs.find('option[value="' + urlChildId + '"]').length) {
                cs.val(urlChildId);
            }
            if(children.length) loadTT();
        } catch(e){
            console.error(e);
            $('#ttArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load data. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    async function loadTT(){
        const opt = $('#childSelect option:selected');
        const classId = opt.data('class'), sec = opt.data('sec');
        if(!classId){ return; }
        try {
            const tt = await getTimetable({class_id: classId, section: sec}) || [];
            if(!tt.length){ $('#ttArea').html('<p style="text-align:center;color:#888;">No timetable available.</p>'); return; }
            const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const periods = [...new Set(tt.map(t=>t.period))].sort((a,b)=>a-b);
            const subMap = {};
            tt.forEach(t => { subMap[t.period+'_'+t.day] = t.subject_name||''; });
            let html = '<div class="table-responsive"><table class="recent-table"><thead><tr><th>Period</th>';
            days.forEach(d => html += `<th>${d}</th>`);
            html += '</tr></thead><tbody>';
            periods.forEach((p,pi) => {
                html += `<tr><td><strong>Period ${p}</strong></td>`;
                days.forEach(d => {
                    const sub = subMap[p+'_'+d] || '';
                    const bg = sub ? ttBgs[pi % ttBgs.length] : '';
                    html += `<td style="background:${bg}">${sub}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            $('#ttArea').html(html);
        } catch(e){
            console.error(e);
            $('#ttArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load timetable. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    }
    </script>
</body>
</html>
