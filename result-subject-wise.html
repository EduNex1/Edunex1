<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Result Update — Subject Wise — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .empty-state{text-align:center;padding:40px;color:#bbb}.empty-state i{font-size:36px;margin-bottom:10px;display:block}
        .info-strip{background:#f8f9ff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 20px;margin-bottom:16px;display:none;font-size:12px}
        .info-strip b{color:#0d1b4a;margin-right:4px}
        .info-strip span{margin-right:20px;color:#333}
        .mark-input{width:70px;font-size:12px;height:30px;text-align:center;border:1px solid #ced4da;border-radius:4px;padding:2px 6px}
        .mark-input:focus{border-color:#1565c0;outline:none;box-shadow:0 0 0 2px rgba(21,101,192,.15)}
        .grade-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;display:inline-block;background:#e3f2fd;color:#0d1b4a}
        .prac-tag{font-size:9px;color:#888;font-style:italic}
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Result</h3>
                    <ul><li><a href="index.html">Home</a></li><li>Result Update — Subject Wise</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-book-open"></i> Result Update — Subject Wise</h3></div></div>

                        <!-- Filter -->
                        <div class="filter-card">
                            <div class="row" style="gap:0;">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Class *</label>
                                    <select class="form-control" id="fClass" onchange="onClassChange()"><option value="">— Class —</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Section *</label>
                                    <select class="form-control" id="fSection"><option value="">— Section —</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Exam *</label>
                                    <select class="form-control" id="fExam"><option value="">— Exam —</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Subject *</label>
                                    <select class="form-control" id="fSubject"><option value="">— Subject —</option></select>
                                </div>
                                <div class="col-lg-4 col-md-12 col-12 form-group d-flex align-items-end" style="gap:8px;">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:7px 20px;" onclick="searchResult()"><i class="fas fa-search"></i> Search</button>
                                    <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:12px;padding:7px 20px;" onclick="resetAll()"><i class="fas fa-redo"></i> Reset</button>
                                </div>
                            </div>
                        </div>

                        <!-- Info Strip -->
                        <div class="info-strip" id="infoStrip">
                            <b>Class:</b><span id="isClass">—</span>
                            <b>Section:</b><span id="isSection">—</span>
                            <b>Exam:</b><span id="isExam">—</span>
                            <b>Subject:</b><span id="isSubject">—</span>
                        </div>

                        <!-- Marks Table -->
                        <div class="table-card" id="marksCard" style="display:none;">
                            <div class="table-header">
                                <h5><i class="fas fa-clipboard-list"></i> Subject-wise Marks Entry</h5>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table">
                                    <thead>
                                        <tr>
                                            <th>Roll No.</th>
                                            <th>Adm No.</th>
                                            <th>Student Name</th>
                                            <th>Min Marks</th>
                                            <th>Max Marks</th>
                                            <th>Obtained Marks</th>
                                            <th>Practical <span class="prac-tag">(optional)</span></th>
                                            <th>Grade <span class="prac-tag">(optional)</span></th>
                                        </tr>
                                    </thead>
                                    <tbody id="marksBody"></tbody>
                                </table>
                            </div>
                            <div style="padding:14px 20px;text-align:right;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:8px 28px;" onclick="updateAll()"><i class="fas fa-save"></i> Update</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async function () {
            initPage('result-subject-wise');

            function getGrade(pct) {
                if (pct >= 91) return 'A1'; if (pct >= 81) return 'A2'; if (pct >= 71) return 'B1';
                if (pct >= 61) return 'B2'; if (pct >= 51) return 'C1'; if (pct >= 41) return 'C2';
                if (pct >= 33) return 'D'; return 'E';
            }

            let classCache = [], examCache = [], subjectCache = [], studentCache = [];
            try { [classCache, examCache, subjectCache] = await Promise.all([getClasses(), getExams(), getSubjects()]); } catch(e) {}

            classCache.forEach(c => document.getElementById('fClass').innerHTML += `<option value="${c.id}">${c.name}</option>`);
            examCache.forEach(e => document.getElementById('fExam').innerHTML += `<option value="${e.id}">${e.name}</option>`);
            subjectCache.forEach(s => document.getElementById('fSubject').innerHTML += `<option value="${s.id}">${s.name}</option>`);

            window.onClassChange = async function () {
                const classId = parseInt(document.getElementById('fClass').value);
                const secSel = document.getElementById('fSection');
                secSel.innerHTML = '<option value="">— Section —</option>';
                if (!classId) return;
                try { studentCache = await getStudents({ class_id: classId }); } catch(e) { studentCache = []; }
                const sections = [...new Set(studentCache.filter(s => s.status === 'Active').map(s => s.section).filter(Boolean))].sort();
                sections.forEach(s => secSel.innerHTML += `<option value="${s}">${s}</option>`);
            };

            let filteredStudents = [], currentExamId = 0, currentSubjectId = 0;

            window.searchResult = async function () {
                const classId = parseInt(document.getElementById('fClass').value);
                const section = document.getElementById('fSection').value;
                const examId = parseInt(document.getElementById('fExam').value);
                const subjectId = parseInt(document.getElementById('fSubject').value);
                if (!classId || !section || !examId || !subjectId) { alert('Please select all filters'); return; }

                currentExamId = examId;
                currentSubjectId = subjectId;
                const exam = examCache.find(e => e.id === examId);
                const subject = subjectCache.find(s => s.id === subjectId);
                const cls = classCache.find(c => c.id === classId);

                filteredStudents = studentCache.filter(s => s.section === section && s.status === 'Active' && s.subjects && (typeof s.subjects === 'string' ? JSON.parse(s.subjects) : s.subjects).includes(subjectId))
                    .sort((a, b) => (a.roll_no || 0) - (b.roll_no || 0));

                if (filteredStudents.length === 0) { alert('No students found with this subject'); return; }

                document.getElementById('isClass').textContent = cls ? cls.name : '';
                document.getElementById('isSection').textContent = section;
                document.getElementById('isExam').textContent = exam ? exam.name : '';
                document.getElementById('isSubject').textContent = subject ? subject.name : '';
                document.getElementById('infoStrip').style.display = 'block';

                // Fetch existing marks for this exam
                let existingResults = [];
                try { existingResults = await getExamResults({ exam_id: examId }); } catch(e) {}

                const tbody = document.getElementById('marksBody');
                tbody.innerHTML = '';
                filteredStudents.forEach(stu => {
                    const existing = existingResults.find(r => r.student_id === stu.id && r.subject_id === subjectId);
                    const minM = existing ? (existing.min_marks || '') : '';
                    const maxM = existing ? (existing.max_marks || '') : '';
                    const obtM = existing ? (existing.theory_marks || '') : '';
                    const prac = existing && existing.practical_marks ? existing.practical_marks : '';
                    const grade = existing ? (existing.grade || '') : '';
                    tbody.innerHTML += `<tr data-student-id="${stu.id}">
                        <td style="font-weight:600;">${stu.roll_no || ''}</td>
                        <td>${stu.admission_no || ''}</td>
                        <td style="font-weight:600;">${stu.name}</td>
                        <td><input type="number" class="mark-input min-mark" value="${minM}" placeholder="Min"></td>
                        <td><input type="number" class="mark-input max-mark" value="${maxM}" placeholder="Max"></td>
                        <td><input type="number" class="mark-input obt-mark" value="${obtM}" placeholder="Marks" oninput="autoGrade(this)"></td>
                        <td><input type="number" class="mark-input prac-mark" value="${prac}" placeholder="—"></td>
                        <td><span class="grade-badge">${grade || '—'}</span></td>
                    </tr>`;
                });

                document.getElementById('marksCard').style.display = 'block';
            };

            window.autoGrade = function (el) {
                const row = el.closest('tr');
                const maxM = parseFloat(row.querySelector('.max-mark').value) || 0;
                const obtM = parseFloat(el.value) || 0;
                const badge = row.querySelector('.grade-badge');
                if (maxM > 0 && obtM >= 0) {
                    badge.textContent = getGrade((obtM / maxM) * 100);
                } else {
                    badge.textContent = '—';
                }
            };

            window.updateAll = async function () {
                const rows = document.querySelectorAll('#marksBody tr');
                const results = [];
                rows.forEach(row => {
                    const stuId = parseInt(row.dataset.studentId);
                    const minM = parseInt(row.querySelector('.min-mark').value);
                    const maxM = parseInt(row.querySelector('.max-mark').value);
                    const obtM = parseInt(row.querySelector('.obt-mark').value);
                    const prac = row.querySelector('.prac-mark').value ? parseInt(row.querySelector('.prac-mark').value) : 0;
                    const gradeText = row.querySelector('.grade-badge').textContent;
                    if (!isNaN(obtM) && !isNaN(maxM) && !isNaN(minM)) {
                        results.push({
                            student_id: stuId,
                            subject_id: currentSubjectId,
                            min_marks: minM,
                            max_marks: maxM,
                            theory_marks: obtM,
                            practical_marks: prac,
                            total_marks: obtM + prac,
                            grade: gradeText !== '—' ? gradeText : getGrade((obtM / maxM) * 100)
                        });
                    }
                });
                try {
                    await saveExamResults(currentExamId, results);
                    alert(`Marks updated for ${results.length} student(s)`);
                } catch(e) { alert('Error saving marks'); }
            };

            window.resetAll = function () {
                document.getElementById('fClass').value = '';
                document.getElementById('fSection').innerHTML = '<option value="">— Section —</option>';
                document.getElementById('fExam').value = '';
                document.getElementById('fSubject').value = '';
                document.getElementById('infoStrip').style.display = 'none';
                document.getElementById('marksCard').style.display = 'none';
            };
        })();
    </script>
</body>
</html>
