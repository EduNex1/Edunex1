name = "vkis-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "vkis-school-db"
database_id = "ab2c83e0-e555-480f-aba1-14653c0345de"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "vkis-school-uploads"

[vars]
# Configure local dev origins explicitly when needed; keep empty for production deployments.
ALLOWED_ORIGINS = ""
# Set DEV_MODE to "true" for local development only.
DEV_MODE = "true"
