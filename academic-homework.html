<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Homework — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .quick-links { display: flex; gap: 8px; margin-bottom: 16px; }
        .ql-btn { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 2px solid #304ffe; cursor: pointer; transition: all 0.15s; background: #fff; color: #304ffe; }
        .ql-btn.active, .ql-btn:hover { background: #304ffe; color: #fff; }
        .form-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 20px; margin-bottom: 16px; }
        .record-count { background: #e3f2fd; color: #1565c0; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
        .hw-table td, .hw-table th { font-size: 12px; vertical-align: middle; padding: 8px 10px; }
        .hw-table th { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #555; letter-spacing: 0.3px; }
        .hw-table tbody tr:hover { background: #f8f9ff; }
        .action-btn { border: none; background: none; cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; transition: background 0.15s; }
        .action-btn.edit { color: #1565c0; } .action-btn.edit:hover { background: #e3f2fd; }
        .action-btn.delete { color: #c62828; } .action-btn.delete:hover { background: #ffebee; }
        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .status-active { background: #e8f5e9; color: #2e7d32; }
        .status-completed { background: #e3f2fd; color: #1565c0; }
        .type-badge { display: inline-block; background: #f3e5f5; color: #7b1fa2; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
        .empty-state { text-align: center; padding: 40px; color: #bbb; }
        .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }
        .hw-textarea { width: 100%; min-height: 80px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: vertical; font-family: inherit; }
        .hw-textarea:focus { outline: none; border-color: #304ffe; box-shadow: 0 0 0 2px rgba(48,79,254,0.1); }
        @media (max-width:767px) { .hw-table td, .hw-table th { font-size: 11px; padding: 6px; } .col-hide-md { display: none !important; } }
        @media (max-width:575px) { .hw-table td, .hw-table th { font-size: 10px; padding: 4px 5px; } .col-hide-sm { display: none !important; } }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Academics</h3>
                    <ul>
                        <li><a href="/dashboard">Home</a></li>
                        <li>Homework</li>
                    </ul>
                </div>

                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-book-open"></i> Homework</h3>
                            </div>
                        </div>

                        
                        <div class="quick-links">
                            <button class="ql-btn" id="tabAdd"><i class="fas fa-plus mg-r-5"></i>Add Homework</button>
                            <button class="ql-btn active" id="tabView"><i class="fas fa-list mg-r-5"></i>View Homework</button>
                        </div>

                        
                        <div id="addSection" style="display:none;">
                            <div class="form-card">
                                <h6 style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;"><i class="fas fa-edit" style="color:#304ffe;margin-right:6px;"></i>Add Homework</h6>
                                <div class="row gutters-8 align-items-end">
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Date *</label>
                                        <input type="date" class="form-control" id="hwDate" style="font-size:12px;height:36px;">
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Class *</label>
                                        <select class="form-control" id="hwClass" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Section *</label>
                                        <select class="form-control" id="hwSection" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Subject *</label>
                                        <select class="form-control" id="hwSubject" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Type</label>
                                        <select class="form-control" id="hwType" style="font-size:12px;height:36px;">
                                            <option value="Assignment">Assignment</option>
                                            <option value="Worksheet">Worksheet</option>
                                            <option value="Project">Project</option>
                                            <option value="Reading">Reading</option>
                                            <option value="Practice">Practice</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Status</label>
                                        <select class="form-control" id="hwStatus" style="font-size:12px;height:36px;">
                                            <option value="Active">Active</option>
                                            <option value="Completed">Completed</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group mg-t-5">
                                    <label class="form-label-sm">Homework *</label>
                                    <textarea class="hw-textarea" id="hwText" placeholder="Enter homework details..."></textarea>
                                </div>
                                <div class="d-flex align-items-center" style="gap:8px;">
                                    <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSave" style="border-radius:6px;height:36px;font-size:12px;padding:0 20px;width:auto;">
                                        <i class="fas fa-save"></i> Save
                                    </button>
                                    <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow" id="btnCancel" style="border-radius:6px;height:36px;font-size:12px;padding:0 20px;width:auto;">
                                        <i class="fas fa-times"></i> Cancel
                                    </button>
                                </div>
                                <input type="hidden" id="editId" value="">
                            </div>
                        </div>

                        
                        <div id="viewSection">
                            
                            <div style="margin-bottom:14px;">
                                <div class="row gutters-8 align-items-end">
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Date From</label>
                                        <input type="date" class="form-control" id="filterFrom" style="font-size:12px;height:36px;">
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Date To</label>
                                        <input type="date" class="form-control" id="filterTo" style="font-size:12px;height:36px;">
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Type</label>
                                        <select class="form-control" id="filterType" style="font-size:12px;height:36px;">
                                            <option value="">All Types</option>
                                            <option value="Assignment">Assignment</option>
                                            <option value="Worksheet">Worksheet</option>
                                            <option value="Project">Project</option>
                                            <option value="Reading">Reading</option>
                                            <option value="Practice">Practice</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Class</label>
                                        <select class="form-control" id="filterClass" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Section</label>
                                        <select class="form-control" id="filterSection" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-lg-2 col-md-3 col-6 form-group">
                                        <label class="form-label-sm">Subject</label>
                                        <select class="form-control" id="filterSubject" style="font-size:12px;height:36px;"></select>
                                    </div>
                                    <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                        <button type="button" class="fw-btn-fill btn-gradient-yellow" id="btnSearch" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                            <i class="fas fa-search"></i> Search
                                        </button>
                                        <button type="button" class="fw-btn-fill bg-blue-dark btn-hover-yellow" id="btnReset" style="border-radius:6px;height:36px;font-size:12px;padding:0 18px;width:auto;">
                                            <i class="fas fa-undo"></i> Reset
                                        </button>
                                    </div>
                                </div>
                            </div>

                            
                            <div class="d-flex align-items-center justify-content-between mg-b-12" style="flex-wrap:wrap;gap:8px;">
                                <h6 style="font-weight:700;font-size:14px;color:#0d1b4a;margin:0;"><i class="fas fa-list" style="color:#304ffe;margin-right:6px;"></i>Homework List</h6>
                                <span class="record-count" id="recordCount">0 Records</span>
                            </div>
                            <div class="table-responsive">
                                <table class="table hw-table table-bordered" style="margin-bottom:0;">
                                    <thead>
                                        <tr style="background:#f5f7ff;">
                                            <th style="width:30px;">#</th>
                                            <th>Date</th>
                                            <th>Class</th>
                                            <th>Subject</th>
                                            <th>Homework</th>
                                            <th class="col-hide-sm">Type</th>
                                            <th>Status</th>
                                            <th style="width:70px;">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="hwBody"></tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(async function () {
            if (typeof initPage === 'function') initPage('academic-homework');
            if (typeof initPage === 'function') if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;

            let classCache = [], subjectCache = [], sectionCache = [], hwCache = [];
            try { [classCache, subjectCache, sectionCache, hwCache] = await Promise.all([getClasses(), getSubjects(), getSections(), getHomework()]); } catch(e) { console.error('Failed to load data', e); }

            const classOpts = '<option value="">Select Class</option>' + classCache.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const subOpts = '<option value="">Select Subject</option>' + subjectCache.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            const sectionOpts = '<option value="">Select Section</option>' + sectionCache.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            const filterSectionOpts = '<option value="">All Sections</option>' + sectionCache.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            $('#hwClass, #filterClass').html(classOpts);
            $('#hwSubject, #filterSubject').html(subOpts);
            $('#hwSection').html(sectionOpts);
            $('#filterSection').html(filterSectionOpts);

            $('#hwDate').val(new Date().toISOString().split('T')[0]);

            $('#tabAdd').on('click', function () {
                $(this).addClass('active'); $('#tabView').removeClass('active');
                $('#addSection').show(); $('#viewSection').hide();
            });
            $('#tabView').on('click', function () {
                $(this).addClass('active'); $('#tabAdd').removeClass('active');
                $('#viewSection').show(); $('#addSection').hide();
            });

            renderList();

            function fmtDate(d) {
                const dt = new Date(d);
                return dt.getDate().toString().padStart(2, '0') + ' ' + dt.toLocaleDateString('en-IN', { month: 'short' }) + ' ' + dt.getFullYear();
            }

            function getClassName(id) {
                const c = classCache.find(x => x.id === parseInt(id));
                return c ? c.name : '—';
            }
            function getSubjectName(id) {
                const s = subjectCache.find(x => x.id === parseInt(id));
                return s ? s.name : '—';
            }

            function renderList() {
                const from = $('#filterFrom').val();
                const to = $('#filterTo').val();
                const type = $('#filterType').val();
                const cls = $('#filterClass').val();
                const sec = $('#filterSection').val();
                const sub = $('#filterSubject').val();

                let data = hwCache.slice().sort((a, b) => (b.date||'').localeCompare(a.date||''));
                if (from) data = data.filter(h => h.date >= from);
                if (to) data = data.filter(h => h.date <= to);
                if (type) data = data.filter(h => h.type === type);
                if (cls) data = data.filter(h => h.class_id === parseInt(cls));
                if (sec) data = data.filter(h => h.section === sec);
                if (sub) data = data.filter(h => h.subject_id === parseInt(sub));

                const body = $('#hwBody');
                body.empty();
                $('#recordCount').text(data.length + ' Record' + (data.length !== 1 ? 's' : ''));

                if (!data.length) {
                    body.html('<tr><td colspan="8" class="empty-state"><i class="fas fa-book"></i>No homework found</td></tr>');
                    return;
                }

                data.forEach((h, i) => {
                    const sCls = h.status === 'Active' ? 'status-active' : 'status-completed';
                    body.append(`
                        <tr>
                            <td>${i + 1}</td>
                            <td style="white-space:nowrap;font-weight:600;">${fmtDate(h.date)}</td>
                            <td>${getClassName(h.class_id)} / ${h.section || '-'}</td>
                            <td>${getSubjectName(h.subject_id)}</td>
                            <td style="max-width:250px;">${h.title || ''}</td>
                            <td class="col-hide-sm"><span class="type-badge">${h.type || ''}</span></td>
                            <td><span class="status-badge ${sCls}">${h.status || 'Active'}</span></td>
                            <td>
                                <button class="action-btn edit" onclick="editHomework(${h.id})" title="Edit"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" onclick="removeHomework(${h.id})" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `);
                });
            }

            $('#btnSave').on('click', async function () {
                const date = $('#hwDate').val();
                const class_id = $('#hwClass').val();
                const section = $('#hwSection').val();
                const subject_id = $('#hwSubject').val();
                const title = $('#hwText').val().trim();
                const type = $('#hwType').val();
                const status = $('#hwStatus').val();

                if (!date) { showToast('Please select a date', 'error'); return; }
                if (!class_id) { showToast('Please select a class', 'error'); return; }
                if (!section) { showToast('Please select a section', 'error'); return; }
                if (!subject_id) { showToast('Please select a subject', 'error'); return; }
                if (!title) { showToast('Please enter homework details', 'error'); return; }

                try {
                    const editId = parseInt($('#editId').val());
                    if (editId) {
                        await updateHomework(editId, { date, class_id, section, subject_id, title, type, status });
                        showToast('Homework updated', 'success');
                    } else {
                        await createHomework({ date, class_id, section, subject_id, title, type, status });
                        showToast('Homework added', 'success');
                    }
                    hwCache = await getHomework();
                    clearForm();
                    renderList();
                    $('#tabView').click();
                } catch(e) { showToast('Error saving homework', 'error'); }
            });

            $('#btnCancel').on('click', function () { clearForm(); $('#tabView').click(); });

            function clearForm() {
                $('#hwDate').val(new Date().toISOString().split('T')[0]);
                $('#hwClass').val(''); $('#hwSection').val(''); $('#hwSubject').val(''); $('#hwText').val('');
                $('#hwType').val('Assignment'); $('#hwStatus').val('Active'); $('#editId').val('');
                $('#btnSave').html('<i class="fas fa-save"></i> Save');
            }

            window.editHomework = function (id) {
                const h = hwCache.find(x => x.id === id);
                if (!h) return;
                $('#hwDate').val(h.date); $('#hwClass').val(h.class_id); $('#hwSection').val(h.section || ''); $('#hwSubject').val(h.subject_id);
                $('#hwText').val(h.title); $('#hwType').val(h.type); $('#hwStatus').val(h.status);
                $('#editId').val(id);
                $('#btnSave').html('<i class="fas fa-save"></i> Update');
                $('#tabAdd').click();
                $('html, body').animate({ scrollTop: 0 }, 300);
            };

            window.removeHomework = async function (id) {
                if (!confirm('Delete this homework?')) return;
                try {
                    await deleteHomework(id);
                    hwCache = hwCache.filter(x => x.id !== id);
                    showToast('Homework deleted', 'success');
                    renderList();
                } catch(e) { showToast('Error deleting homework', 'error'); }
            };

            $('#btnSearch').on('click', renderList);
            $('#btnReset').on('click', function () {
                $('#filterFrom').val(''); $('#filterTo').val(''); $('#filterType').val('');
                $('#filterClass').val(''); $('#filterSection').val(''); $('#filterSubject').val('');
                renderList();
            });
        });
    </script>
</body>

</html>
