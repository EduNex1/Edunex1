<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Homework — Student Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/student-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .hw-item {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8eaf6;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: all 0.2s;
        }

        .hw-item:hover {
            box-shadow: 0 4px 12px rgba(13, 27, 74, 0.06);
        }

        .hw-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .hw-body {
            flex: 1;
            min-width: 0;
        }

        .hw-subject {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .hw-title {
            font-size: 14px;
            font-weight: 700;
            color: #0d1b4a;
            margin-bottom: 4px;
        }

        .hw-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .hw-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #888;
        }

        .hw-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hw-due {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>My Homework</h3>
                    <ul>
                        <li><a href="/student-dashboard">Home</a></li>
                        <li>Academics</li>
                        <li>Homework</li>
                    </ul>
                </div>

                <div id="hwArea">
                    <p style="text-align:center;color:#888;padding:30px;">Loading homework...</p>
                </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function () {
        initPage('s-homework');
        if (typeof requireRoles === 'function' && !requireRoles(['student'])) return;
        try {
            const children = await getMyChildren();
            const stu = children && children[0];
            if (!stu) { $('#hwArea').html('<p style="text-align:center;color:#888;">Student not found.</p>'); return; }
            const data = await getHomework({ class_id: stu.class_id, section: stu.section }) || [];
            if (!data.length) { $('#hwArea').html('<div class="chart-card" style="text-align:center;padding:40px;"><i class="fas fa-clipboard-check" style="font-size:40px;color:#c5cae9;margin-bottom:12px;"></i><p style="color:#888;">No homework assigned.</p></div>'); return; }
            const colors = ['#ef6c00','#1565c0','#2e7d32','#7b1fa2','#00695c','#c62828'];
            const bgs = ['#fff3e0','#e3f2fd','#e8f5e9','#f3e5f5','#e0f2f1','#ffebee'];
            let html = '<div class="chart-card" style="margin-bottom:16px;"><div class="chart-card-header"><i class="fas fa-pencil-alt" style="color:#304ffe;"></i> Homework</div><div class="chart-card-body">';
            data.forEach((h, i) => {
                const c = colors[i % colors.length], bg = bgs[i % bgs.length];
                html += `<div class="hw-item"><div class="hw-icon" style="background:${bg};color:${c};"><i class="fas fa-book"></i></div><div class="hw-body"><div class="hw-subject" style="color:${c};">${escHtml(h.subject_name || h.subject || '-')}</div><div class="hw-title">${escHtml(h.title || '-')}</div>${h.description ? '<div class="hw-desc">' + escHtml(h.description) + '</div>' : ''}<div class="hw-meta"><span><i class="fas fa-calendar"></i> ${h.date || h.created_at || ''}</span>${h.type ? '<span><i class="fas fa-bookmark"></i> ' + escHtml(h.type) + '</span>' : ''}</div></div>${h.due_date ? '<div class="hw-due" style="background:' + bg + ';color:' + c + ';">Due: ' + h.due_date + '</div>' : ''}</div>`;
            });
            html += '</div></div>';
            $('#hwArea').html(html);
        } catch (e) {
            console.error(e);
            $('#hwArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load homework. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    </script>
</body>

</html>
