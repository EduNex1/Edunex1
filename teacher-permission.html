<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Teacher Permission — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ─── Same form card style as admit-form ─── */
        .admit-form-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .admit-form-card .card-body {
            padding: 24px 28px;
        }

        .form-section {
            margin-bottom: 18px;
        }

        .form-section-title {
            background: #0d1b4a;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-section-title i {
            font-size: 12px;
            opacity: 0.7;
        }

        .admit-form .form-group {
            margin-bottom: 12px;
        }

        .admit-form label {
            font-size: 11px;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .admit-form .form-control,
        .admit-form select.form-control {
            font-size: 12px;
            height: 34px;
            padding: 4px 10px;
            border: 1px solid #d0d5dd;
            border-radius: 5px;
        }

        /* Module checkboxes */
        .perm-box {
            background: #f5f7ff;
            border: 1px solid #e0e4f0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 4px;
        }

        .perm-box .perm-label {
            font-size: 11px;
            font-weight: 700;
            color: #304ffe;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .perm-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .perm-group label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: none;
            letter-spacing: 0;
        }

        .perm-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #304ffe;
        }

        .perm-divider {
            width: 1px;
            height: 20px;
            background: #ccc;
        }

        /* Action buttons */
        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn-submit {
            background: #0d1b4a;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 22px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            background: #f0f1f5;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        /* Table */
        .tp-table td,
        .tp-table th {
            font-size: 12px;
            vertical-align: middle;
            padding: 8px 10px;
        }

        .tp-table th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            background: #0d1b4a;
            letter-spacing: 0.3px;
        }

        .tp-table tbody tr:hover {
            background: #f8f9ff;
        }

        .action-btn {
            border: none;
            background: none;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.15s;
        }

        .action-btn.edit {
            color: #1565c0;
        }

        .action-btn.edit:hover {
            background: #e3f2fd;
        }

        .action-btn.delete {
            color: #c62828;
        }

        .action-btn.delete:hover {
            background: #ffebee;
        }

        .module-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 10px;
            margin: 1px 2px;
        }

        .mod-attendance {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .mod-homework {
            background: #e3f2fd;
            color: #1565c0;
        }

        .record-count {
            background: #e3f2fd;
            color: #1565c0;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #bbb;
        }

        .empty-state i {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        @media (max-width:767px) {

            .tp-table td,
            .tp-table th {
                font-size: 11px;
                padding: 6px;
            }

            .admit-form-card .card-body {
                padding: 14px 12px;
            }
        }

        @media (max-width:575px) {

            .tp-table td,
            .tp-table th {
                font-size: 10px;
                padding: 4px 5px;
            }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Staff</h3>
                    <ul>
                        <li><a href="/dashboard">Home</a></li>
                        <li>Teacher Permission</li>
                    </ul>
                </div>

                <div class="card admit-form-card">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-user-shield"></i> Teacher Permission</h3>
                            </div>
                        </div>

                        <form class="admit-form" id="permForm" autocomplete="off">
                            <!-- ═══════════ ASSIGN PERMISSION ═══════════ -->
                            <div class="form-section">
                                <div class="form-section-title"><i class="fas fa-key"></i> Assign Permission</div>
                                <div class="row">
                                    <div class="col-xl-3 col-lg-4 col-md-6 col-12 form-group">
                                        <label>Select Teacher *</label>
                                        <select class="form-control" id="pStaff"></select>
                                    </div>
                                    <div class="col-xl-2 col-lg-3 col-md-4 col-6 form-group">
                                        <label>Class *</label>
                                        <select class="form-control" id="pClass"></select>
                                    </div>
                                    <div class="col-xl-2 col-lg-3 col-md-4 col-6 form-group">
                                        <label>Section *</label>
                                        <select class="form-control" id="pSection"></select>
                                    </div>
                                    <div class="col-xl-3 col-lg-4 col-md-6 col-6 form-group">
                                        <label>Subject *</label>
                                        <select class="form-control" id="pSubject"></select>
                                    </div>
                                </div>

                                <!-- Module Permissions -->
                                <div class="perm-box">
                                    <div class="perm-label"><i class="fas fa-lock-open"></i> Module Permissions</div>
                                    <div class="perm-group">
                                        <label><input type="checkbox" id="permAll"> <strong>Select All</strong></label>
                                        <span class="perm-divider"></span>
                                        <label><input type="checkbox" class="perm-module" value="Student Attendance">
                                            Student Attendance</label>
                                        <label><input type="checkbox" class="perm-module" value="Homework">
                                            Homework</label>
                                    </div>
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="btn-submit" id="btnSubmit"><i
                                            class="fas fa-check mg-r-5"></i> Assign</button>
                                    <button type="button" class="btn-cancel" id="btnCancel"><i
                                            class="fas fa-times mg-r-5"></i> Cancel</button>
                                </div>
                                <input type="hidden" id="editId" value="">
                            </div>
                        </form>

                        <!-- ═══════════ PERMISSION LIST ═══════════ -->
                        <div class="form-section">
                            <div class="form-section-title"><i class="fas fa-list"></i> Permission List</div>

                            <!-- Filter -->
                            <div class="row" style="margin-bottom:12px;">
                                <div class="col-lg-3 col-md-4 col-6 form-group" style="margin-bottom:8px;">
                                    <label
                                        style="font-size:11px;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:4px;">Filter
                                        by Teacher</label>
                                    <select class="form-control" id="filterTeacher"
                                        style="font-size:12px;height:34px;border:1px solid #d0d5dd;border-radius:5px;"></select>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end"
                                    style="gap:6px;margin-bottom:8px;">
                                    <button type="button" class="btn-submit" id="btnSearch" style="padding:7px 16px;"><i
                                            class="fas fa-search"></i></button>
                                    <button type="button" class="btn-cancel" id="btnClear" style="padding:7px 16px;"><i
                                            class="fas fa-eraser"></i></button>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="margin-bottom:8px;">
                                    <span class="record-count" id="recordCount">0 Records</span>
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table tp-table table-bordered" style="margin-bottom:0;">
                                    <thead>
                                        <tr>
                                            <th style="width:30px;">#</th>
                                            <th>Teacher Name</th>
                                            <th>Class</th>
                                            <th>Section</th>
                                            <th>Subject</th>
                                            <th>Modules</th>
                                            <th style="width:70px;">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tpBody"></tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(async function () {
            if (typeof initPage === 'function') initPage('teacher-permission');

            let classCache = [], sectionCache = [], subjectCache = [], staffCache = [], permCache = [];
            try {
                [classCache, sectionCache, subjectCache, staffCache, permCache] = await Promise.all([
                    getClasses(), getSections(), getSubjects(), getStaff({ status: 'Active' }), getTeacherPermissions()
                ]);
            } catch(e) {}

            const teachers = staffCache.filter(s => s.designation === 'Teacher');

            const teacherOpts = '<option value="">Select Teacher *</option>' + teachers.map(t => `<option value="${t.id}">${t.name} (${t.employee_id || ''})</option>`).join('');
            $('#pStaff').html(teacherOpts);
            $('#filterTeacher').html('<option value="">All Teachers</option>' + teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join(''));

            const classOpts = '<option value="">Select Class *</option>' + classCache.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            $('#pClass').html(classOpts);

            const secOpts = '<option value="">Select Section *</option>' + sectionCache.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            $('#pSection').html(secOpts);

            const subOpts = '<option value="">Select Subject *</option>' + subjectCache.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            $('#pSubject').html(subOpts);

            $('#permAll').on('change', function () {
                $('.perm-module').prop('checked', $(this).is(':checked'));
            });
            $('.perm-module').on('change', function () {
                const total = $('.perm-module').length;
                const checked = $('.perm-module:checked').length;
                $('#permAll').prop('checked', total === checked);
            });

            renderList();

            function getStaffById(id) { return staffCache.find(s => s.id === parseInt(id)); }
            function getClassName(id) { const c = classCache.find(x => x.id === parseInt(id)); return c ? c.name : '—'; }
            function getSectionName(id) { const s = sectionCache.find(x => x.id === parseInt(id)); return s ? s.name : '—'; }
            function getSubjectName(id) { const s = subjectCache.find(x => x.id === parseInt(id)); return s ? s.name : '—'; }

            function moduleBadges(modules) {
                const mods = typeof modules === 'string' ? modules.split(',').map(m => m.trim()).filter(Boolean) : (modules || []);
                return mods.map(m => {
                    const cls = m === 'Student Attendance' ? 'mod-attendance' : 'mod-homework';
                    return `<span class="module-badge ${cls}">${m}</span>`;
                }).join('');
            }

            function renderList() {
                const filterStaff = $('#filterTeacher').val();
                let data = permCache.slice();
                if (filterStaff) data = data.filter(p => p.staff_id === parseInt(filterStaff));

                data.sort((a, b) => {
                    const sa = getStaffById(a.staff_id);
                    const sb = getStaffById(b.staff_id);
                    return (sa ? sa.name : '').localeCompare(sb ? sb.name : '');
                });

                const body = $('#tpBody');
                body.empty();
                $('#recordCount').text(data.length + ' Record' + (data.length !== 1 ? 's' : ''));

                if (!data.length) {
                    body.html('<tr><td colspan="7" class="empty-state"><i class="fas fa-user-lock"></i>No permissions found</td></tr>');
                    return;
                }

                data.forEach((p, i) => {
                    const staff = getStaffById(p.staff_id);
                    const staffName = staff ? `<div style="font-weight:600;">${staff.name}</div><div style="font-size:10px;color:#888;">${staff.employee_id || ''}</div>` : '—';

                    body.append(`
                        <tr>
                            <td>${i + 1}</td>
                            <td>${staffName}</td>
                            <td>Class ${getClassName(p.class_id)}</td>
                            <td>${getSectionName(p.section_id)}</td>
                            <td style="font-weight:600;">${getSubjectName(p.subject_id)}</td>
                            <td>${moduleBadges(p.modules)}</td>
                            <td>
                                <button class="action-btn edit" onclick="editPerm(${p.id})" title="Edit"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" onclick="removePerm(${p.id})" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `);
                });
            }

            $('#btnSubmit').on('click', async function () {
                const staffId = $('#pStaff').val();
                const classId = $('#pClass').val();
                const sectionId = $('#pSection').val();
                const subjectId = $('#pSubject').val();
                const modules = [];
                $('.perm-module:checked').each(function () { modules.push($(this).val()); });

                if (!staffId) { showToast('Please select a teacher', 'error'); return; }
                if (!classId) { showToast('Please select a class', 'error'); return; }
                if (!sectionId) { showToast('Please select a section', 'error'); return; }
                if (!subjectId) { showToast('Please select a subject', 'error'); return; }
                if (!modules.length) { showToast('Select at least one module permission', 'error'); return; }

                const editId = parseInt($('#editId').val());
                const payload = { staff_id: parseInt(staffId), class_id: parseInt(classId), section_id: parseInt(sectionId), subject_id: parseInt(subjectId), modules: modules.join(',') };

                try {
                    if (editId) {
                        await updateTeacherPermission(editId, payload);
                        showToast('Permission updated', 'success');
                    } else {
                        const exists = permCache.find(p => p.staff_id === parseInt(staffId) && p.class_id === parseInt(classId) && p.section_id === parseInt(sectionId) && p.subject_id === parseInt(subjectId));
                        if (exists) { showToast('Permission already exists for this combination. Use edit instead.', 'error'); return; }
                        await createTeacherPermission(payload);
                        showToast('Permission assigned successfully', 'success');
                    }
                    permCache = await getTeacherPermissions();
                } catch(e) { showToast('Error saving permission', 'error'); return; }
                clearForm();
                renderList();
            });

            $('#btnCancel').on('click', function () { clearForm(); });

            function clearForm() {
                $('#pStaff').val(''); $('#pClass').val(''); $('#pSection').val(''); $('#pSubject').val('');
                $('#permAll').prop('checked', false); $('.perm-module').prop('checked', false);
                $('#editId').val('');
                $('#btnSubmit').html('<i class="fas fa-check mg-r-5"></i> Assign');
            }

            window.editPerm = function (id) {
                const p = permCache.find(x => x.id === id);
                if (!p) return;
                $('#pStaff').val(p.staff_id); $('#pClass').val(p.class_id); $('#pSection').val(p.section_id); $('#pSubject').val(p.subject_id);
                $('.perm-module').prop('checked', false);
                const mods = typeof p.modules === 'string' ? p.modules.split(',').map(m => m.trim()) : (p.modules || []);
                mods.forEach(m => { $(`.perm-module[value="${m}"]`).prop('checked', true); });
                const total = $('.perm-module').length;
                const checked = $('.perm-module:checked').length;
                $('#permAll').prop('checked', total === checked);
                $('#editId').val(id);
                $('#btnSubmit').html('<i class="fas fa-check mg-r-5"></i> Update');
                $('html, body').animate({ scrollTop: 0 }, 300);
            };

            window.removePerm = function (id) {
                showConfirmModal('Delete Permission', 'Are you sure you want to delete this permission?', async function () {
                    try {
                        await deleteTeacherPermission(id);
                        permCache = permCache.filter(p => p.id !== id);
                        showToast('Permission deleted', 'success');
                        renderList();
                    } catch(e) { showToast('Error deleting permission', 'error'); }
                });
            };

            $('#btnSearch').on('click', renderList);
            $('#btnClear').on('click', function () { $('#filterTeacher').val(''); renderList(); });
        });
    </script>
</body>

</html>
