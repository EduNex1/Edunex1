<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Salary List — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 18px 20px; margin-bottom: 16px; }
        .form-label-sm { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.3px; }
        .form-control { font-size: 12px; height: 36px; }
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; background: #0d1b4a; color: #fff; padding: 8px 12px; text-align: left; white-space: nowrap; }
        .list-table tbody td { font-size: 12px; padding: 8px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; white-space: nowrap; }
        .list-table tbody tr:hover td { background: #f5f7ff; }
        .list-table tbody tr.total-row td { font-weight: 700; background: #f8f9ff; border-top: 2px solid #0d1b4a; font-size: 13px; }
        .action-icon { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; transition: 0.15s; }
        .action-icon.print { background: #e8f5e9; color: #2e7d32; }
        .action-icon.print:hover { background: #2e7d32; color: #fff; }
        .action-icon.edit { background: #e3f2fd; color: #1565c0; }
        .action-icon.edit:hover { background: #1565c0; color: #fff; }
        .action-icon.delete { background: #fce4ec; color: #c62828; }
        .action-icon.delete:hover { background: #c62828; color: #fff; }
        .status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-badge.paid { background: #e8f5e9; color: #2e7d32; }
        .status-badge.unpaid { background: #fff3e0; color: #e65100; }
        .table-card { background: #fff; border: 2px solid #e0e0e0; border-radius: 14px; overflow: hidden; }
        .table-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .table-header h5 { margin: 0; font-size: 14px; font-weight: 700; color: #0d1b4a; }
        .empty-state { text-align: center; padding: 40px; color: #bbb; }
        .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }
        .pay-card { background: #f8f9ff; border: 2px dashed #c5cae9; border-radius: 10px; padding: 16px 20px; margin-top: 12px; display: none; }
        @media (max-width: 768px) {
            .list-table thead th, .list-table tbody td { font-size: 10px; padding: 6px 8px; }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Payroll</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>Salary List</li>
                    </ul>
                </div>

                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-list-alt"></i> Salary List</h3>
                            </div>
                        </div>

                        <!-- Filters -->
                        <div class="filter-card">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Month</label>
                                    <select class="form-control" id="fMonth"><option value="">All Months</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Designation</label>
                                    <select class="form-control" id="fDesignation"><option value="">All Designations</option></select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Staff</label>
                                    <select class="form-control" id="fStaff"><option value="">All Staff</option></select>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" id="btnSearch" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;">
                                        <i class="fas fa-search"></i> Search
                                    </button>
                                    <button class="fw-btn-fill" id="btnClear" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;">
                                        <i class="fas fa-redo"></i> Clear
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Salary Table -->
                        <div class="table-card">
                            <div class="table-header">
                                <h5><i class="fas fa-money-check-alt" style="margin-right:6px;"></i>Generated Salaries</h5>
                                <a href="/salary-generate" style="font-size:12px;font-weight:600;color:#0d1b4a;text-decoration:none;"><i class="fas fa-plus-circle"></i> Generate New</a>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table" id="salaryTable">
                                    <thead>
                                        <tr>
                                            <th>Actions</th>
                                            <th>Status</th>
                                            <th>Emp ID</th>
                                            <th>Employee Name</th>
                                            <th>Designation</th>
                                            <th>Salary Month</th>
                                            <th>Generated Date</th>
                                            <th>Amount (₹)</th>
                                            <th>Remark</th>
                                        </tr>
                                    </thead>
                                    <tbody id="salaryBody"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Pay Section (shown inline below list on edit click for unpaid) -->
                        <div class="pay-card" id="payCard">
                            <div style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;"><i class="fas fa-credit-card"></i> Mark Payment</div>
                            <div class="row align-items-end" style="gap:0;">
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Final Salary</label>
                                    <input type="text" class="form-control" id="payAmount" readonly style="font-weight:700;color:#2e7d32;">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Payment Date</label>
                                    <input type="date" class="form-control" id="payDate">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Payment Mode</label>
                                    <select class="form-control" id="payMode">
                                        <option value="">Select Mode</option>
                                        <option value="Cash">Cash</option>
                                        <option value="Bank">Bank Transfer</option>
                                        <option value="UPI/Others">UPI / Others</option>
                                    </select>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" onclick="payNow()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;">
                                        <i class="fas fa-check"></i> Pay
                                    </button>
                                    <button class="fw-btn-fill" onclick="cancelPay()" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;">
                                        <i class="fas fa-times"></i> Cancel
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        const SALARY_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        let payingId = null;
        let staffCache = [];
        let salaryCache = [];
        let allowanceHeads = [];
        let deductionHeads = [];

        (async function () {
            if (typeof initPage === 'function') initPage('salary-list');

            try {
                [staffCache, salaryCache, allowanceHeads, deductionHeads] = await Promise.all([
                    getStaff({ status: 'Active' }),
                    getSalaries(),
                    getAllowanceHeads(),
                    getDeductionHeads()
                ]);
            } catch(e) { console.error(e); }

            // Populate filters
            SALARY_MONTHS.forEach(m => $('#fMonth').append(`<option value="${m}">${m}</option>`));
            const designations = [...new Set(staffCache.map(s => s.designation).filter(Boolean))].sort();
            designations.forEach(d => $('#fDesignation').append(`<option value="${d}">${d}</option>`));
            staffCache.forEach(s => $('#fStaff').append(`<option value="${s.id}">${s.employee_id} — ${s.name}</option>`));

            $('#btnSearch').on('click', renderList);
            $('#btnClear').on('click', function () {
                $('#fMonth, #fDesignation, #fStaff').val('');
                renderList();
            });

            renderList();
        })();

        function renderList() {
            const fMonth = $('#fMonth').val();
            const fDesig = $('#fDesignation').val();
            const fStaffId = $('#fStaff').val();

            let list = [...salaryCache];

            if (fMonth) list = list.filter(g => g.month === fMonth);
            if (fStaffId) list = list.filter(g => g.staff_id === parseInt(fStaffId));
            if (fDesig) {
                const staffIds = staffCache.filter(s => s.designation === fDesig).map(s => s.id);
                list = list.filter(g => staffIds.includes(g.staff_id));
            }

            // Sort newest first
            list.sort((a, b) => b.id - a.id);

            const tbody = document.getElementById('salaryBody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-list-alt"></i>No salary records found</div></td></tr>';
                return;
            }

            let html = '';
            let grandTotal = 0;

            list.forEach(g => {
                const staff = staffCache.find(s => s.id === g.staff_id) || {};
                grandTotal += g.net_salary || 0;
                const isUnpaid = g.status === 'Unpaid' || g.status === 'Generated';
                const statusClass = isUnpaid ? 'unpaid' : 'paid';

                html += `<tr>
                    <td>
                        <button class="action-icon print" title="Print" onclick="window.printSalary(${g.id})"><i class="fas fa-print"></i></button>
                        <button class="action-icon delete" title="Delete" onclick="window.removeSalary(${g.id})" style="margin-left:3px;"><i class="fas fa-trash-alt"></i></button>
                        ${isUnpaid ? `<button class="action-icon edit" title="Pay Now" onclick="window.openPay(${g.id})" style="margin-left:3px;"><i class="fas fa-credit-card"></i></button>` : ''}
                    </td>
                    <td><span class="status-badge ${statusClass}">${g.status}</span></td>
                    <td style="font-weight:600;">${staff.employee_id || g.employee_id || ''}</td>
                    <td style="font-weight:600;">${staff.name || g.staff_name || ''}</td>
                    <td>${staff.designation || g.designation || ''}</td>
                    <td>${g.month} ${g.year}</td>
                    <td>${formatDate(g.generated_date)}</td>
                    <td style="font-weight:700;color:#2e7d32;">₹${(g.net_salary || 0).toLocaleString('en-IN')}</td>
                    <td style="color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;">${g.remark || '-'}</td>
                </tr>`;
            });

            // Total row
            html += `<tr class="total-row">
                <td colspan="7" style="text-align:right;">Total</td>
                <td>₹${grandTotal.toLocaleString('en-IN')}</td>
                <td></td>
            </tr>`;

            tbody.innerHTML = html;
        }

        function formatDate(d) {
            if (!d) return '-';
            const dt = new Date(d);
            return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        window.openPay = function(id) {
            const g = salaryCache.find(s => s.id === id);
            if (!g || (g.status !== 'Unpaid' && g.status !== 'Generated')) return;
            payingId = id;
            $('#payAmount').val('₹' + (g.net_salary || 0).toLocaleString('en-IN'));
            $('#payDate').val(new Date().toISOString().split('T')[0]);
            $('#payMode').val('');
            $('#payCard').slideDown(200);
            $('html, body').animate({ scrollTop: $('#payCard').offset().top - 100 }, 300);
        };

        window.cancelPay = function() {
            payingId = null;
            $('#payCard').slideUp(200);
        };

        window.payNow = async function() {
            if (!payingId) return;
            const payDate = $('#payDate').val();
            const payMode = $('#payMode').val();
            if (!payDate) { showToast('Please select payment date', 'error'); return; }
            if (!payMode) { showToast('Please select payment mode', 'error'); return; }

            try {
                await updateSalary(payingId, { status: 'Paid', payment_date: payDate, payment_mode: payMode });
                const g = salaryCache.find(s => s.id === payingId);
                if (g) { g.status = 'Paid'; g.payment_date = payDate; g.payment_mode = payMode; }
                showToast('Salary marked as Paid!', 'success');
                payingId = null;
                $('#payCard').slideUp(200);
                renderList();
            } catch(e) { showToast('Error: ' + e.message, 'error'); }
        };

        window.removeSalary = function(id) {
            const g = salaryCache.find(s => s.id === id);
            if (!g) return;
            const staff = staffCache.find(s => s.id === g.staff_id) || {};
            showConfirmModal('Delete Salary Record', `Delete salary record for <strong>${staff.name || 'Staff'}</strong> — ${g.month} ${g.year}?`, async function () {
                try {
                    await deleteSalary(id);
                    salaryCache = salaryCache.filter(s => s.id !== id);
                    showToast('Salary record deleted!', 'success');
                    renderList();
                } catch(e) { showToast('Error: ' + e.message, 'error'); }
            });
        };

        window.printSalary = function(id) {
            const g = salaryCache.find(s => s.id === id);
            if (!g) return;
            const staff = staffCache.find(s => s.id === g.staff_id) || {};
            if (!staff.name) return;
            const _u = typeof getUser === 'function' ? getUser() : null;
            const schoolName = (_u && _u.school_name) ? _u.school_name : 'School';

            const gAllowances = typeof g.allowances === 'string' ? JSON.parse(g.allowances || '{}') : (g.allowances || {});
            const gDeductions = typeof g.deductions === 'string' ? JSON.parse(g.deductions || '{}') : (g.deductions || {});

            // Build allowance & deduction lines
            let allowanceLines = '';
            let totalAllow = 0;
            allowanceHeads.forEach(a => {
                const val = gAllowances[a.id] || 0;
                if (val > 0) { allowanceLines += `<tr><td style="padding:4px 8px;font-size:11px;">${a.name}</td><td style="padding:4px 8px;font-size:11px;text-align:right;">₹${val.toLocaleString('en-IN')}</td></tr>`; totalAllow += val; }
            });
            let deductionLines = '';
            let totalDed = 0;
            deductionHeads.forEach(d => {
                const val = gDeductions[d.id] || 0;
                if (val > 0) { deductionLines += `<tr><td style="padding:4px 8px;font-size:11px;">${d.name}</td><td style="padding:4px 8px;font-size:11px;text-align:right;">₹${val.toLocaleString('en-IN')}</td></tr>`; totalDed += val; }
            });

            const totalBasicSalary = g.total_basic_salary || g.basic || 0;
            const netSalary = g.net_salary || 0;

            const printWin = window.open('', '_blank');
            printWin.document.write(`<!DOCTYPE html><html><head><title>Salary Slip — ${staff.name}</title>
            <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; max-width: 700px; margin: auto; color: #333; }
                .header { text-align: center; border-bottom: 3px solid #0d1b4a; padding-bottom: 10px; margin-bottom: 16px; }
                .header h2 { margin: 0; color: #0d1b4a; font-size: 18px; }
                .header p { margin: 2px 0; font-size: 11px; color: #555; }
                .info-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
                .info-grid .item { flex: 1; min-width: 160px; background: #f8f9ff; border: 1px solid #eee; border-radius: 4px; padding: 6px 10px; }
                .info-grid .item label { font-size: 8px; text-transform: uppercase; color: #888; display: block; }
                .info-grid .item span { font-size: 12px; font-weight: 600; color: #0d1b4a; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
                th { background: #0d1b4a; color: #fff; font-size: 9px; padding: 6px 8px; text-align: left; text-transform: uppercase; }
                td { border-bottom: 1px solid #eee; }
                .total td { font-weight: 700; border-top: 2px solid #0d1b4a; background: #f8f9ff; }
                .final { background: #0d1b4a; color: #fff; padding: 12px 16px; border-radius: 6px; text-align: center; font-size: 16px; font-weight: 700; margin-top: 10px; }
                .footer { text-align: center; margin-top: 20px; font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 8px; }
                @media print { body { padding: 0; } }
            </style></head><body>
                <div class="header">
                    <h2>${schoolName}</h2>
                    <p>Salary Slip — ${g.month} ${g.year}</p>
                </div>
                <div class="info-grid">
                    <div class="item"><label>Employee</label><span>${staff.name}</span></div>
                    <div class="item"><label>Emp ID</label><span>${staff.employee_id}</span></div>
                    <div class="item"><label>Designation</label><span>${staff.designation}</span></div>
                    <div class="item"><label>Status</label><span>${g.status}</span></div>
                    <div class="item"><label>Generated</label><span>${g.generated_date}</span></div>
                    ${g.payment_date ? `<div class="item"><label>Payment Date</label><span>${g.payment_date}</span></div>` : ''}
                    ${g.payment_mode ? `<div class="item"><label>Mode</label><span>${g.payment_mode}</span></div>` : ''}
                </div>
                <table>
                    <thead><tr><th>Head</th><th style="text-align:right;">Amount</th></tr></thead>
                    <tbody>
                        <tr><td style="padding:4px 8px;font-size:11px;font-weight:600;">Basic Salary (after attendance)</td><td style="padding:4px 8px;font-size:11px;text-align:right;font-weight:600;">₹${totalBasicSalary.toLocaleString('en-IN')}</td></tr>
                        ${allowanceLines ? '<tr><td colspan="2" style="padding:4px 8px;font-size:9px;font-weight:700;color:#0d1b4a;background:#e8eaf6;text-transform:uppercase;">Allowances</td></tr>' + allowanceLines : ''}
                        ${deductionLines ? '<tr><td colspan="2" style="padding:4px 8px;font-size:9px;font-weight:700;color:#0d1b4a;background:#e8eaf6;text-transform:uppercase;">Deductions</td></tr>' + deductionLines : ''}
                        <tr class="total"><td style="padding:6px 8px;font-size:12px;">Net Salary</td><td style="padding:6px 8px;font-size:12px;text-align:right;">₹${netSalary.toLocaleString('en-IN')}</td></tr>
                    </tbody>
                </table>
                <div class="final">Net Payable: ₹${netSalary.toLocaleString('en-IN')}</div>
                ${g.remark ? `<p style="font-size:11px;color:#555;margin-top:8px;"><strong>Remark:</strong> ${g.remark}</p>` : ''}
                <div class="footer">This is a computer-generated salary slip &bull; ${schoolName}</div>
            </body></html>`);
            printWin.document.close();
            setTimeout(() => { printWin.print(); }, 500);
        };
    </script>
</body>

</html>
