<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Send SMS to Students — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .list-table{width:100%;border-collapse:collapse}
        .list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}
        .list-table tbody td{font-size:12px;padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
        .list-table tbody tr:hover td{background:#f5f7ff}
        .table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden}
        .table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .table-header h5{margin:0;font-size:14px;font-weight:700;color:#0d1b4a}
        .empty-state{text-align:center;padding:40px;color:#bbb}.empty-state i{font-size:36px;margin-bottom:10px;display:block}
        .stu-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e0e0e0}
        .sms-preview-box{background:#f8f9ff;border:2px dashed #c5cae9;border-radius:10px;padding:16px 20px;margin-top:16px}
        .sms-preview-box h6{font-size:12px;font-weight:700;color:#0d1b4a;margin-bottom:8px;text-transform:uppercase}
        .sms-preview-box .sms-text{font-size:12px;color:#333;white-space:pre-wrap;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;line-height:1.6}
        .count-badge{font-size:10px;background:#0d1b4a;color:#fff;border-radius:10px;padding:2px 8px;margin-left:6px}
        /* Multi-select dropdown */
        .ms-dropdown{position:relative;width:100%}
        .ms-trigger{font-size:12px;height:36px;border:1px solid #ced4da;border-radius:4px;padding:6px 30px 6px 10px;background:#fff;cursor:pointer;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#495057;user-select:none}
        .ms-trigger::after{content:'\f078';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#999}
        .ms-trigger.open{border-color:#1565c0;box-shadow:0 0 0 2px rgba(21,101,192,.15)}
        .ms-panel{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ced4da;border-top:none;border-radius:0 0 6px 6px;z-index:1050;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
        .ms-panel.show{display:block}
        .ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .1s}
        .ms-item:hover{background:#f5f7ff}
        .ms-item.select-all{font-weight:700;color:#1565c0;background:#f8f9ff;border-bottom:2px solid #e0e0e0}
        .ms-item input[type="checkbox"]{margin:0;cursor:pointer;accent-color:#0d1b4a}
        .ms-item label{margin:0;cursor:pointer;flex:1}
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Messaging</h3>
                    <ul><li><a href="/dashboard">Home</a></li><li>Send SMS to Students</li></ul>
                </div>
                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-sms"></i> Send SMS to Students</h3></div></div>

                        
                        <div class="filter-card">
                            <div class="row" style="gap:0;">
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">Select Class *</label>
                                    <div class="ms-dropdown" id="classDropdown">
                                        <div class="ms-trigger" onclick="togglePanel('classDropdown')">Select Class</div>
                                        <div class="ms-panel" id="classPanel"></div>
                                    </div>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Select Section</label>
                                    <div class="ms-dropdown" id="sectionDropdown">
                                        <div class="ms-trigger" onclick="togglePanel('sectionDropdown')">Select Section</div>
                                        <div class="ms-panel" id="sectionPanel"></div>
                                    </div>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">SMS Template *</label>
                                    <select class="form-control" id="fTemplate">
                                        <option value="">— Select Template —</option>
                                    </select>
                                </div>
                                <div class="col-lg-3 col-md-4 col-6 form-group">
                                    <label class="form-label-sm">MSG91 Template ID *</label>
                                    <input type="text" class="form-control" id="fMsg91Tpl" placeholder="Paste MSG91 Template ID">
                                </div>
                                <div class="col-lg-4 col-md-12 col-12 form-group d-flex align-items-end" style="gap:8px;">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:7px 20px;" onclick="searchStudents()"><i class="fas fa-search"></i> Search</button>
                                    <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:12px;padding:7px 20px;" onclick="resetFilters()"><i class="fas fa-redo"></i> Reset</button>
                                </div>
                            </div>
                        </div>

                        
                        <div class="table-card">
                            <div class="table-header">
                                <h5><i class="fas fa-list"></i> Student List <span class="count-badge" id="countBadge" style="display:none;">0</span></h5>
                                <label style="font-size:11px;font-weight:700;color:#1565c0;cursor:pointer;user-select:none">
                                    <input type="checkbox" id="selectAllStudents" onchange="toggleAllStudents(this.checked)" style="margin-right:4px;"> Select All
                                </label>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="list-table">
                                    <thead>
                                        <tr>
                                            <th style="width:40px;"><input type="checkbox" id="thCheckAll" onchange="toggleAllStudents(this.checked)"></th>
                                            <th>Photo</th>
                                            <th>Adm No.</th>
                                            <th>Student Name</th>
                                            <th>Father Name</th>
                                            <th>Gender</th>
                                            <th>Mobile</th>
                                            <th>Class / Sec</th>
                                        </tr>
                                    </thead>
                                    <tbody id="studentTableBody">
                                        <tr><td colspan="8" class="empty-state"><i class="fas fa-search"></i>Select filters & click Search</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        
                        <div class="sms-preview-box" id="smsPreviewBox" style="display:none;">
                            <h6><i class="fas fa-envelope-open-text"></i> SMS Approved Template</h6>
                            <div class="sms-text" id="smsPreviewText"></div>
                            <div style="margin-top:14px;text-align:right;">
                                <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:12px;padding:8px 28px;" onclick="sendSms()"><i class="fas fa-paper-plane"></i> Send SMS</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        let classCache = [];
        let studentCache = [];
        let smsTemplates = [];
        let branchInfo = {};
        let optSettings = {};

        (async function () {
            initPage('sms-students');

            try {
                const [classes, students, templates, branches, opts] = await Promise.all([
                    getClasses(),
                    getStudents({ status: 'Active' }),
                    getSmsTemplates().catch(() => []),
                    getBranches().catch(() => []),
                    getOptionSettings().catch(() => ({}))
                ]);
                classCache = classes || [];
                studentCache = students || [];
                smsTemplates = templates || [];
                branchInfo = (branches && branches[0]) || {};
                optSettings = opts || {};
                if (optSettings['msg91_tpl_general']) document.getElementById('fMsg91Tpl').value = optSettings['msg91_tpl_general'];
            } catch(e) { console.error(e); }

            window.togglePanel = function(dropdownId) {
                const dd = document.getElementById(dropdownId);
                const panel = dd.querySelector('.ms-panel');
                const trigger = dd.querySelector('.ms-trigger');
                const isOpen = panel.classList.contains('show');
                document.querySelectorAll('.ms-panel.show').forEach(p => { p.classList.remove('show'); p.parentElement.querySelector('.ms-trigger').classList.remove('open'); });
                if (!isOpen) { panel.classList.add('show'); trigger.classList.add('open'); }
            };

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.ms-dropdown')) {
                    document.querySelectorAll('.ms-panel.show').forEach(p => { p.classList.remove('show'); p.parentElement.querySelector('.ms-trigger').classList.remove('open'); });
                }
            });

            function buildMultiSelect(panelId, items, onChange) {
                const panel = document.getElementById(panelId);
                panel.innerHTML = '';
                const saDiv = document.createElement('div');
                saDiv.className = 'ms-item select-all';
                saDiv.innerHTML = `<input type="checkbox" class="ms-select-all"> <label>Select All</label>`;
                panel.appendChild(saDiv);
                const saCheck = saDiv.querySelector('input');
                saCheck.addEventListener('change', function() {
                    panel.querySelectorAll('.ms-cb').forEach(cb => { cb.checked = this.checked; });
                    updateTriggerText(panelId);
                    if (onChange) onChange();
                });
                saDiv.addEventListener('click', function(e) { if (e.target !== saCheck) { saCheck.checked = !saCheck.checked; saCheck.dispatchEvent(new Event('change')); } });
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'ms-item';
                    div.innerHTML = `<input type="checkbox" class="ms-cb" value="${item.value}"> <label>${item.label}</label>`;
                    panel.appendChild(div);
                    const cb = div.querySelector('input');
                    cb.addEventListener('change', function() {
                        const allCbs = panel.querySelectorAll('.ms-cb');
                        const checkedCbs = panel.querySelectorAll('.ms-cb:checked');
                        saCheck.checked = allCbs.length === checkedCbs.length;
                        updateTriggerText(panelId);
                        if (onChange) onChange();
                    });
                    div.addEventListener('click', function(e) { if (e.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } });
                });
            }

            function updateTriggerText(panelId) {
                const panel = document.getElementById(panelId);
                const dd = panel.closest('.ms-dropdown');
                const trigger = dd.querySelector('.ms-trigger');
                const checked = Array.from(panel.querySelectorAll('.ms-cb:checked'));
                const all = panel.querySelectorAll('.ms-cb');
                if (checked.length === 0) {
                    trigger.textContent = panelId === 'classPanel' ? 'Select Class' : 'Select Section';
                } else if (checked.length === all.length) {
                    trigger.textContent = 'All Selected';
                } else if (checked.length <= 3) {
                    trigger.textContent = checked.map(cb => cb.nextElementSibling ? cb.nextElementSibling.textContent : cb.value).join(', ');
                } else {
                    trigger.textContent = checked.length + ' selected';
                }
            }

            function getCheckedValues(panelId) {
                return Array.from(document.getElementById(panelId).querySelectorAll('.ms-cb:checked')).map(cb => cb.value);
            }

            function clearMultiSelect(panelId) {
                const panel = document.getElementById(panelId);
                panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                updateTriggerText(panelId);
            }

            buildMultiSelect('classPanel', classCache.map(c => ({ value: String(c.id), label: 'Class ' + c.name })), onClassChange);

            function onClassChange() {
                const selectedClassIds = getCheckedValues('classPanel').map(Number);
                const secs = [...new Set(studentCache.filter(s => selectedClassIds.length === 0 || selectedClassIds.includes(s.class_id)).map(s => s.section))].sort();
                buildMultiSelect('sectionPanel', secs.map(s => ({ value: s, label: s })));
                document.getElementById('sectionPanel').querySelectorAll('.ms-cb, .ms-select-all').forEach(cb => cb.checked = true);
                updateTriggerText('sectionPanel');
            }

            onClassChange();

            const tplSelect = document.getElementById('fTemplate');
            smsTemplates.filter(t => !t.key || !t.key.startsWith('staff-')).forEach(t => {
                tplSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`;
            });

            let filteredStudents = [];

            window.searchStudents = function() {
                const tplId = document.getElementById('fTemplate').value;
                if (!tplId) { alert('Please select an SMS Template'); return; }
                const classIds = getCheckedValues('classPanel').map(Number);
                const sections = getCheckedValues('sectionPanel');
                if (classIds.length === 0) { alert('Please select at least one class'); return; }

                filteredStudents = studentCache.filter(s => {
                    if (!classIds.includes(s.class_id)) return false;
                    if (sections.length > 0 && !sections.includes(s.section)) return false;
                    return true;
                });

                renderStudentList();
                showSmsPreview(parseInt(tplId));
            };

            function renderStudentList() {
                const tbody = document.getElementById('studentTableBody');
                if (filteredStudents.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-user-slash"></i>No students found</td></tr>';
                    document.getElementById('countBadge').style.display = 'none';
                    return;
                }
                document.getElementById('countBadge').textContent = filteredStudents.length;
                document.getElementById('countBadge').style.display = 'inline';

                tbody.innerHTML = filteredStudents.map(s => {
                    const cls = classCache.find(c => c.id === s.class_id);
                    return `<tr>
                        <td><input type="checkbox" class="stu-cb" value="${s.id}" checked></td>
                        <td><img src="${s.photo_url || 'img/figure/student2.png'}" class="stu-photo" alt=""></td>
                        <td style="font-weight:600;color:#0d1b4a;">${s.admission_no || ''}</td>
                        <td style="font-weight:600;">${s.name}</td>
                        <td>${s.father_name || ''}</td>
                        <td>${s.gender || ''}</td>
                        <td style="color:#1565c0;font-weight:600;">${s.phone || ''}</td>
                        <td><span style="background:#e3f2fd;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:#0d1b4a;">${cls ? cls.name : ''} / ${s.section || ''}</span></td>
                    </tr>`;
                }).join('');
            }

            function showSmsPreview(tplId) {
                const tpl = smsTemplates.find(t => t.id === tplId);
                if (!tpl) return;
                document.getElementById('smsPreviewText').textContent = (tpl.message || '')
                    .replace('{school_name}', branchInfo.school_name || '')
                    .replace('{school_phone}', branchInfo.phone || '')
                    .replace('{student_name}', '{Student Name}')
                    .replace('{class}', '{Class}')
                    .replace('{section}', '{Section}')
                    .replace('{date}', '{Date}')
                    .replace('{time}', '{Time}')
                    .replace('{reason}', '{Reason}')
                    .replace('{custom_message}', '{Your Custom Message}');
                document.getElementById('smsPreviewBox').style.display = 'block';
            }

            window.toggleAllStudents = function(checked) {
                document.querySelectorAll('.stu-cb').forEach(cb => cb.checked = checked);
                document.getElementById('selectAllStudents').checked = checked;
                document.getElementById('thCheckAll').checked = checked;
            };

            window.resetFilters = function() {
                clearMultiSelect('classPanel');
                clearMultiSelect('sectionPanel');
                document.getElementById('fTemplate').value = '';
                filteredStudents = [];
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-search"></i>Select filters & click Search</td></tr>';
                document.getElementById('smsPreviewBox').style.display = 'none';
                document.getElementById('countBadge').style.display = 'none';
            };

            window.sendSms = async function() {
                const selected = document.querySelectorAll('.stu-cb:checked');
                if (selected.length === 0) { alert('Please select at least one student'); return; }
                const templateId = document.getElementById('fMsg91Tpl').value.trim();
                if (!templateId) { alert('Please enter MSG91 Template ID'); return; }
                const message = document.getElementById('smsPreviewText').textContent;
                const studentIds = Array.from(selected).map(cb => parseInt(cb.value));
                const students = studentCache.filter(s => studentIds.includes(s.id));
                const recipients = students
                    .filter(s => s.phone)
                    .map(s => ({
                        phone: s.phone,
                        recipient_id: s.id,
                        variables: { custom_message: message }
                    }));
                if (!recipients.length) { alert('Selected students have no phone numbers'); return; }

                const btn = document.querySelector('#smsPreviewBox button');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

                try {
                    await sendRealSms({
                        template_id: templateId,
                        recipients: recipients,
                        recipient_type: 'student',
                        type: 'Student',
                        message: message,
                        variables: { custom_message: message }
                    });
                    alert('SMS sent successfully to ' + recipients.length + ' student(s) via MSG91!');
                    window.resetFilters();
                } catch(e) {
                    alert('Error: ' + e.message);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send SMS';
                }
            };
        })();
    </script>
</body>

</html>
