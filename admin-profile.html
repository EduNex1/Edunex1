<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8"><meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>My Profile — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/all.min.css"><link rel="stylesheet" href="fonts/flaticon.css"><link rel="stylesheet" href="css/animate.min.css"><link rel="stylesheet" href="css/select2.min.css"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .profile-card{background:#fff;border-radius:14px;border:1px solid #f0f0f0;padding:28px 30px;margin-bottom:18px}
        .profile-title{font-size:15px;font-weight:700;color:#0d1b4a;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #e8eaf6;display:flex;align-items:center;gap:8px}
        .profile-title i{font-size:16px;color:#4fc3f7}
        .form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}
        .form-control{font-size:12px;height:36px}
        .profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#0d1b4a,#1a3a7a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;margin:0 auto 12px}
        .role-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
        .role-badge.admin{background:#e3f2fd;color:#1565c0}
        .info-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
        .info-row:last-child{border-bottom:none}
        .info-row .lbl{width:140px;font-weight:600;color:#666;flex-shrink:0}
        .info-row .val{color:#333;font-weight:500}
        .pw-strength{font-size:10px;margin-top:4px;font-weight:600}
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area"><h3>My Profile</h3><ul><li><a href="/dashboard">Home</a></li><li>My Profile</li></ul></div>
                <div class="card height-auto"><div class="card-body">
                    <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-user-circle"></i> My Profile</h3></div></div>

                    <div class="row">
                        
                        <div class="col-lg-5 col-md-6 col-12">
                            <div class="profile-card">
                                <div class="profile-title"><i class="fas fa-id-badge"></i> Account Information</div>
                                <div class="text-center mb-3">
                                    <div class="profile-avatar" id="avatarInitials">—</div>
                                    <span class="role-badge admin" id="roleBadge">—</span>
                                </div>
                                <div class="info-row"><span class="lbl">Login ID</span><span class="val" id="infoLoginId">—</span></div>
                                <div class="info-row"><span class="lbl">Name</span><span class="val" id="infoName">—</span></div>
                                <div class="info-row"><span class="lbl">Email</span><span class="val" id="infoEmail">—</span></div>
                                <div class="info-row"><span class="lbl">Role</span><span class="val" id="infoRole">—</span></div>
                            </div>
                        </div>

                        
                        <div class="col-lg-7 col-md-6 col-12">
                            
                            <div class="profile-card">
                                <div class="profile-title"><i class="fas fa-edit"></i> Edit Profile</div>
                                <div class="row">
                                    <div class="col-lg-6 col-12 form-group">
                                        <label class="form-label-sm">Name</label>
                                        <input type="text" class="form-control" id="editName" placeholder="Your name">
                                    </div>
                                    <div class="col-lg-6 col-12 form-group">
                                        <label class="form-label-sm">Email</label>
                                        <input type="email" class="form-control" id="editEmail" placeholder="your@email.com">
                                    </div>
                                </div>
                                <div class="text-end mt-1">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;padding:8px 28px;border-radius:6px;font-weight:600;" onclick="saveProfile()"><i class="fas fa-save" style="margin-right:5px;"></i>Save Changes</button>
                                </div>
                            </div>

                            
                            <div class="profile-card">
                                <div class="profile-title"><i class="fas fa-key"></i> Change Password</div>
                                <div class="row">
                                    <div class="col-lg-12 col-12 form-group">
                                        <label class="form-label-sm">Current Password</label>
                                        <input type="password" class="form-control" id="currentPw" placeholder="Enter current password">
                                    </div>
                                    <div class="col-lg-6 col-12 form-group">
                                        <label class="form-label-sm">New Password</label>
                                        <input type="password" class="form-control" id="newPw" placeholder="Min 4 characters" oninput="checkPwStrength()">
                                        <div class="pw-strength" id="pwStrength"></div>
                                    </div>
                                    <div class="col-lg-6 col-12 form-group">
                                        <label class="form-label-sm">Confirm New Password</label>
                                        <input type="password" class="form-control" id="confirmPw" placeholder="Re-enter new password">
                                    </div>
                                </div>
                                <div class="text-end mt-1">
                                    <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;padding:8px 28px;border-radius:6px;font-weight:600;" onclick="doChangePassword()"><i class="fas fa-lock" style="margin-right:5px;"></i>Change Password</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script><script src="js/plugins.js"></script><script src="js/popper.min.js"></script><script src="js/bootstrap.min.js"></script><script src="js/select2.min.js"></script><script src="js/jquery.scrollUp.min.js"></script><script src="js/api.js"></script><script src="js/app.js"></script><script src="js/main.js"></script>
    <script>
    $(async function(){
        if (typeof requireRoles === 'function' && !requireRoles(['super_admin','branch_admin'])) return;
        initPage('admin-profile');

        let profile = {};
        try { profile = await getMyProfile(); } catch(e) { showToast('Failed to load profile','error'); }

        const initials = (profile.name || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        $('#avatarInitials').text(initials);
        const roleLabel = (profile.role||'').replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
        $('#roleBadge').text(roleLabel);
        $('#infoLoginId').text(profile.login_id || '—');
        $('#infoName').text(profile.name || '—');
        $('#infoEmail').text(profile.email || '—');
        $('#infoRole').text(roleLabel);
        $('#editName').val(profile.name || '');
        $('#editEmail').val(profile.email || '');

        window.saveProfile = async function(){
            const name = $('#editName').val().trim();
            const email = $('#editEmail').val().trim();
            if(!name){ showToast('Name is required','error'); return; }
            try {
                await updateMyProfile({ name, email });
                profile.name = name; profile.email = email;
                $('#infoName').text(name);
                $('#infoEmail').text(email || '—');
                const ni = name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
                $('#avatarInitials').text(ni);
                const u = getUser(); if(u){ u.name = name; u.email = email; setUser(u); }
                showToast('Profile updated','success');
            } catch(e){ showToast(e.message||'Failed to update','error'); }
        };

        window.checkPwStrength = function(){
            const pw = $('#newPw').val();
            const el = $('#pwStrength');
            if(pw.length < 4){ el.html('<span style="color:#e53935;">Too short</span>'); }
            else if(pw.length < 6){ el.html('<span style="color:#ff9800;">Weak</span>'); }
            else if(pw.length < 8){ el.html('<span style="color:#2196f3;">Fair</span>'); }
            else { el.html('<span style="color:#43a047;">Strong</span>'); }
        };

        window.doChangePassword = async function(){
            const current = $('#currentPw').val().trim();
            const newPw = $('#newPw').val().trim();
            const confirm = $('#confirmPw').val().trim();
            if(!current){ showToast('Enter current password','error'); return; }
            if(newPw.length < 4){ showToast('New password must be at least 4 characters','error'); return; }
            if(newPw !== confirm){ showToast('Passwords do not match','error'); return; }
            try {
                const res = await changePassword(current, newPw);
                if(res.error){ showToast(res.error,'error'); return; }
                showToast('Password changed successfully','success');
                $('#currentPw, #newPw, #confirmPw').val('');
                $('#pwStrength').html('');
            } catch(e){ showToast(e.message||'Failed to change password','error'); }
        };
    });
    </script>
</body>
</html>
