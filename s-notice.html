<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Notices — Student Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/student-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Notices</h3>
                    <ul><li><a href="/student-dashboard">Home</a></li><li>Academics > Notices</li></ul>
                </div>
            
            
<div class="chart-card" style="margin-bottom:16px;">
    <div class="chart-card-header"><i class="fas fa-bullhorn"></i> Notice Board</div>
    <div class="chart-card-body">
    <div id="noticeArea"><p style="text-align:center;color:#888;padding:20px;">Loading...</p></div>
    </div>
</div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function () {
        initPage('s-notice');
        if (typeof requireRoles === 'function' && !requireRoles(['student'])) return;
        try {
            const notices = await getNotices() || [];
            if (!notices.length) { $('#noticeArea').html('<p style="text-align:center;color:#888;padding:20px;">No notices posted yet.</p>'); return; }
            const colors = ['#c62828','#1565c0','#2e7d32','#ef6c00','#7b1fa2'];
            let html = '';
            notices.forEach((n, i) => {
                const c = colors[i % colors.length];
                const dt = n.date || n.created_at || '';
                html += `<div style="margin-bottom:12px;padding:16px;background:#f8f9fa;border-radius:10px;border-left:4px solid ${c};"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;"><span style="font-size:14px;font-weight:700;color:#0d1b4a;">${escHtml(n.title) || 'Notice'}</span></div><p style="font-size:12px;color:#555;margin:0;">${escHtml(n.description || n.content || '')}</p><div style="font-size:10px;color:#888;margin-top:6px;">Posted: ${dt}</div></div>`;
            });
            $('#noticeArea').html(html);
        } catch (e) {
            console.error(e);
            $('#noticeArea').html('<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;"></i><p>Unable to load notices. Please try again later.</p></div>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    </script>
</body>
</html>
