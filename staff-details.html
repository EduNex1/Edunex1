    <style>
        /* ===== SECTION HEADERS (Same as add-staff) ===== */
        .section-header {
            background: #0d1b4a;
            color: #fff;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header i {
            font-size: 12px;
            opacity: 0.8;
        }

        /* ===== DETAIL CARDS ===== */
        .detail-card {
            background: #fff;
            border-radius: 8px;
            padding: 0;
            margin-bottom: 16px;
            border: 1px solid #e8eaf6;
            overflow: hidden;
        }

        .detail-card-body {
            padding: 16px 20px;
        }

        /* ===== FIELD DISPLAY ===== */
        .detail-field {
            margin-bottom: 12px;
        }

        .detail-field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }

        .field-value {
            font-size: 12px;
            font-weight: 600;
            color: #222;
            background: #f8f9fb;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 7px 10px;
            min-height: 34px;
            display: flex;
            align-items: center;
        }

        .field-value.field-muted {
            color: #aaa;
            font-weight: 400;
        }

        /* ===== PHOTO BOX (Same as add-staff form) ===== */
        .photo-box {
            width: 100px;
            height: 120px;
            border: 2px dashed #c5cae9;
            border-radius: 8px;
            background: #f8f9ff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-box .ph-placeholder {
            text-align: center;
            color: #aaa;
        }

        .photo-box .ph-placeholder i {
            font-size: 20px;
            color: #0d1b4a;
            display: block;
            margin-bottom: 2px;
        }

        .photo-box .ph-placeholder span {
            font-size: 9px;
        }

        /* ===== ACTION BUTTONS ===== */
        .page-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .page-actions .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-action-edit {
            background: #0d1b4a;
            color: #fff;
        }

        .btn-action-edit:hover {
            background: #1a3a7a;
            color: #fff;
            text-decoration: none;
        }

        .btn-action-print {
            background: #e8eaf6;
            color: #0d1b4a;
        }

        .btn-action-print:hover {
            background: #c5cae9;
            color: #0d1b4a;
            text-decoration: none;
        }

        .btn-action-back {
            background: #f5f5f5;
            color: #555;
        }

        .btn-action-back:hover {
            background: #e0e0e0;
            color: #333;
            text-decoration: none;
        }

        @media print {
            body * { visibility: hidden; }
            #detailsContent, #detailsContent * { visibility: visible; }
            #detailsContent {
                position: absolute; left: 0; top: 0; width: 100%;
                display: block !important;
            }
            .page-actions, .btn-action-back { display: none !important; }
            .photo-box img {
                display: inline-block !important;
                visibility: visible !important;
                max-width: 100px;
            }
            .detail-card { break-inside: avoid; page-break-inside: avoid; margin-bottom: 10px; }
            .section-header { background: #f5f6fa !important; color: #0d1b4a !important; }
        }
    </style>
</head>

    <script>
        $(async function () {
            initPage('staff-list');
            if (typeof requireRoles === 'function' && !requireRoles(['super_admin', 'branch_admin'])) return;

            var urlParams = new URLSearchParams(window.location.search);
            var staffId = parseInt(urlParams.get('id'));
            if (!staffId) { showNotFound(); return; }

            var s;
            try { s = await getStaffMember(staffId); } catch(e) { s = null; }
            if (!s) { showNotFound(); return; }

            var subjects = [];
            try { subjects = await getSubjects(); } catch(e) {}

            renderStaffProfile(s, subjects);
        });

        function formatDate(value) {
            if (!value) return '-';
            var d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function showNotFound() {
            document.getElementById('notFoundArea').style.display = 'block';
        }

        function getDesignationClass(d) {
            var map = { 'Clerk': 'desig-clerk', 'Peon': 'desig-peon', 'Accountant': 'desig-accountant', 'Librarian': 'desig-librarian', 'Lab Assistant': 'desig-lab', 'Guard': 'desig-guard' };
            return map[d] || 'desig-default';
        }

        async function renderStaffProfile(s, subjects) {
            var statusBadge = s.status === 'Active'
                ? '<span class="status-badge status-active">Active</span>'
                : '<span class="status-badge status-inactive">Inactive</span>';
            var desigBadge = '<span class="designation-badge ' + getDesignationClass(s.designation) + '">' + s.designation + '</span>';

            document.getElementById('actionButtons').innerHTML =
                '<a href="add-staff.html?edit=' + s.id + '" class="btn-action btn-action-edit"><i class="fas fa-pen"></i> Edit</a>' +
                '<a href="#" class="btn-action btn-action-print" onclick="window.print();return false;"><i class="fas fa-print"></i> Print</a>' +
                '<a href="view-staff.html" class="btn-action btn-action-back"><i class="fas fa-arrow-left"></i> Back</a>';

            var photoBox = document.getElementById('dPhoto');
            if (s.photo_url) {
                var img = document.createElement('img');
                img.src = s.photo_url;
                img.alt = s.name || '';
                photoBox.innerHTML = '';
                photoBox.appendChild(img);
            }

            setText('dName', s.name);
            setText('dEmpId', s.employee_id);
            setHtml('dDesignation', desigBadge);
            setText('dQual', s.qualification);
            setText('dJoinDate', formatDate(s.joining_date));
            setHtml('dStatus', statusBadge);
            setText('dExp', '-', true);
            setText('dSalary', '\u20B9' + (s.basic_salary || 0).toLocaleString('en-IN'));

            setText('dFather', s.father_name);
            setText('dHusband', '-', true);
            setText('dDob', formatDate(s.dob));
            setText('dGender', s.gender);

            setText('dPhone', s.phone);
            setText('dPhone2', '-', true);
            setText('dEmail', s.email || '-', !s.email);
            setText('dAddress', s.address || '-');

            setText('dSubjects', s.designation === 'Teacher' ? 'Assigned via timetable / teacher permissions' : '-', true);

            setText('dPan', s.pan_no || '-', !s.pan_no);
            setText('dPf', '-', true);
            setText('dAadhar', s.aadhar_no || '-', !s.aadhar_no);

            setText('dBankName', s.bank_name || '-', !s.bank_name);
            setText('dBranch', '-', true);
            setText('dBank', s.account_no || '-', !s.account_no);
            setText('dIfsc', s.ifsc_code || '-', !s.ifsc_code);
            setText('dAccType', '-', true);

            setText('dLastSchool', '-', true);
            setText('dComments', '-', true);
            setText('dLoginId', s.login_id || '-');

            var _curUser = typeof getUser === 'function' ? getUser() : null;
            var _isAdmin = _curUser && (_curUser.role === 'super_admin' || _curUser.role === 'branch_admin');
            if (_isAdmin) {
                document.getElementById('btnResetStaffPw').style.display = 'inline-block';
                window._currentStaffId = s.id;
            try {
                var creds = await getUserCredentials('staff', s.id);
                var pwEl = document.getElementById('dPassword');
                window._currentStaffRealPw = creds.password || '';
                var realPw = window._currentStaffRealPw;
                pwEl.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
                pwEl.title = 'Click to reveal';
                pwEl.style.cursor = 'pointer';
                pwEl.onclick = function() {
                    if (pwEl.dataset.revealed === '1') {
                        pwEl.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
                        pwEl.dataset.revealed = '0';
                    } else {
                        pwEl.textContent = window._currentStaffRealPw || '-';
                        pwEl.dataset.revealed = '1';
                    }
                };
            } catch(e) {
                document.getElementById('dPassword').textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
            }
            }

            document.getElementById('detailsContent').style.display = 'block';
        }

        async function doResetStaffPw() {
            var newPw = document.getElementById('newStaffPw').value.trim();
            if (!newPw || newPw.length < 4) { showToast('Password must be at least 4 characters', 'error'); return; }
            try {
                var res = await adminResetPassword('staff', window._currentStaffId, newPw);
                if (res.error) { showToast(res.error, 'error'); return; }
                showToast('Password reset successfully!', 'success');
                window._currentStaffRealPw = newPw;
                var pwEl = document.getElementById('dPassword');
                pwEl.textContent = newPw;
                pwEl.dataset.revealed = '1';
                document.getElementById('newStaffPw').value = '';
                document.getElementById('resetPwStaffArea').style.display = 'none';
                document.getElementById('btnResetStaffPw').style.display = 'inline-block';
            } catch(e) { showToast(e.message || 'Failed to reset password', 'error'); }
        }

        function setText(id, val, muted) {
            var el = document.getElementById(id);
            el.textContent = val;
            if (muted || !val || val === '-') el.classList.add('field-muted');
        }

        function setHtml(id, html) {
            document.getElementById(id).innerHTML = html;
        }
    </script>
