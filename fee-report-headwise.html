<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Fee Report (Head Wise) — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/print-all.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .filter-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 18px 20px; margin-bottom: 16px; }
        .form-label-sm { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.3px; }
        .form-control { font-size: 12px; height: 36px; }
        .hw-table { width: 100%; border-collapse: collapse; }
        .hw-table thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; background: #0d1b4a; color: #fff; padding: 8px 8px; text-align: right; letter-spacing: 0.3px; white-space: nowrap; }
        .hw-table thead th:first-child, .hw-table thead th:nth-child(2), .hw-table thead th:nth-child(3), .hw-table thead th:nth-child(4), .hw-table thead th:nth-child(5) { text-align: left; }
        .hw-table tbody td { font-size: 11px; padding: 7px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; text-align: right; }
        .hw-table tbody td:first-child, .hw-table tbody td:nth-child(2), .hw-table tbody td:nth-child(3), .hw-table tbody td:nth-child(4), .hw-table tbody td:nth-child(5) { text-align: left; }
        .hw-table tbody tr:hover td { background: #f5f7ff; }
        .hw-table tfoot td { font-size: 11px; font-weight: 700; padding: 10px 8px; border-top: 2px solid #0d1b4a; background: #f5f7ff; text-align: right; }
        .hw-table tfoot td:first-child { text-align: left; }
        .print-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .btn-print-rpt { border: none; background: #042954; color: #fff; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 6px; cursor: pointer; }
        .btn-print-rpt:hover { opacity: 0.85; }
        .empty-state { text-align: center; padding: 40px; color: #bbb; }
        .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }

        @media print {
            .filter-card, .breadcrumbs-area, .print-bar, #header-container, #sidebar-container { display: none !important; }
            .dashboard-content-one { margin: 0 !important; padding: 0 !important; }
            .card { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Fee</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li>Fee Report (Head Wise)</li>
                    </ul>
                </div>

                <div class="card height-auto">
                    <div class="card-body">
                        <div class="heading-layout1">
                            <div class="item-title">
                                <h3><i class="fas fa-layer-group"></i> Fee Report — Head Wise</h3>
                            </div>
                        </div>

                        <!-- Filters -->
                        <div class="filter-card">
                            <div class="row gutters-8 align-items-end">
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Date From</label>
                                    <input type="date" class="form-control" id="fDateFrom">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Date To</label>
                                    <input type="date" class="form-control" id="fDateTo">
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Class</label>
                                    <select class="form-control" id="fClass"><option value="">All Classes</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Section</label>
                                    <select class="form-control" id="fSection"><option value="">All Sections</option></select>
                                </div>
                                <div class="col-lg-2 col-md-3 col-6 form-group">
                                    <label class="form-label-sm">Payment Mode</label>
                                    <select class="form-control" id="fMode"><option value="">All Modes</option></select>
                                </div>
                                <div class="col-auto form-group d-flex align-items-end" style="gap:6px;">
                                    <button class="fw-btn-fill btn-gradient-yellow" id="btnSearch" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;">
                                        <i class="fas fa-search"></i> Search
                                    </button>
                                    <button class="fw-btn-fill" id="btnReset" style="border-radius:6px;height:36px;font-size:12px;padding:0 16px;width:auto;background:#042954;">
                                        <i class="fas fa-redo"></i> Reset
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Report -->
                        <div id="reportArea">
                            <div class="empty-state"><i class="fas fa-layer-group"></i>Apply filters and click Search to generate head-wise report</div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        const PAYMENT_MODES = ['Cash', 'UPI', 'Bank Transfer', 'Cheque', 'DD', 'Online'];
        let feeParticularsCache = [];

        $(document).ready(async function () {
            if (typeof initPage === 'function') initPage('fee-report-headwise');

            await populateClassDropdown(document.getElementById('fClass'), true);
            await populateSectionDropdown(document.getElementById('fSection'), true);
            PAYMENT_MODES.forEach(m => $('#fMode').append(`<option value="${m}">${m}</option>`));

            await renderReport();

            $('#btnSearch').on('click', renderReport);
            $('#btnReset').on('click', function () {
                $('#fDateFrom, #fDateTo, #fClass, #fSection, #fMode').val('');
                renderReport();
            });
        });

        async function renderReport() {
            const fDateFrom = $('#fDateFrom').val();
            const fDateTo = $('#fDateTo').val();
            const fClass = $('#fClass').val();
            const fSection = $('#fSection').val();
            const fMode = $('#fMode').val();

            const filters = {};
            if (fDateFrom) filters.from_date = fDateFrom;
            if (fDateTo) filters.to_date = fDateTo;
            if (fClass && fClass !== 'All') filters.class_id = fClass;
            if (fSection && fSection !== 'All') filters.section = fSection;
            if (fMode) filters.payment_mode = fMode;
            if (typeof getSelectedSession === 'function') {
                const session = getSelectedSession();
                if (session) filters.session = session;
            }

            let deps;
            try { deps = await getFeeHeadwiseReport(filters); } catch(err){ showToast('Failed to load data','error'); return; }

            if (!deps.length) {
                $('#reportArea').html('<div class="empty-state"><i class="fas fa-inbox"></i>No data found for selected filters</div>');
                return;
            }

            let thHtml = '<th>#</th><th>Date</th><th>Receipt</th><th>Student</th><th>Class</th><th>Particular</th><th>Item Amount</th><th>Total Fee</th><th>Late Fee</th><th>Concession</th><th>Received</th>';

            let totalItemAmt = 0, totalAmt = 0, totalLate = 0, totalConc = 0, totalRec = 0;
            const seenDeposits = new Set();

            let rows = '';
            deps.forEach((d, i) => {
                rows += `<tr>
                    <td style="font-weight:600;text-align:left;">${i + 1}</td>
                    <td style="text-align:left;">${fmtDate(d.date)}</td>
                    <td style="text-align:left;font-weight:600;color:#0d1b4a;">${d.receipt_no}</td>
                    <td style="text-align:left;">
                        <div style="font-weight:600;">${d.student_name || '-'}</div>
                        <div style="font-size:9px;color:#888;">${d.father_name || ''}</div>
                    </td>
                    <td style="text-align:left;">${d.class_name || '-'}/${d.section || '-'}</td>
                    <td style="text-align:left;">${d.particular_name || '-'}</td>
                    <td>${d.item_amount ? '₹' + d.item_amount.toLocaleString('en-IN') : '-'}</td>
                    <td>${d.total_amount ? '₹' + d.total_amount.toLocaleString('en-IN') : '-'}</td>
                    <td>${d.late_fee ? '₹' + d.late_fee.toLocaleString('en-IN') : '-'}</td>
                    <td>${d.concession ? '₹' + d.concession.toLocaleString('en-IN') : '-'}</td>
                    <td style="font-weight:700;">₹${(d.received_amount||0).toLocaleString('en-IN')}</td>
                </tr>`;

                totalItemAmt += d.item_amount || 0;
                if (!seenDeposits.has(d.deposit_id)) {
                    seenDeposits.add(d.deposit_id);
                    totalAmt += d.total_amount || 0;
                    totalLate += d.late_fee || 0;
                    totalConc += d.concession || 0;
                    totalRec += d.received_amount || 0;
                }
            });

            // Footer totals
            let tfHtml = `<td style="text-align:left;" colspan="6">Grand Total</td>`;
            tfHtml += `<td>${totalItemAmt ? '₹' + totalItemAmt.toLocaleString('en-IN') : '-'}</td>`;
            tfHtml += `<td>${totalAmt ? '₹' + totalAmt.toLocaleString('en-IN') : '-'}</td>`;
            tfHtml += `<td>${totalLate ? '₹' + totalLate.toLocaleString('en-IN') : '-'}</td>`;
            tfHtml += `<td>${totalConc ? '₹' + totalConc.toLocaleString('en-IN') : '-'}</td>`;
            tfHtml += `<td>₹${totalRec.toLocaleString('en-IN')}</td>`;

            let html = `
                <div class="print-bar">
                    <button class="btn-print-rpt" onclick="window.print()"><i class="fas fa-print"></i> Print Report</button>
                </div>
                <div style="overflow-x:auto;">
                <table class="hw-table">
                    <thead><tr>${thHtml}</tr></thead>
                    <tbody>${rows}</tbody>
                    <tfoot><tr>${tfHtml}</tr></tfoot>
                </table>
                </div>`;

            $('#reportArea').html(html);
        }

        function fmtDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.getDate().toString().padStart(2, '0') + ' ' + d.toLocaleDateString('en-IN', { month: 'short' }) + ' ' + d.getFullYear();
        }
    </script>
</body>

</html>
