<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Attendance — Parent Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/parent-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 8px;
        }

        .cal-header {
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-align: center;
            text-transform: uppercase;
            padding: 4px;
        }

        .cal-day {
            text-align: center;
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cal-day.present {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .cal-day.absent {
            background: #ffebee;
            color: #c62828;
        }

        .cal-day.late {
            background: #fff3e0;
            color: #ef6c00;
        }

        .cal-day.holiday {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .cal-day.empty {
            background: transparent;
        }

        .cal-day.today {
            border: 2px solid #0d1b4a;
            font-weight: 800;
        }

        .att-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .att-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .att-legend .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">

                <div class="breadcrumbs-area">
                    <h3>Child Attendance</h3>
                    <ul>
                        <li><a href="/parent-dashboard">Home</a></li>
                        <li>Attendance</li>
                    </ul>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                        <span><i class="fas fa-child"></i> Select Child</span>
                        <span style="display:flex;align-items:center;gap:6px;">
                            <span id="monthLabel" style="font-weight:700;">March 2026</span>
                            <button class="btn btn-sm" onclick="changeMonth(-1)" style="font-size:10px;padding:2px 8px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:4px;">◀</button>
                            <button class="btn btn-sm" onclick="changeMonth(1)" style="font-size:10px;padding:2px 8px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:4px;">▶</button>
                        </span>
                    </div>
                    <div class="chart-card-body" style="padding:12px 16px;">
                        <select id="childSelect" onchange="onChildChange()" class="form-control" style="max-width:350px;">
                        </select>
                    </div>
                </div>

                
                <div class="stats-grid stats-grid-4" style="margin-bottom:16px;">
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-check"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Present</div>
                            <div class="stat-number" id="sPres">--</div>
                            <div class="stat-sub">Days</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-times"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Absent</div>
                            <div class="stat-number" id="sAbs">--</div>
                            <div class="stat-sub">Days</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Late</div>
                            <div class="stat-number" id="sLate">--</div>
                            <div class="stat-sub">Days</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-percentage"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Percentage</div>
                            <div class="stat-number" id="sPerc">--</div>
                            <div class="stat-sub">Overall</div>
                        </div>
                    </div>
                </div>

                
                <div class="chart-card">
                    <div class="chart-card-header"><i class="fas fa-calendar-alt"></i> Attendance Calendar</div>
                    <div class="chart-card-body">
                        <div class="cal-grid">
                            <div class="cal-header">Sun</div>
                            <div class="cal-header">Mon</div>
                            <div class="cal-header">Tue</div>
                            <div class="cal-header">Wed</div>
                            <div class="cal-header">Thu</div>
                            <div class="cal-header">Fri</div>
                            <div class="cal-header">Sat</div>
                        </div>
                        <div class="cal-grid" id="calGrid"></div>
                        <div class="att-legend">
                            <span><span class="dot" style="background:#2e7d32;"></span> Present</span>
                            <span><span class="dot" style="background:#c62828;"></span> Absent</span>
                            <span><span class="dot" style="background:#ef6c00;"></span> Late</span>
                            <span><span class="dot" style="background:#7b1fa2;"></span> Holiday</span>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
        var currentMonth = new Date().getMonth();
        var currentYear = new Date().getFullYear();
        var childrenCache = [];
        var attendanceCache = [];

        $(async function () {
            initPage('p-attendance');
            try { childrenCache = await getMyChildren(); } catch(e) {
                console.error(e);
                showToast('Unable to load data. Please try again.', 'error');
            }
            var sel = $('#childSelect');
            sel.empty();
            childrenCache.forEach(function(c) {
                sel.append('<option value="' + c.id + '">' + c.name + ' — ' + (c.class_name || '') + '-' + (c.section || '') + '</option>');
            });
            var urlChildId = new URLSearchParams(window.location.search).get('child_id');
            if (urlChildId && sel.find('option[value="' + urlChildId + '"]').length) {
                sel.val(urlChildId);
            }
            await loadAttendance();
        });

        async function onChildChange() { await loadAttendance(); }
        function changeMonth(dir) { currentMonth += dir; if (currentMonth > 11) { currentMonth = 0; currentYear++; } if (currentMonth < 0) { currentMonth = 11; currentYear--; } loadAttendance(); }

        async function loadAttendance() {
            var studentId = $('#childSelect').val();
            var monthStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0');
            attendanceCache = [];
            if (studentId) {
                try { attendanceCache = await getStudentAttendance({ student_id: studentId, month: monthStr }); } catch(e) {
                    console.error(e);
                    showToast('Unable to load attendance. Please try again.', 'error');
                }
            }
            renderCalendar();
        }

        function renderCalendar() {
            var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthLabel').textContent = months[currentMonth] + ' ' + currentYear;

            var firstDay = new Date(currentYear, currentMonth, 1).getDay();
            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            var today = new Date();
            var todayDate = today.getDate();
            var isCurrentMonth = today.getMonth() === currentMonth && today.getFullYear() === currentYear;

            var statusMap = {};
            attendanceCache.forEach(function(r) {
                var day = parseInt(r.date.split('-')[2]);
                var sm = {p:'present',a:'absent',l:'late',present:'present',absent:'absent',late:'late',holiday:'holiday'};
                statusMap[day] = sm[(r.status||'').toLowerCase()] || '';
            });

            var html = '';
            for (var e = 0; e < firstDay; e++) html += '<div class="cal-day empty"></div>';

            for (var d = 1; d <= daysInMonth; d++) {
                var dow = new Date(currentYear, currentMonth, d).getDay();
                var cls = '';
                if (dow === 0) cls = 'holiday';
                else if (statusMap[d]) cls = statusMap[d];
                else if (isCurrentMonth && d > todayDate) cls = 'empty';
                else cls = 'empty';
                var isToday = isCurrentMonth && d === todayDate;
                html += '<div class="cal-day ' + cls + (isToday ? ' today' : '') + '">' + d + '</div>';
            }
            document.getElementById('calGrid').innerHTML = html;

            var present = 0, absent = 0, late = 0;
            attendanceCache.forEach(function(r) {
                var sm2 = {p:'present',a:'absent',l:'late',present:'present',absent:'absent',late:'late'};
                var s = sm2[(r.status||'').toLowerCase()] || '';
                if (s === 'present') present++;
                else if (s === 'absent') absent++;
                else if (s === 'late') late++;
            });
            var total = present + absent + late;
            document.getElementById('sPres').textContent = present;
            document.getElementById('sAbs').textContent = absent;
            document.getElementById('sLate').textContent = late;
            document.getElementById('sPerc').textContent = total ? Math.round((present + late) / total * 100) + '%' : '—';
        }
    </script>
</body>

</html>
