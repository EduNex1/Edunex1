<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Student Dashboard — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/student-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">

                
                <div class="breadcrumbs-area">
                    <h3>Dashboard</h3>
                    <ul>
                        <li><a href="/student-dashboard">Home</a></li>
                        <li>Student Portal</li>
                    </ul>
                </div>

                
                <div class="welcome-banner">
                    <h4 class="dashboard-welcome-text"><i class="fas fa-graduation-cap"
                            style="margin-right:6px;color:#ffd54f;"></i> Welcome, Student!</h4>
                    <p><span id="schoolNameBanner">Student Portal</span></p>
                    <div class="welcome-date" id="todayDate"></div>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header"><i class="fas fa-user-graduate"></i> My Info</div>
                    <div class="chart-card-body" style="padding:12px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                        <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#0d1b4a,#1a3a7a);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div>
                            <div style="font-size:15px;font-weight:700;color:#0d1b4a;" id="sName">Loading...</div>
                            <div style="font-size:12px;color:#666;" id="sClassInfo">Class — | Roll No: —</div>
                        </div>
                        <span class="badge" style="background:#e8eaf6;color:#0d1b4a;font-size:11px;padding:5px 12px;margin-left:auto;" id="sAdmNo">—</span>
                    </div>
                </div>

                
                <div class="stats-grid stats-grid-3" style="margin-bottom:16px;">
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Attendance</div>
                            <div class="stat-number" id="sAttPercent">—</div>
                            <div class="stat-sub" id="sAttSub"></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon teal"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Fee Status</div>
                            <div class="stat-number" id="sFeeStatus" style="font-size:16px;">—</div>
                            <div class="stat-sub" id="sFeeSub"></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-trophy"></i></div>
                        <div class="stat-info">
                            <div class="stat-label">Last Exam</div>
                            <div class="stat-number" id="sGrade">—</div>
                            <div class="stat-sub" id="sGradeSub"></div>
                        </div>
                    </div>
                </div>

                
                <div class="row mt-2">
                    <div class="col-xl-6 col-lg-6 col-12 mb-4">
                        <div class="chart-card h-100">
                            <div class="chart-card-header">
                                <i class="fas fa-book" style="color:#1a3a7a;"></i> Today's Homework
                            </div>
                            <div class="chart-card-body">
                                <div id="dashHw" style="font-size:13px;"><span style="color:#888;">Loading...</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-12 mb-4">
                        <div class="chart-card" style="margin-bottom:12px;">
                            <div class="chart-card-header">
                                <i class="fas fa-calendar-alt" style="color:#e53935;"></i> Upcoming Exams
                            </div>
                            <div class="chart-card-body">
                                <div id="dashExams" style="font-size:13px;"><span style="color:#888;">Loading...</span></div>
                            </div>
                        </div>
                        <div class="chart-card">
                            <div class="chart-card-header">
                                <i class="fas fa-bolt" style="color:#ff9800;"></i> Quick Access
                            </div>
                            <div class="chart-card-body">
                                <div class="quick-grid">
                                    <a href="/s-my-attendance" class="quick-item"><i class="fas fa-clipboard-list"></i><span>Attendance</span></a>
                                    <a href="/s-my-results" class="quick-item"><i class="fas fa-chart-bar"></i><span>Results</span></a>
                                    <a href="/s-fee-status" class="quick-item"><i class="fas fa-receipt"></i><span>Fee Status</span></a>
                                    <a href="/s-notice" class="quick-item"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                
                <div class="chart-card" style="margin-bottom:16px;">
                    <div class="chart-card-header">
                        <i class="fas fa-bell" style="color:#ff9800;"></i> Latest Notices
                    </div>
                    <div class="chart-card-body">
                        <div id="dashNotices" style="font-size:13px;"><span style="color:#888;">Loading...</span></div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function(){
        initPage('dashboard');
        if (typeof requireRoles === 'function' && !requireRoles(['student'])) return;
        const now = new Date();
        document.getElementById('todayDate').textContent = now.getDate()+' '+now.toLocaleString('en-IN',{month:'long'})+' '+now.getFullYear();
        const user = typeof getUser==='function'?getUser():null;
        if(user){
            document.querySelector('.dashboard-welcome-text').innerHTML='<i class="fas fa-graduation-cap" style="margin-right:6px;color:#ffd54f;"></i> Welcome, '+escHtml(user.name||user.login_id)+'!';
            const b=document.getElementById('schoolNameBanner'); if(b&&user.school_name) b.textContent=user.school_name+' \u2014 Student Portal';
        }
        try {
            const children = await getMyChildren()||[];
            const stu = children[0];
            if(!stu){
                $('#dashHw').html('<span style="color:#888;">No student profile linked.</span>');
                $('#dashExams').html('<span style="color:#888;">No exams available.</span>');
                $('#dashNotices').html('<span style="color:#888;">No notices.</span>');
                return;
            }
            $('#sName').text(stu.name||'');
            $('#sClassInfo').text('Class '+(stu.class_name||'')+(stu.section?'-'+stu.section:'')+' | Roll No: '+(stu.roll_no||''));
            $('#sAdmNo').text(stu.admission_no||'');

            const deps = await getFeeDeposits({student_id:stu.id})||[];
            const slabs = await getFeeSlabs(stu.class_id, stu.session)||[];
            // Filter: exclude transport, match student category
            const nonTransport = slabs.filter(function(x){ return !x.is_transport; });
            const stuCat = stu.category || 'Default';
            const catSlabs = nonTransport.filter(function(x){ return (x.category||'Default') === stuCat; });
            const finalSlabs = catSlabs.length ? catSlabs : nonTransport.filter(function(x){ return (x.category||'Default') === 'Default'; });
            const transportFee = Number(stu.transport_fee||0);
            const oldBal = Number(stu.old_balance||0);
            let totalFee = finalSlabs.reduce((s,x)=>{
                let mc; try { const mp = typeof x.months==='string'&&x.months ? JSON.parse(x.months) : (Array.isArray(x.months)?x.months:null); mc = Array.isArray(mp)?mp.length:12; } catch(e){ mc=12; }
                return s + Number(x.amount||0) * mc;
            },0) + transportFee * 12;
            if (!totalFee && Number(stu.fee_amount||0) > 0) totalFee = Number(stu.fee_amount);
            const totalPaid = deps.reduce((s,x)=>s+Number(x.received_amount||0),0);
            const discs = await getFeeDiscounts(stu.id)||[];
            const totalDisc = discs.reduce((s,x)=>s+Number(x.amount||0),0);
            const pending = Math.max(0, totalFee + oldBal - totalPaid - totalDisc);
            if(pending<=0){ $('#sFeeStatus').css('color','#43a047').text('Paid \u2705'); $('#sFeeSub').text('No dues'); }
            else { $('#sFeeStatus').css('color','#c62828').text('\u20B9'+pending.toLocaleString('en-IN')+' Due'); $('#sFeeSub').text('Pending'); }

            const hw = await getHomework({class_id:stu.class_id,section:stu.section})||[];
            if(!hw.length) $('#dashHw').html('<span style="color:#888;">No homework today.</span>');
            else {
                let h='';
                hw.slice(0,3).forEach(w=>{
                    const dueDate = w.due_date || w.submission_date || '';
                    h+=`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:10px 0;"><span><strong>${escHtml(w.subject_name||'')}</strong> \u2014 ${escHtml(w.title||'')}</span>${dueDate?'<span class="badge badge-warning" style="font-size:10px;">Due: '+escHtml(dueDate)+'</span>':''}</div>`;
                });
                $('#dashHw').html(h);
            }

            const exams = await getExams()||[];
            if(!exams.length) $('#dashExams').html('<span style="color:#888;">No upcoming exams.</span>');
            else { let h=''; exams.slice(0,3).forEach(e=>{ h+=`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:10px 0;"><span><strong>${escHtml(e.name||'')}</strong></span></div>`; }); $('#dashExams').html(h); }

            const notices = await getNotices()||[];
            if(!notices.length) $('#dashNotices').html('<span style="color:#888;">No notices.</span>');
            else { let h=''; notices.slice(0,3).forEach(n=>{ h+=`<div style="border-bottom:1px solid #eee;padding:10px 0;"><strong>${escHtml(n.title||'')}</strong><small style="color:#999;"> ${escHtml(n.date||n.created_at||'')}</small></div>`; }); $('#dashNotices').html(h); }

            try {
                const att = await getStudentAttendance({student_id:stu.id})||[];
                const present=att.filter(a=>{ const status=String(a.status||'').toUpperCase(); return status==='P'||status==='PRESENT'; }).length;
                const total=att.length;
                const pct=total?Math.round(present*100/total):0;
                $('#sAttPercent').text(pct+'%');
                $('#sAttSub').text('Present: '+present+' / '+total+' days');
            } catch(e) {
                console.error('Attendance load error:', e);
                $('#sAttPercent').text('--');
                $('#sAttSub').text('Unable to load');
                if(typeof showToast==='function') showToast('Unable to load attendance data. Please try again.', 'error');
            }

            try {
                const res = await getExamResults({student_id:stu.id})||[];
                if(res.length){
                    const total=res.reduce((sum,row)=>sum+Number(row.total_marks||0),0);
                    const max=res.reduce((sum,row)=>sum+Number(row.max_marks||100),0);
                    const pct=max?Math.round(total*100/max):0;
                    const grade=pct>=90?'A+':pct>=75?'A':pct>=60?'B':pct>=45?'C':'D';
                    $('#sGrade').text(grade);
                    $('#sGradeSub').text(pct+'%');
                }
            } catch(e) {
                console.error('Exam results load error:', e);
                $('#sGrade').text('--');
                $('#sGradeSub').text('Unable to load');
                if(typeof showToast==='function') showToast('Unable to load exam results. Please try again.', 'error');
            }
        } catch(e){
            console.error('Dashboard load error:', e);
            $('#sName').text('--');
            $('#sClassInfo').text('Unable to load student info');
            $('#sAttPercent').text('--');
            $('#sAttSub').text('');
            $('#sFeeStatus').text('--');
            $('#sFeeSub').text('');
            $('#sGrade').text('--');
            $('#sGradeSub').text('');
            $('#dashHw').html('<span style="color:#c62828;">Unable to load homework.</span>');
            $('#dashExams').html('<span style="color:#c62828;">Unable to load exams.</span>');
            $('#dashNotices').html('<span style="color:#c62828;">Unable to load notices.</span>');
            if(typeof showToast==='function') showToast('Unable to load data. Please try again.', 'error');
        }
    });
    </script>
</body>

</html>
