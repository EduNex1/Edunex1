<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8"><meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Exam Group — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/all.min.css"><link rel="stylesheet" href="fonts/flaticon.css"><link rel="stylesheet" href="css/animate.min.css"><link rel="stylesheet" href="css/select2.min.css"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/custom-overrides.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        .filter-card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:16px}.form-label-sm{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;letter-spacing:.3px}.form-control{font-size:12px;height:36px}.list-table{width:100%;border-collapse:collapse}.list-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;background:#0d1b4a;color:#fff;padding:8px 12px;text-align:left;white-space:nowrap}.list-table tbody td{font-size:12px;padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}.list-table tbody tr:hover td{background:#f5f7ff}.table-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;overflow:hidden;margin-bottom:16px}.action-btn{width:26px;height:26px;border:none;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin:0 1px}.action-btn-edit{background:#fff3e0;color:#ef6c00}.action-btn-edit:hover{background:#ef6c00;color:#fff}.action-btn-delete{background:#ffebee;color:#c62828}.action-btn-delete:hover{background:#c62828;color:#fff}
        .exam-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#e3f2fd;color:#0d47a1;margin:2px 3px 2px 0;display:inline-block}
        .exam-checks{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 0;}
        .exam-checks label{font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;}
        .exam-checks input[type=checkbox]{width:15px;height:15px;cursor:pointer;}
    </style>
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area"><h3>Masters</h3><ul><li><a href="/dashboard">Home</a></li><li>Exam Group</li></ul></div>
                <div class="card height-auto"><div class="card-body">
                    <div class="heading-layout1"><div class="item-title"><h3><i class="fas fa-layer-group"></i> Exam Group</h3></div></div>
                    <div class="filter-card" id="formSection">
                        <h6 style="font-size:13px;font-weight:700;color:#0d1b4a;margin-bottom:12px;" id="formTitle"><i class="fas fa-plus-circle"></i> Add Exam Group</h6>
                        <input type="hidden" id="editId">
                        <div class="row" style="gap:0;">
                            <div class="col-lg-4 col-md-5 col-12 form-group">
                                <label class="form-label-sm">Group Name</label>
                                <input type="text" class="form-control" id="gName" placeholder="e.g. Full Session">
                            </div>
                            <div class="col-lg-8 col-md-7 col-12 form-group">
                                <label class="form-label-sm">Select Exam Names</label>
                                <div class="exam-checks" id="examChecks"></div>
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn btn-sm" style="background:#0d1b4a;color:#fff;font-size:13px;padding:7px 22px;" onclick="saveItem()"><i class="fas fa-save"></i> Save</button>
                            <button class="btn btn-sm" style="background:#f0f0f0;color:#333;font-size:13px;padding:7px 16px;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
                        </div>
                    </div>
                    <div class="table-card"><div class="table-responsive" style="padding:0 2px 10px;">
                        <table class="list-table"><thead><tr><th style="width:50px">#</th><th>Exam Group</th><th>Exams</th><th style="width:90px">Action</th></tr></thead><tbody id="listBody"></tbody></table>
                    </div></div>
                </div></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script><script src="js/plugins.js"></script><script src="js/popper.min.js"></script><script src="js/bootstrap.min.js"></script><script src="js/select2.min.js"></script><script src="js/jquery.scrollUp.min.js"></script><script src="js/api.js"></script><script src="js/app.js"></script><script src="js/main.js"></script>
    <script>
    $(async function(){
        initPage('master-exam-group');
        let cache = [];
        let examNamesCache = [];
        try { examNamesCache = await getExamNames(); } catch(e){}
        function buildChecks(selected){
            $('#examChecks').html(examNamesCache.map(e=>`<label><input type="checkbox" value="${e.id}" ${(selected||[]).includes(e.id)?'checked':''}> ${e.name}</label>`).join(''));
        }
        buildChecks([]);
        async function load(){
            try { cache = await getExamGroups(); } catch(e){ showToast('Failed to load','error'); }
            const rows = cache.map((g,i)=>{
                const ids = g.exam_ids ? (typeof g.exam_ids==='string' ? JSON.parse(g.exam_ids) : g.exam_ids) : [];
                const tags = ids.map(eid=>{const e=examNamesCache.find(x=>x.id===eid);return e?`<span class="exam-tag">${e.name}</span>`:'';}).join('');
                return `<tr><td class="text-center">${i+1}</td><td><strong>${g.name}</strong></td><td>${tags||'<span class="text-muted">—</span>'}</td><td style="white-space:nowrap;"><button class="action-btn action-btn-edit" onclick="editItem(${g.id})"><i class="fas fa-pen"></i></button> <button class="action-btn action-btn-delete" onclick="del(${g.id})"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            }).join('');
            $('#listBody').html(rows||'<tr><td colspan="4" class="text-center text-muted" style="padding:30px;">No exam groups</td></tr>');
        }
        window.saveItem=async function(){
            const name=$('#gName').val().trim(), editId=parseInt($('#editId').val())||0;
            const examIds=[]; $('#examChecks input:checked').each(function(){examIds.push(parseInt($(this).val()));});
            if(!name){showToast('Enter group name','error');return;}
            if(!examIds.length){showToast('Select at least one exam','error');return;}
            try {
                const data={name, exam_ids:JSON.stringify(examIds)};
                if(editId) await updateMasterData('exam_groups', editId, data);
                else await createMasterData('exam_groups', data);
                cancelEdit(); await load(); showToast(editId?'Updated':'Added','success');
            } catch(e){ showToast('Failed to save','error'); }
        };
        window.editItem=function(id){
            const g=cache.find(x=>x.id===id); if(!g)return;
            const ids = g.exam_ids ? (typeof g.exam_ids==='string' ? JSON.parse(g.exam_ids) : g.exam_ids) : [];
            $('#editId').val(g.id);$('#gName').val(g.name); buildChecks(ids);
            $('#formTitle').html('<i class="fas fa-edit"></i> Edit Exam Group');
        };
        window.cancelEdit=function(){$('#editId').val('');$('#gName').val('');buildChecks([]);$('#formTitle').html('<i class="fas fa-plus-circle"></i> Add Exam Group');};
        window.del=async function(id){if(!confirm('Delete?'))return; try{ await deleteMasterData('exam_groups',id); await load(); showToast('Deleted','success'); }catch(e){showToast('Failed','error');}};
        await load();
    });
    </script>
</body>
</html>
