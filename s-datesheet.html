<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Date Sheet — Student Panel — EduNex1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="fonts/flaticon.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/custom-overrides.css">
    <link rel="stylesheet" href="css/student-portal-theme.css">
    <script src="js/modernizr-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="preloader"></div>
    <div id="wrapper" class="wrapper bg-ash">
        <div id="header-container"></div>
        <div class="dashboard-page-one">
            <div id="sidebar-container"></div>
            <div class="dashboard-content-one">
                <div class="breadcrumbs-area">
                    <h3>Date Sheet</h3>
                    <ul><li><a href="/student-dashboard">Home</a></li><li>Academics > Date Sheet</li></ul>
                </div>
            
            
<div class="chart-card" style="margin-bottom:16px;">
    <div class="chart-card-header"><i class="fas fa-calendar-alt"></i> Exam Date Sheet</div>
    <div class="chart-card-body">
    <div class="table-responsive"><table class="recent-table">
        <thead><tr><th>Exam</th><th>Date</th><th>Subject</th><th>Time</th></tr></thead>
        <tbody id="datesheetBody"><tr><td colspan="4" style="text-align:center;color:#888;">Loading...</td></tr></tbody>
    </table></div>
    </div>
</div>
                <div id="footer-container"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.scrollUp.min.js"></script>
    <script src="js/api.js"></script>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    <script>
    $(async function () {
        initPage('s-datesheet');
        try {
            const children = await getMyChildren();
            const stu = children && children[0];
            const filters = stu ? { class_id: stu.class_id } : {};
            const data = await getDatesheets(filters) || [];
            if (!data.length) { $('#datesheetBody').html('<tr><td colspan="4" style="text-align:center;color:#888;">No datesheet available.</td></tr>'); return; }
            let html = '';
            data.forEach(d => {
                const startTime = d.start_time || d.time_from || '';
                const endTime = d.end_time || d.time_to || '';
                html += `<tr><td>${escHtml(d.exam_name || '-')}</td><td><strong>${d.date || d.exam_date || '-'}</strong></td><td><strong>${escHtml(d.subject_name || '-')}</strong></td><td>${startTime + (endTime ? ' – ' + endTime : '')}</td></tr>`;
            });
            $('#datesheetBody').html(html);
        } catch (e) {
            console.error(e);
            $('#datesheetBody').html('<tr><td colspan="4" class="text-center text-danger p-4">Unable to load datesheet. Please try again later.</td></tr>');
            showToast('Unable to load data. Please try again.', 'error');
        }
    });
    </script>
</body>
</html>
